{{- if and .Values.ruler.enabled (eq .Values.deployWholeThanos false) }}
{{- if has .Values.name (list "metal" "scaleout") }}
{{- $root := . }}
{{- $name := .Values.name }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "thanos.objectStorageConfigName" (list $name $root) }}
  labels:
    thanos-ruler: {{ include "thanos.fullName" (list $name $root) }}
data:
  thanos.yaml: {{ include (print $.Template.BasePath "/ruler/_thanos.yaml.tpl") (list $name $root) | b64enc }}
{{- end }}
{{- end }}
