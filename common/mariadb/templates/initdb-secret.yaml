{{- if .Values.initdb_job }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "fullName" . }}-init-db
  labels:
    {{- include "mariadb.labels" (list $ "version" "mariadb" "secret" "database") | indent 4 }}
  # hooks are not annotated as belonging to the Helm release, so we cannot rely on owner-info injection
    {{- include "mariadb.ownerLabels" . | indent 4 }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "1"
data:
  root-password: {{ (required (printf ".Values.root_password is required to configure the Kubernetes secret for the '%s' user" "root") $.Values.root_password) | b64enc }}
  init.sql: |
{{ include (print .Template.BasePath "/initdb/_init.sql.tpl") . | trim | b64enc | indent 4 }}
{{- end }}
