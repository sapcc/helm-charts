owner-info:
  support-group: foundation
  service: inventory-updater
  maintainers:
    - Bernd Kuespert
  helm-chart-url: https://github.com/sapcc/helm-charts/tree/master/common/inventory-updater
updater:
  enabled: false
  image:
    name: inventory-updater
    tag: latest
  namespace: infra-monitoring
  replicas: 1
  api:
    enabled: false
    port: 9200

  connection_timeout: 10 # timeout in seconds for requests connections
  scrape_interval: 21600 # target interval in seconds between round starts (0 = start next round immediately)
  workers: 10 # number of parallel workers for scraping servers

  netbox:
    url: DEFINED-IN-REGION-SECRETS
    token: DEFINED-IN-REGION-SECRETS
    query:
      role_id: 8 # Role: server
      tenant_id: 1 # Tenant: converged cloud

  redfish_username: DEFINED-IN-REGION-SECRETS
  redfish_password: DEFINED-IN-REGION-SECRETS

  manufacturer_aliases:
    fsas: Fujitsu
    mlnx: Mellanox
    mellanox: Mellanox
    skhynix: SK Hynix

  # Known BMC/management interface names in Netbox (used as fallback when no interface
  # is marked mgmt_only). Values are matched case-insensitively, separators are ignored.
  bmc_interface_names:
    - remoteboard   # internal collector key
    - iLO           # HPE
    - iDRAC         # Dell
    - XCC           # Lenovo
    - iRMC          # Fujitsu
    - BMC
    - MGMT

resources:
  requests:
    memory: 200Mi
    cpu: 50m
  limits:
    memory: 400Mi
    cpu: 400m

ingress:
  # Additional annotations for the ingress.
  annotations: {}

global:
  registry: DEFINED-IN-GLOBAL-SECRETS



