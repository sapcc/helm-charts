name: "Helm unittest"
on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  helm-unittest:
    runs-on: [ubuntu-latest]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Helm
        uses: azure/setup-helm@v4.2.0

      - uses: actions/setup-python@v5
        with:
          python-version: 3.9
          check-latest: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up chart-testing
        uses: helm/chart-testing-action@v2.6.1

      - name: Run chart-testing (list-changed)
        id: list-changed
        run: |
          changed=$(ct list-changed --config ci/config.yaml --target-branch ${{ github.event.repository.default_branch }})
          if [[ -n "$changed" ]]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Install helm-unittest plugin
        if: steps.list-changed.outputs.changed == 'true'
        run: helm plugin install https://github.com/helm-unittest/helm-unittest

      - name: Run helm unit tests
        if: steps.list-changed.outputs.changed == 'true'
        run: |
          failed=0
          for chart in $(ct list-changed --config ci/config.yaml --target-branch ${{ github.event.repository.default_branch }}); do
            if [ -d "$chart/tests" ]; then
              echo "Running unit tests for $chart"
              if ! helm unittest "$chart"; then
                failed=1
              fi
            else
              echo "No tests directory found for $chart, skipping"
            fi
          done
          exit $failed
