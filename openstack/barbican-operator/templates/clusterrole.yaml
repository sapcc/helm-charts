apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ .Chart.Name }}
  labels:
    app: {{ template "fullname" . }}
    chart: "{{ .Chart.Name }}-{{ .Chart.Version }}"
    release: "{{ .Release.Name }}"
    heritage: "{{ .Release.Service }}"
rules:
  # Access to the Barbican CRD
  - apiGroups:
      - identity.cloud.sap
    resources:
      - barbicans
      - barbicans/status
      - barbicans/finalizers
    verbs:
      - '*'

  # Core resources created/managed by the Helm release
  - apiGroups:
      - ""
    resources:
      - events
      - secrets
      - configmaps
      - services
      - serviceaccounts
      - pods
    verbs:
      - '*'

  # Workloads
  - apiGroups:
      - apps
      - extensions
    resources:
      - deployments
      - statefulsets
      - daemonsets
      - replicasets
    verbs:
      - '*'

  # Batch resources
  - apiGroups:
      - batch
    resources:
      - jobs
      - cronjobs
    verbs:
      - '*'
