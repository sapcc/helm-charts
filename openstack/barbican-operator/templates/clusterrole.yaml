apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ .Chart.Name }}
  labels:
    app: {{ template "fullname" . }}
    chart: "{{ .Chart.Name }}-{{ .Chart.Version }}"
    release: "{{ .Release.Name }}"
    heritage: "{{ .Release.Service }}"
rules:
  - apiGroups:
      - identity.cloud.sap
    resources:
      - barbicans
      - barbicans/status
      - barbicans/finalizers
    verbs: ["*"]
  - apiGroups: [""]
    resources:
      - events
      - secrets
      - configmaps
      - services
      - serviceaccounts
      - pods
    verbs: ["*"]
  - apiGroups: ["apps", "extensions"]
    resources:
      - deployments
      - statefulsets
      - daemonsets
      - replicasets
    verbs: ["*"]
  - apiGroups: ["batch"]
    resources:
      - jobs
      - cronjobs
    verbs: ["*"]
