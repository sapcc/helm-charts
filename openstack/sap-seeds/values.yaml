# whether to use the hana_exclusive list of flavors or the older
# hana_no_exclusive list
use_hana_exclusive: false
# whether to use separate quota for each hana-flavor for pay-per-use billing
hana_flavors_quota_separate: false

owner-info:
  support-group: compute-storage-api
  maintainers:
  - David Hoeller
  - Jakob Karge
  - Johannes Kulik
  - Fabian Wiesel
  helm-chart-url: https://github.com/sapcc/helm-charts/tree/master/openstack/sap-seeds

global:
  domain_seeds:
    skip_hcm_domain: false

extra_specs:
  vmware_common: &vmware_common
    capabilities:hypervisor_type: VMware vCenter Server
    hw_video:ram_max_mb: '16'
    vmware:hw_version: vmx-18
    vmware:hv_enabled: 'True'
  vmware: &vmware
    <<: *vmware_common
    trait:CUSTOM_HANA_EXCLUSIVE_HOST: forbidden
  vmware_hana_exclusive: &vmware_hana_exclusive
    <<: *vmware_common
    trait:CUSTOM_HANA_EXCLUSIVE_HOST: required

  vmware_common_v1: &vmware_common_v1
    <<: *vmware_common
    vmware:evc_mode: intel-cascadelake
  vmware_v1: &vmware_v1
    <<: [*vmware_common_v1, *vmware]
  vmware_hana_exclusive_v1:
    <<: [*vmware_common_v1, *vmware_hana_exclusive]

  vmware_common_v2: &vmware_common_v2
    <<: *vmware_common
    trait:CUSTOM_HW_SAPPHIRE_RAPIDS: required
  vmware_v2: &vmware_v2
    <<: [*vmware_common_v2, *vmware]
  vmware_hana_exclusive_v2:
    <<: [*vmware_common_v2, *vmware_hana_exclusive]

flavors:
  hypervisors:
    k:
      spec:
        disk: 0
        is_public: false
        extra_spec:
          capabilities:hypervisor_type: QEMU
          hw:mem_page_size: large
          hw_video:ram_max_mb: 16
      variants:
        v1: {}
        v2: {}
    v:
      spec:
        disk: 64
        is_public: true
        extra_specs:
          <<: *vmware_common
      variants:
        v1:
          spec:
            extra_spec:
              vmware:evc_mode: intel-cascadelake
        v2:
          spec:
            extra_spec:
              trait:CUSTOM_HW_SAPPHIRE_RAPIDS: required
