service_type: 'network'
service_name: 'neutron'

# prefix: '/v2[0-9\.]*(?:/[0-9a-f\-]+)?'
prefix: '/v2.0'

resources:
  aci_ml:
    type_uri: network/aci_ml
    children:
      hostgroup-modes:
        type_uri: network/aci_ml/hostgroup-modes
  address_groups:
    type_name: address-group
    custom_actions:
      add_addresses: update/add/addresses
      remove_addresses: update/remove/addresses
    custom_attributes:
      addresses: network/address-group/addresses
  address_scopes:
    type_uri: network/address-scopes
    el_type_uri: network/address-scope
  agents:
    type_uri: network/agents
    el_type_uri: network/agent #singular for individual resources
    custom_attributes:
      admin_state_up: network/agent/admin-state-up
      alive: network/agent/alive
      agent_type: network/agent/type
      host: network/agent/host
      binary: network/agent/binary
    # Exclude payload from large objects in audit records
    payloads:
      exclude:
        - configurations
    children:
      l3-routers:
        type_uri: network/agent/l3-routers
        el_type_uri: network/agent/l3-router
      dhcp-networks:
        type_uri: network/agent/dhcp-networks
        el_type_uri: network/agent/dhcp-network
  asr1:
    type_uri: network/asr1
    children:
      router:
        type_uri: network/router
  #custom endpoint
  asrk1:
    singleton: true
  auto-allocated-topology:
    singleton: true
    custom_id: project_id
    custom_attributes:
      tenant_id: network/project
  bgpvpn:
    # BPG VPNs namespace
    singleton: true
    children:
      bgpvpns:
        type_uri: network/bgpvpns
        children:
          network_associations:
            type_uri: network/bgpvpn/network-associations
          router_associations:
            type_uri: network/bgpvpn/router-associations
          port_associations:
            type_uri: network/bgpvpn/port-associations
  #custom endpoint
  cc-fabric:
    children:
      switches:
        type_uri: network/cc-fabric/switches
  interconnection:
    singleton: true
    children:
      interconnections:
        type_uri: network/interconnections
  flavors:
  floatingips:
    children:
      tags:
  fw:
    # FWaaS 1.0 namespace
    singleton: true
    type_uri: network/firewalls
    children:
      firewalls:
        type_uri: network/firewalls
      firewall_policies:
        type_uri: network/firewall/policies
        el_type_uri: network/firewall/policy
      firewall_rules:
        type_uri: network/firewall/rules
  fwaas:
    # FWaas 2.0 namespace (uses same logical resource uris as 1.0)
    singleton: true
    type_uri: network/firewalls
    children:
      firewall_groups:
        type_uri: network/firewalls
      firewall_policies:
        type_uri: network/firewall/policies
        el_type_uri: network/firewall/policy
      firewall_rules:
        type_uri: network/firewall/rules

  lbaas:
    # LBaaS 2.0 namespace
    singleton: true
    children:
      healthmonitors:
        type_uri: network/loadbalancer/healthmonitors
      loadbalancers:
        type_uri: network/loadbalancers
        children:
          statuses:
            singleton: true
      listeners:
        type_uri: network/loadbalancer/listeners
      pools:
        type_uri: network/loadbalancer/pools
        children:
          members:
      l7policies:
        type_uri: network/loadbalancer/l7policies
        el_type_uri: network/loadbalancer/l7policy
        children:
          rules:
  log:
    # logging extension namespace
    singleton: true
    children:
      logs:
      loggable-resources:
        singleton: true
  metering:
    # metering namespace
    singleton: true
    children:
      metering-labels:
        type_uri: network/metering/labels
      metering-label-rules:
        type_uri: network/metering/label-rules
  networks:
    children:
      dhcp-agents:
        type_uri: network/network/dhcp-agents
        el_type_uri: network/network/dhcp-agent
      tags:
  network-ip-availabilities:
  ports:
    el_type_uri: network/port
    custom_attributes:
      security_groups: network/security-groups
    children:
      bindings:
        type_uri: network/port/bindings
        el_type_uri: network/port/binding
      tags:
  quotas:
    custom_actions:
      details: read/list/details
  rbac-policies:
  routers:
    custom_actions:
      add_router_interface: update/add/router-interface
      remove_router_interface: update/remove/router-interface
    children:
      l3-agents:
        type_uri: network/router/l3-agents
        el_type_uri: network/router/l3-agent
      tags:
  security-groups:
    children:
      tags:
  security-group-rules:
    # does not have a name field, so let's use the description
    custom_name: description
    custom_attributes:
      security_rule_id: network/security-group-rule
    children:
      tags:
  segments:
  service-profiles:
    el_type_uri: network/service-profile
  subnetpools:
    children:
      tags:
  subnets:
    type_uri: network/subnets
    el_type_uri: network/subnet
    children:
      tags:
  trunks:
    children:
      tags:
  vpn:
    # VPNaaS 2.0 namespace
    singleton: true
    children:
      endpoint-groups:
      ikepolicies:
        type_uri: network/vpn/ike-policies
        el_type_uri: network/vpn/ike-policy
      ipsecpolicies:
        type_uri: network/vpn/ipsec-policies
        el_type_uri: network/vpn/ipsec-policy
      ipsec-site-connections:
      vpnservices:
        type_uri: network/vpn/vpn-services
