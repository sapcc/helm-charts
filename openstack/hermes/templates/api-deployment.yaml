{{- if .Values.hermes.api_enabled }}
kind: Deployment
apiVersion: apps/v1

metadata:
  name: hermes-api
  namespace: hermes

spec:
  replicas: 1
  selector:
    matchLabels:
      name: hermes-api
  template:
    metadata:
      labels:
        name: hermes-api
      annotations:
        {{- if and $.Values.global.linkerd_enabled $.Values.global.linkerd_requested }}
        linkerd.io/inject: enabled
        {{- end }}
        kubectl.kubernetes.io/default-container: "api"
        secret.reloader.stakater.com/reload: "api-conf,hermes-es-api,hermes-audit-rabbitmq,{{ .Release.Name }}-pguser-hermes"
        deployment.reloader.stakater.com/pause-period: "60s"
    spec:
      volumes:
        - name: config
          secret:
            secretName: api-conf
            defaultMode: 420
      containers:
        - name: api
          image: {{required ".Values.hermes.image is missing" .Values.hermes.image}}:{{.Values.hermes.image_tag | replace "string:" ""}}
          imagePullPolicy: {{required ".Values.hermes.image_pull_policy is missing" .Values.hermes.image_pull_policy}}
          args:
            - -f
            - /etc/hermes/hermes.conf
          env:
            - name: HERMES_DEBUG
              value: '{{.Values.hermes.debug}}'
            - name: HERMES_INSECURE
              value: '{{.Values.hermes.insecure}}' # SSL certificates are hard :(
            - name: HERMES_OS_USERNAME
              valueFrom:
                secretKeyRef:
                  name: hermes-es-api
                  key: HERMES_ES_USERNAME
            - name: HERMES_OS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: hermes-es-api
                  key: HERMES_ES_PASSWORD
            # Postgres connection for the dataplane_config table.
            # hermes runs migrations on startup and serves the v1/dataplane-config API.
            # The Service name is <release>-postgresql regardless of the subchart
            # alias (postgresql-ng's postgres.fullname strips the alias).
            - name: HERMES_PG_HOSTNAME
              value: '{{ .Release.Name }}-postgresql.{{ .Release.Namespace }}.svc'
            - name: HERMES_PG_PORT
              value: '5432'
            - name: HERMES_PG_USERNAME
              value: 'hermes'
            - name: HERMES_PG_DBNAME
              value: 'hermes'
            - name: HERMES_PG_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: '{{ .Release.Name }}-pguser-hermes'
                  key: postgres-password
            # Auditor for PUT/DELETE dataplane-config operations.
            # When the credentials secret renders empty user/password (dev default),
            # hermez logs the auth failure and falls back to a null auditor.
            - name: HERMES_AUDIT_RABBITMQ_HOSTNAME
              value: '{{ tpl .Values.hermes.audit.rabbitmq.hostname . }}'
            - name: HERMES_AUDIT_RABBITMQ_PORT
              value: '{{ .Values.hermes.audit.rabbitmq.port | default 5672 }}'
            - name: HERMES_AUDIT_RABBITMQ_QUEUE_NAME
              value: '{{ .Values.hermes.audit.rabbitmq.queue_name | default "notifications.info" }}'
            - name: HERMES_AUDIT_RABBITMQ_USERNAME
              valueFrom:
                secretKeyRef:
                  name: hermes-audit-rabbitmq
                  key: username
            - name: HERMES_AUDIT_RABBITMQ_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: hermes-audit-rabbitmq
                  key: password
          volumeMounts:
            - mountPath: "/etc/hermes"
              name: config
          resources:
            requests:
              memory: {{required ".Values.resources_requests_memory_api is missing" .Values.resources_requests_memory_api}}
              cpu: {{required ".Values.resources_requests_memory_api is missing" .Values.resources_requests_cpu_api}}
          # livenessProbe:
          #   #exec: 
          #   #  command:
          #   #    - /bin/false
          #   #  initialDelaySeconds: 21600
          #   #  periodSeconds: 21600 # restart api every 6 hours
          #   httpGet:
          #     path: /v1/
          #     port: 80
          #   timeoutSeconds: 10
          #   periodSeconds: 60
          #   initialDelaySeconds: 60
          #   readinessProbe:
          #     httpGet:
          #       path: /v1/
          #       port: 80
          #     timeoutSeconds: 5
          #     periodSeconds: 5
{{- end }}
