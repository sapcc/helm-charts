global:
  linkerd_requested: true
  clusterType: local
  users:
    admin:
      name: admin
  # for openstack seeds
  keystoneNamespace: monsoon3
  # Set to true for global regions
  is_global_region: false
  gardener:
    enabled: false
  
hermes_image_version_logstash: "20260608182629"
      
owner-info:
  support-group: observability
  service: hermes
  maintainers:
    - Nathan Oyler
  helm-chart-url: https://github.com/sapcc/helm-charts/tree/master/openstack/hermes

# global.region: DEFINED_IN_VALUES_FILE
hermes:
  # Component enable flags - all default to true for backward compatibility
  # RabbitMQ needs to be available for other components all the time (also during buildup) whereas the rest of hermes can be deployed laster.
  rabbitmq_enabled: true      # Deploy RabbitMQ StatefulSet
  api_enabled: true           # Deploy Hermes API (deployment, service, ingress, secrets)
  logstash_enabled: true      # Deploy Logstash pipeline (deployment, service, configmap, secret)
  keystone_seed_enabled: true # Deploy Keystone OpenstackSeed

  debug: 0
  insecure: 0
  name: hermes
  username: hermes
  rabbitmq:
    port: 5672
    user: rabbitmq
    queue_name: "notifications.info"
    # hostnames are derived from this template using the key of the targets entry
    host_template: "%s-rabbitmq-notifications.monsoon3"

  # Audit-event publisher for hermes-api PUT/DELETE dataplane-config operations.
  # Reuses the rabbitmq_notifications subchart; events land on the
  # notifications.info queue alongside other OpenStack control-plane audit events.
  audit:
    rabbitmq:
      hostname: '{{ .Release.Name }}-rabbitmq-notifications.{{ .Release.Namespace }}.svc'
      port: 5672
      queue_name: "notifications.info"
      # user/password injected by deployment pipeline (vault-resolved).
      # When BOTH user AND password render empty (dev default), hermez logs the
      # auth failure and falls back to a null auditor — PUT/DELETE operations
      # are NOT audited. Set both for any region that requires an audit trail.
      # user:
      # password:
logstash:
  debug: false
  swift: true
  audit: true
  # Kafka output mirroring the Octobus audit filter.
  # Off by default; enable per-region. Public CA, no client credentials.
  # global.forwarding.kafka.bootstrap_servers must be set in region secrets
  # (comma-separated host:port list, e.g. "broker1:9093,broker2:9093").
  kafka:
    enabled: false
    topic: hermes
    client_id: hermes-logstash
    # Durability-first defaults: every audit event must reach the SIEM.
    # acks=all + idempotence + high retries survive single-broker loss
    # without dropping or duplicating events. Requires broker-side
    # min.insync.replicas >= 2 to actually deliver the durability acks=all
    # promises.
    acks: "all"
    retries: 2147483647
    compression_type: zstd
    ssl_endpoint_identification_algorithm: ""
  jdbc:
    enabled: false
    schedule: "12 0 * * *"
    namespace: metis
    service: metisdb-mariadb
    db: keystone
  # Configure Logstash java heap
  javaopts: "-Dnetworkaddress.cache.ttl=1 -Xmx4g -Xms4g"

## Configure resource requests and limits
## ref: http://kubernetes.io/docs/user-guide/compute-resources/
##
resources_requests_memory_api: "50Mi"
resources_requests_cpu_api: "250m"
resources_requests_memory_es: "18Gi"
resources_requests_cpu_es: "1000m"
resources_requests_memory_ls: "1536Mi"
resources_requests_cpu_ls: "250m"
resources_requests_memory_ki: "256Mi"
resources_requests_cpu_ki: "250m"

# the elasticsearch disk is 100g, a bit less will be the filesystem and 70g should be below 80% where we would alert
# Current value get's multipled, and divided to create the volume size. 
# hermes_elasticsearch_data_retention: DEFINED-IN-REGION-SECRETS
elasticsearch_pv_size: 92

# image_version_hermes_kibana: DEFINED-IN-REGION-SECRETS

hermes_image_version_elasticsearch_manager: "0.9.4"

rabbitmq_notifications:
  ## default: {{.Release.Name}}-rabbitmq.{{.Release.Namespace}}.svc.kubernetes.{{.Values.global.region}}.{{.Values.global.tld}}
  # host: rabbitmq
  kind: "statefulset"
  # required due to circular dependency between keppel, keystone, and hermes
  use_alternate_registry: true
  replicas: 3
  # pod distruption budget
  pdr: 
    enabled: true
    minAvailable: "51%"
  persistence: 
    enabled: true
  metrics:
    enabled: true
    sidecar:
      enabled: false
  global:
    rabbitmq:
      native_sidecar:
        enabled: false
  credentialUpdater:
    enabled: true
  users:
    default:
      user: openstack
      # password: DEFINED-IN-SECRETS
    admin:
      user: admin
      # password: DEFINED-IN-SECRETS
  alerts:
    support_group: observability
  livenessProbe:
    enabled: true
    failureThreshold: 3
    initialDelaySeconds: 60
    periodSeconds: 10
    successThreshold: 1
    timeoutSeconds: 10
  readinessProbe:
    enabled: true
    failureThreshold: 3
    initialDelaySeconds: 60 # default 15, need for crash recovery
    periodSeconds: 10
    successThreshold: 1
    timeoutSeconds: 5
  # service options
  serviceType: LoadBalancer
  serviceExternalTrafficPolicy: Local
  enableSsl: true

# Pod Monitor
exporter:
  enabled: false
  prometheus: openstack

metrics:
  prometheus: openstack

# Deploy hermes Prometheus alerts.
alerts:
  enabled: true
  support-group: observability
  # Name of the Prometheus to which the alerts should be assigned to.
  # Keys = directory names in alerts/ and aggregations/
  prometheus:
    openstack: openstack
    kubernetes: kubernetes
    thanos-ruler: metal

elasticsearch_hermes:
  enabled: false
  http_port: 9200
  cluster_port: 9301
  legacy_service_name: true
  noschedule_port: '63062'
  replicas: '3'
  resources:
    requests:
      cpu: "2000m"
      memory: "20Gi"
    limits:
      cpu: "4000m"
  exporter:
    enabled: true
    prometheus: openstack

elasticsearch_hermes_kibana:
  enabled: false

opensearch_hermes:
  enabled: false

logRouter:
  # Enabling log-router requires three coordinated flags:
  #   1. logRouter.enabled = true        (this flag)
  #   2. hermes.api_enabled = true       (provides the shared postgres + dataplane_config schema)
  #   3. logRouter.swift.enabled = true  (RGW auth via Keystone token — only supported mode)
  # AND .Values.hermes.seed_password must be supplied by the pipeline.
  # templates/log-router-statefulset.yaml enforces flags 2 and 3 with `fail` guards.
  enabled: false
  image_tag: ""
  init_image: "keppel.eu-de-1.cloud.sap/ccloud/shared-app-images/alpine-busybox:3.23-20260415235512"
  replicas: 2

  debug: "false"
  flush_interval: "30s"
  shutdown_timeout: "30s"
  ingest_channel_capacity: "10000"
  max_concurrent_flushes: "100"

  # Read-only login role for hermes's dataplane_config table.
  # The hermes postgres seed creates this user; hermez's migration 001 grants
  # SELECT on dataplane_config directly to the log-router login role.
  # Until that GRANT lands, SELECT fails and log-router falls back to the
  # admin tier (ccadmin/master) — events still flow.
  hermesDb:
    user: log-router

  rabbitmq:
    port: 5672
    queue: "dataplane.audit"
    exchange: ""
    routing_key: "#"
    prefetch: "10"
    # user/password injected by deployment pipeline
    # user:
    # password:

  s3:
    endpoint: ""
    region: ""
    # bucket: S3 bucket name for S3 mode. Also used as the Swift container name
    # when logRouter.swift.enabled=true (LOG_ROUTER_S3_BUCKET → Swift container).
    bucket: ""
    prefix: ""
    # access_key/secret_key removed — log-router authenticates to Ceph RGW
    # via Keystone token (Swift-compatible endpoint) using the hermes service
    # account, not AWS HMAC ec2 credentials.

  swift:
    # enabled: when true, log-router uses Keystone token auth (OS_* env vars)
    # against the Ceph RGW Swift endpoint instead of S3/HMAC credentials.
    # Requires cloud_objectstore_admin role in ccadmin/cloud_admin (see
    # keystone-seed.yaml). Password sourced from .Values.hermes.seed_password.
    enabled: false
    service_type: "object-store-ceph"
    # adminProjectID: the ccadmin/master project UUID. The admin compliance bucket
    # (hermes-audit) lives in this project. Log-router authenticates as
    # ccadmin/cloud_admin for cross-account access, then switches to this account
    # for admin writes. Must be set when swift.enabled=true.
    adminProjectID: ""

  wal:
    storage: 10Gi

  resources:
    requests:
      memory: "256Mi"
      cpu: "100m"
    limits:
      memory: "512Mi"
      cpu: "500m"

hermes-postgresql:
  # Shared postgres backing the hermes dataplane_config table.
  # hermes-api writes; log-router reads via a GRANT SELECT issued by hermez's
  # migration 001 directly to the log-router login user.
  postgresVersion: 17
  databases:
    hermes: {}
  users:
    # Writer role used by the hermes API. Owns the table created by migration 001.
    hermes: {}
    # Read-only consumer for log-router. hermez's migration 001 grants
    # SELECT on dataplane_config to this login user.
    log-router: {}
  config:
    max_connections: 64
  persistence:
    enabled: true
    size: 10Gi
  alerts:
    support_group: observability
