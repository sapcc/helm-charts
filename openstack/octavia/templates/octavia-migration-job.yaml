{{- $proxysql := lookup "v1" "Secret" .Release.Namespace (print .Release.Name "-proxysql-etc") -}}
{{- $serviceaccount := lookup "v1" "ServiceAccount" .Release.Namespace .Release.Name -}}
apiVersion: batch/v1
kind: Job
metadata:
  name: octavia-migration
  labels:
    system: openstack
    type: configuration
    component: octavia
    # hooks are not annotated as belonging to the Helm release, so we cannot rely on owner-info injection
    ccloud/support-group: network-api
    ccloud/service: octavia
  annotations:
    # post-install is necessary so that we can be sure when deploying to a
    # region for the first time that the DB pod is already running.
    "helm.sh/hook": "post-install,pre-upgrade"
    "helm.sh/hook-weight": "-1"
    "helm.sh/hook-delete-policy": "before-hook-creation"
spec:
  template:
    metadata:
      annotations:
        kubectl.kubernetes.io/default-container: octavia-migration
        {{- include "utils.linkerd.pod_and_service_annotation" . | indent 8 }}
    spec:
      {{- if $serviceaccount }}
      serviceAccountName: {{ .Release.Name }}
      {{- end }}
      restartPolicy: OnFailure
    {{- if $proxysql }}
      {{- include "utils.proxysql.job_pod_settings" . | nindent 6 }}
    {{- end }}
      initContainers:
        {{- include "utils.snippets.kubernetes_entrypoint_init_container" (list . (dict "service" (include "octavia.db_service" .))) | indent 8 }}
        {{- if .Values.proxysql.native_sidecar }}
        {{- include "utils.proxysql.container" . | indent 8 }}
        {{- end }}
      containers:
        - name: octavia-migration
          image: {{required ".Values.global.registry is missing" .Values.global.registry}}/loci-octavia:{{required "Values.imageVersion is missing" .Values.imageVersion}}
          imagePullPolicy: IfNotPresent
          command:
            - dumb-init
            - bash
            - -c
            - |
              set -euo pipefail
              octavia-db-manage upgrade head
              {{- include "utils.script.job_finished_hook" . | nindent 14 }}
          env:
            {{- if .Values.sentry.enabled }}
            - name: SENTRY_DSN
              valueFrom:
                secretKeyRef:
                  name: sentry
                  key: octavia.DSN.python
            {{- end }}
          volumeMounts:
            - name: octavia-etc
              mountPath: /etc/octavia/octavia.conf
              subPath: octavia.conf
              readOnly: true
            - name: octavia-etc-confd
              mountPath: /etc/octavia/octavia.conf.d
              readOnly: true
            - name: octavia-etc
              mountPath: /etc/octavia/logging.ini
              subPath: logging.ini
              readOnly: true
            {{- include "utils.trust_bundle.volume_mount" . | indent 12 }}
    {{- if $proxysql }}
            {{- include "utils.proxysql.volume_mount" . | indent 12 }}
        {{- if not .Values.proxysql.native_sidecar }}
        {{- include "utils.proxysql.container" . | indent 8 }}
        {{- end }}
    {{- end }}
      volumes:
        - name: octavia-etc
          configMap:
            name: octavia-etc
        - name: octavia-etc-confd
          secret:
            secretName: {{ .Release.Name }}-secrets
    {{- if $proxysql}}
        {{- include "utils.proxysql.volumes" . | indent 8 }}
    {{- end }}
        {{- include "utils.trust_bundle.volumes" . | indent 8 }}
