{{- range $name, $config := .Values.limes.local_liquids }}
{{- if not $config.skip }}

---

kind: Service
apiVersion: v1

metadata:
  name: liquid-{{ $name }}
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/targets: {{ required ".Values.alerts.prometheus.openstack missing" $.Values.alerts.prometheus.openstack | quote }}

spec:
  selector:
    name: liquid-{{ $name }}
  ports:
    - name: liquid
      port: 80
      protocol: TCP

{{- end }}
{{- end }}
