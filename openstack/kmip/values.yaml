# Default values for kmip.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

global:
  dbUser: kmip
  linkerd_requested: false

owner-info:
  support-group: identity
  service: kmip
  maintainers:
    - Rajiv Mucheli
    - Csaba Seres
  helm-chart-url: https://github.com/sapcc/helm-charts/tree/master/openstack/kmip

pod:
  lifecycle:
    upgrades:
      deployments:
        revisionHistory: 5
        podReplacementStrategy: RollingUpdate
        rollingUpdate:
          maxUnavailable: 0
          maxSurge: 1

replicaCount: 1

kmip:
  pullPolicy: IfNotPresent
  pykmipCoreImageVersion: defined-in-secrets
  pykmipRestApiImageVersion: defined-in-secrets

serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Automatically mount a ServiceAccount's API credentials?
  automount: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/targets: "openstack"

service:
  type: NodePort
  externalIPs: 10.0.0.2
  ports:
    port: 5696
    targetPort: 5696

tlsacme: true

sentry:
  enabled: true

ingress:
  enabled: true

livenessProbe:
  tcpSocket:
    port: 5697
  initialDelaySeconds: 10
  periodSeconds: 10
  timeoutSeconds: 1
  successThreshold: 1
  failureThreshold: 3
readinessProbe:
  tcpSocket:
    port: 5697
  initialDelaySeconds: 10
  periodSeconds: 5
  timeoutSeconds: 1
  successThreshold: 1
  failureThreshold: 3

api_port_internal: "9311"

alerts:
  support_group: identity
  enabled: true
  # Name of the Prometheus to which the alerts should be assigned to.
  prometheus: openstack

mariadb:
  enabled: true
  name: kmip
  root_password: topSecret
  initdb_secret: kmip-initdb
  persistence_claim:
    enabled: true
    autoprovision: true
    name: db-kmip-pvclaim
  databases:
  - kmip
  users:
    kmip:
      name: kmip
      grants:
      - "ALL PRIVILEGES ON kmip.*"
  metrics:
    resources:
      requests:
        memory: 0
        cpu: 0
  alerts:
    support_group: identity
  resources:
    requests:
      memory: 0
      cpu: 0
  backup_v2:
    enable_init_restore: true

pxc_db:
  enabled: false
  name: kmip
  alerts:
    support_group: identity
  ccroot_user:
    enabled: true
  databases:
    - kmip
  users:
    kmip:
      name: kmip
      grants:
        - "ALL PRIVILEGES on kmip.*"
  pxc:
    persistence:
      size: 10Gi
  backup:
    enabled: true
    s3:
      secrets:
        aws_access_key_id: null
        aws_secret_access_key: null
    pitr:
      enabled: true

mysql_metrics:
  db_name: kmip
  db_user: kmip
  customMetrics:
    - name: openstack_kmip_managed_objects_gauge
      help: Number of managed objects grouped by type, policy, sensitivity, and owner
      labels:
      - "object_type"
      - "class_type"
      - "operation_policy_name"
      - "sensitive"
      - "owner"
      - "value"
      query: |
        SELECT object_type, class_type, operation_policy_name, `sensitive`, owner, value, gauge
        FROM (
          SELECT
            CAST(object_type AS CHAR) AS object_type,
            COALESCE(class_type, '') AS class_type,
            COALESCE(operation_policy_name, '') AS operation_policy_name,
            CAST(`sensitive` AS CHAR) AS `sensitive`,
            COALESCE(owner, '') AS owner,
            'redacted' AS value,
            COUNT(*) AS gauge
          FROM managed_objects
          GROUP BY
            object_type,
            class_type,
            operation_policy_name,
            `sensitive`,
            owner
          UNION ALL
          SELECT
            'none' AS object_type,
            'none' AS class_type,
            'none' AS operation_policy_name,
            'none' AS `sensitive`,
            'none' AS owner,
            'redacted' AS value,
            0 AS gauge
          WHERE NOT EXISTS (SELECT 1 FROM managed_objects)
        ) x;
      values:
      - "gauge"
    - name: openstack_kmip_managed_objects_by_state_gauge
      help: Number of cryptographic objects per lifecycle state
      labels:
      - "class_type"
      - "state"
      - "owner"
      query: |
        SELECT class_type, state, owner, gauge
        FROM (
          SELECT
            COALESCE(mo.class_type, '') AS class_type,
            CAST(co.state AS CHAR) AS state,
            COALESCE(mo.owner, '') AS owner,
            COUNT(*) AS gauge
          FROM managed_objects mo
          JOIN crypto_objects co ON mo.uid = co.uid
          GROUP BY mo.class_type, co.state, mo.owner
          UNION ALL
          SELECT
            'none' AS class_type,
            'none' AS state,
            'none' AS owner,
            0 AS gauge
          WHERE NOT EXISTS (
            SELECT 1
            FROM managed_objects mo
            JOIN crypto_objects co ON mo.uid = co.uid
          )
        ) x;
      values:
      - "gauge"
    - name: openstack_kmip_managed_objects_age_seconds_gauge
      help: Age in seconds of the oldest managed object per owner
      labels:
      - "owner"
      query: |
        SELECT owner, gauge
        FROM (
          SELECT
            COALESCE(owner, '') AS owner,
            UNIX_TIMESTAMP() - MIN(initial_date) AS gauge
          FROM managed_objects
          WHERE initial_date > 0
          GROUP BY owner
          UNION ALL
          SELECT
            'none' AS owner,
            0 AS gauge
          WHERE NOT EXISTS (
            SELECT 1 FROM managed_objects WHERE initial_date > 0
          )
        ) x;
      values:
      - "gauge"
    - name: openstack_kmip_total_managed_objects_gauge
      help: Total number of managed objects in the database
      labels: []
      query: |
        SELECT COUNT(*) AS gauge FROM managed_objects;
      values:
      - "gauge"


proxysql:
  mode: ""
