# This Ingress excludes the assets/*_widget.js files from authentication which is done in ingress.yaml
# prettier-ignore
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: elektra-public
  namespace: elektra
  annotations:
    nginx.ingress.kubernetes.io/use-regex: "true"
    ingress.kubernetes.io/use-regex: "true"
    ingress.kubernetes.io/proxy-buffer-size: 16k
    nginx.ingress.kubernetes.io/proxy-buffer-size: 16k
    ingress.kubernetes.io/large-client-header-buffers: "4 16k"
    nginx.ingress.kubernetes.io/large-client-header-buffers: "4 16k"
spec:
  rules:
    - host: {{ .Values.ingress.host }}
      http:
        paths:
          - path: /assets/.*
            pathType: ImplementationSpecific
            backend:
              service:
                name: elektra
                port:
                  number: 80
          - path: /iaas-[a-z0-9]{6}.*
            pathType: ImplementationSpecific
            backend:
              service:
                name: elektra
                port:
                  number: 80
          - path: /system/notifications.*
            pathType: ImplementationSpecific
            backend:
              service:
                name: elektra
                port:
                  number: 80
          - path: /verify-auth-token
            pathType: ImplementationSpecific
            backend:
              service:
                name: elektra
                port:
                  number: 80
