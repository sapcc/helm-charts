kind: Deployment
apiVersion: apps/v1

metadata:
  name: aurora
  annotations:
    # redeploy on secret "aurora-feedback" change so all the aurora pods gets the same secrets
    secret.reloader.stakater.com/reload: "aurora-feedback"

spec:
  selector:
    matchLabels:
      name: aurora
  revisionHistoryLimit: 5
  # prettier-ignore
  replicas: {{ .Values.replica_count }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 2
  template:
    metadata:
      labels:
        name: aurora
      annotations:
        # Ensure that prometheus scrapes the metrics
        prometheus.io/scrape: "true"
        prometheus.io/targets: {{ required ".Values.alerts.prometheus missing" .Values.alerts.prometheus | quote }}
        prometheus.io/port: {{ .Values.port | quote }}
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                topologyKey: kubernetes.io/hostname
                labelSelector:
                  matchExpressions:
                    - key: name
                      operator: In
                      values:
                        - aurora
      # The preStop hook below sleeps 30 seconds, extend the gracePeriod accordingly
      terminationGracePeriodSeconds: 60
      containers:
        - name: server
          image: "{{.Values.global.registry}}/aurora:{{.Values.image.tag}}"
          # prettier-ignore
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: server
              containerPort: {{ .Values.port }}
          env:
{{ include (print .Template.BasePath "/_env.tpl") . | indent 12 }}
          envFrom:
          - secretRef:
              name: aurora-feedback
          livenessProbe:
            httpGet:
              path: /
              port: {{ .Values.port }}
            timeoutSeconds: 10
            failureThreshold: 3
            periodSeconds: 60
            initialDelaySeconds: 60
          readinessProbe:
            httpGet:
              path: /
              port: {{ .Values.port }}
            timeoutSeconds: 5
            periodSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: "500m"
              memory: "800Mi"
            limits:
              cpu: "2000m"
              memory: "2Gi"
