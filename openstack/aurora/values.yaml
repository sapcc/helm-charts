global:
  registry: "DEFINED IN SECRETS"
# Default values for elektra.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.
replica_count: 5
image:
  tag: latest
  pullPolicy: IfNotPresent

owner-info:
  support-group: containers
  service: aurora
  helm-chart-url: https://github.com/sapcc/helm-charts/tree/master/openstack/aurora
  maintainers:
    - Esther Schmitz
    - Hans-Georg Winkler
    - Andreas Pfau

# Optional overrides - if not set, defaults are generated from global.region and global.tld
