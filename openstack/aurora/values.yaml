global:
  registry: "DEFINED IN SECRETS"

# Default values for Aurora.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.
replica_count: 5
image:
  tag: latest
  pullPolicy: IfNotPresent

port: 3000
disable_default_login: "true"
app_title: "Cloud Infrastructure"
enabled_services: "*"

owner-info:
  support-group: containers
  service: aurora
  helm-chart-url: https://github.com/sapcc/helm-charts/tree/master/openstack/aurora
  maintainers:
    - Esther Schmitz
    - Hans-Georg Winkler
    - Andreas Pfau

# Optional overrides - if not set, defaults are generated from global.region and global.tld in templates/_env.tpl
# identity_endpoint: "http://custom-endpoint:5000/v3"  # Defaults to: https://identity-3.{region}.{tld}/v3
# ingress:
#   host: "custom-host.example.com"  # Defaults to: dashboard-aurora.{region}.{tld}

# Ensure ingress is defined so templates can access .Values.ingress.host
ingress: {}

ceph_region: ""

prPreview:
  enabled: false

# Deploy Prometheus alerts.
alerts:
  enabled: true
  # Name of the Prometheus to which the alerts should be assigned to.
  prometheus: openstack
