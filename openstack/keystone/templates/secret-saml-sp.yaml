{{- if .Values.federation.saml.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: keystone-saml-sp
  labels:
    app: {{ template "fullname" . }}
    chart: "{{ .Chart.Name }}-{{ .Chart.Version }}"
    release: "{{ .Release.Name }}"
    heritage: "{{ .Release.Service }}"
    component: keystone
    type: saml-sp-credentials
type: Opaque
data:
  {{- /*
    SP private key and certificate are sourced from Vault via vault-injector
    during deployment. The Vault references in the values are resolved to
    actual PEM content before Helm runs.

    Vault paths follow the convention:
      secrets/<region>/keystone/federation/saml-sp/<tenant>/key
      secrets/<region>/keystone/federation/saml-sp/<tenant>/cert
  */}}
  sp-key.pem: {{ .Values.federation.saml.sp.privateKey | b64enc | quote }}
  sp-cert.pem: {{ .Values.federation.saml.sp.certificate | b64enc | quote }}
{{- end }}
