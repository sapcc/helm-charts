{{- if .Values.federation.saml.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: keystone-saml-sp
  labels:
    app: {{ template "fullname" . }}
    chart: "{{ .Chart.Name }}-{{ .Chart.Version }}"
    release: "{{ .Release.Name }}"
    heritage: "{{ .Release.Service }}"
    component: keystone
    type: saml-sp-credentials
type: Opaque
data:
  {{- /*
    Per-tenant SP private keys and certificates. Each tenant gets its own
    RSA-4096 key pair for signing AuthnRequests and decrypting assertions.

    Values are sourced from Vault via secrets-injector at deploy time.
    Vault paths follow the convention:
      secrets/<region>/keystone/federation/saml-sp/<tenant>/key
      secrets/<region>/keystone/federation/saml-sp/<tenant>/cert
  */}}
  {{- range $tenant := .Values.federation.saml.idp.tenants }}
  {{ $tenant.name }}-sp-key.pem: {{ $tenant.privateKey | b64enc | quote }}
  {{ $tenant.name }}-sp-cert.pem: {{ $tenant.certificate | b64enc | quote }}
  {{- end }}
{{- end }}
