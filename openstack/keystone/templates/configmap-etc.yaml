apiVersion: v1
kind: ConfigMap
metadata:
  name: keystone-etc
  labels:
    app: {{ template "fullname" . }}
    release: "{{ .Release.Name }}"
    heritage: "{{ .Release.Service }}"
    component: keystone
    type: config
data:
  keystone.conf: |
{{ include (print .Template.BasePath "/etc/_keystone.conf.tpl") . | indent 4 }}
  logging.conf: |
{{ include (print .Template.BasePath "/etc/_logging.conf.tpl") . | indent 4 }}
  mpm_event.conf: |
{{ include (print .Template.BasePath "/etc/_mpm_event.conf.tpl") . | indent 4 }}
  policy.yaml: |
{{ include (print .Template.BasePath "/etc/_policy.yaml.tpl") . | indent 4 }}
  sso_callback_template.html: |
{{ include (print .Template.BasePath "/etc/_sso_callback_template.html.tpl") . | indent 4 }}
  wsgi-keystone.conf: |
{{ include (print .Template.BasePath "/etc/_wsgi-keystone.conf.tpl") . | indent 4 }}
{{- if .Values.watcher.enabled }}
  watcher.yaml: |
{{ include (print .Template.BasePath "/etc/_watcher.yaml.tpl") . | indent 4 }}
{{- end }}
{{- if .Values.api.metrics.enabled }}
  statsd-exporter.yaml: |
    mappings:
      # Per-process WSGI worker state pushed by /scripts/wsgi-sampler.py.
      # The pid is carried in the metric name and mapped to a Prometheus label.
      # Prometheus: sum(keystone_wsgi_worker_active_requests) = busy workers;
      # (processes - busy) = free workers.
      - match: "{{ .Values.api.metrics.prefix | default "openstack" }}.wsgi.worker.active_requests.*"
        name: "keystone_wsgi_worker_active_requests"
        match_metric_type: gauge
        labels:
          pid: "$1"
    defaults:
      timer_type: histogram
      buckets: [.025, .1, .25, 1, 2.5]
      match_type: glob
      glob_disable_ordering: false
      ttl: 30s # worker gauges expire if a process stops reporting
{{- end }}
  access_rules.json: |
{{ include (print .Template.BasePath "/etc/_access_rules.json.tpl") . | indent 4 }}
