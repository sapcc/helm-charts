---
apiVersion: v1
kind: Secret
metadata:
  name: sci-smoke-openstack-credentials
  labels:
    app: sci-smoke
type: Opaque
data:
  OS_AUTH_URL: {{ printf "http://identity-3.%s.%s/v3" .Values.global.region .Values.global.tld | b64enc | quote }}
  OS_USERNAME: {{ "sci-smoke-admin" | b64enc | quote }}
  OS_PASSWORD: {{ required "Missing openstack.password value!" .Values.openstack.password | b64enc | quote }}
  OS_USER_DOMAIN_NAME: {{ "tempest" | b64enc | quote }}
  OS_PROJECT_NAME: {{ "sci-smoke" | b64enc | quote }}
  OS_PROJECT_DOMAIN_NAME: {{ "tempest" | b64enc | quote }}

  # Webhook Notification (optional)
  WEBHOOK_URL: {{ "" | b64enc | quote }}
