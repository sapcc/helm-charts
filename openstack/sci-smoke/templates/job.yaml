apiVersion: batch/v1
kind: Job
metadata:
  name: sci-smoke-test
  labels:
    app: sci-smoke
spec:
  backoffLimit: 0
  ttlSecondsAfterFinished: 1800  # Clean up after 30 minutes
  template:
    metadata:
      labels:
        app: sci-smoke
    spec:
      restartPolicy: Never
      containers:
        - name: sci-smoke
          image: "{{required ".Values.global.registry is missing" .Values.global.registry}}/{{ .Values.image }}:{{ .Values.imageTag }}"
          args:
            - "--flavor=$(FLAVOR)"
            - "--image=$(IMAGE)"
            - "--network-name=$(NETWORK_NAME)"
            - "--network-cidr=$(NETWORK_CIDR)"
            - "--floating-network=$(FLOATING_NETWORK_NAME)"
            - "--server-name=$(SERVER_NAME)"
            - "--availability-zone=$(AVAILABILITY_ZONE)"
            - "--aggregate=$(AGGREGATE)"
            - "--timeout=$(TIMEOUT)"
            - "--cleanup=$(CLEANUP)"
            - "--reuse=$(REUSE)"
            - "--skip-preflight=$(SKIP_PREFLIGHT)"
            - "--skip-connectivity=$(SKIP_CONNECTIVITY)"
            - "--skip-migration=$(SKIP_MIGRATION)"
            - "--skip-cold-migration=$(SKIP_COLD_MIGRATION)"
            - "--skip-live-migration=$(SKIP_LIVE_MIGRATION)"
            - "--min-instances=$(MIN_INSTANCES)"
            - "--min-cores=$(MIN_CORES)"
            - "--min-ram=$(MIN_RAM)"
            - "--webhook-url=$(WEBHOOK_URL)"
          envFrom:
            # OpenStack credentials from Secret
            - secretRef:
                name: sci-smoke-openstack-credentials
            # Test configuration from ConfigMap
            - configMapRef:
                name: sci-smoke-config
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"
