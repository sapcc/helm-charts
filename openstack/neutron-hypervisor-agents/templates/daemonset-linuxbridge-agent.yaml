{{- $hypervisor := merge .Values.defaults.network.linuxbridge .Values.defaults.network.common }}
kind: DaemonSet
apiVersion: apps/v1
metadata:
  name: neutron-linuxbridge-agent
  labels:
    system: openstack
    type: backend
    component: neutron
spec:
  revisionHistoryLimit: {{ .Values.pod.lifecycle.upgrades.daemonsets.revisionHistory }}
  updateStrategy:
    {{- .Values.pod.lifecycle.upgrades.daemonsets.updateStrategy | toYaml | nindent 4 }}
  selector:
    matchLabels:
      name: neutron-linuxbridge-agent
  template:
    metadata:
      labels:
        {{- tuple . "neutron" "linuxbridge-agent" | include "helm-toolkit.snippets.kubernetes_metadata_labels" | nindent 8 }}
        name: neutron-linuxbridge-agent
        alert-tier: os
        alert-service: neutron
        ml2-driver: "linuxbridge"
      annotations:
        configmap-etc-hash: {{ include (print $.Template.BasePath "/configmap-etc.yaml") . | sha256sum }}
        secret-etc-hash: {{ include (print $.Template.BasePath "/secret-etc.yaml") . | sha256sum }}
    spec:
      affinity:
        {{- toYaml $hypervisor.pod.affinity | nindent 8 }}
      hostNetwork: true
      hostAliases:
      {{- range $ip := .Values.rabbitmq.externalIPs }}
      - ip: {{ $ip }}
        hostnames:
        - {{ required "Please set rabbitmq.host" $.Values.rabbitmq.host }}
      {{- end }}
      tolerations:
      {{- range $k, $v :=  $hypervisor.pod.tolerations }}
      - # {{ $k }}
      {{- toYaml $v | nindent 8 }}
      {{- end }}
      nodeSelector:
      {{- range $k, $v := $hypervisor.pod.nodeSelector }}
        {{ $k }}: {{ $v }}
      {{- end }}
      initContainers:
      - name: load-ebtable-nat
        image: {{ required ".Values.global.registry is missing" .Values.global.registry }}/loci-neutron:{{ .Values.imageVersion | required "Please set imageVersion similar" }}
        securityContext:
          privileged: true
        command:
          - sh
          - -c
        args:
          - |-
            set -xe
            chroot /host modprobe ebtable_nat
        volumeMounts:
          - name: host
            mountPath: "/host"
      containers:
        - name: neutron-linuxbridge-agent
          image: {{ required ".Values.global.registry is missing" .Values.global.registry }}/loci-neutron:{{ .Values.imageVersion | required "Please set imageVersion or similar" }}
          imagePullPolicy: IfNotPresent
          securityContext:
            capabilities:
              add:
                - NET_ADMIN
                - SYS_ADMIN
                - DAC_OVERRIDE
                - DAC_READ_SEARCH
                - SYS_PTRACE
          command: ["dumb-init", "/bin/bash", "-c"]
          args:
            - |
              set -xe
              # Ensure that the iptables legacy binaries are used
              if [ -x /usr/sbin/iptables-legacy ]; then
                update-alternatives --set iptables /usr/sbin/iptables-legacy || true
                update-alternatives --set ip6tables /usr/sbin/ip6tables-legacy || true
                update-alternatives --set ebtables /usr/sbin/ebtables-legacy || true
              fi

              export OS_LINUX_BRIDGE__PHYSICAL_INTERFACE_MAPPINGS="${HOSTNAME/*-}:bond0"
              # Start the linuxbridge agent
              exec neutron-linuxbridge-agent --debug
          env:
            - name: OS_SECURITYGROUP__FIREWALL_DRIVER
              value: "iptables"
          volumeMounts:
          - mountPath: /etc/neutron
            name: etcneutron
          - mountPath: /etc/neutron/neutron-linuxbridge-agent.conf.d
            name: etcneutronagentconfd
          - mountPath: /etc/neutron/neutron.conf
            name: etc
            subPath: neutron.conf
          - mountPath: /etc/neutron/logging.ini
            name: etc
            subPath: logging.ini
          - mountPath: /etc/neutron/rootwrap.conf
            name: etc
            subPath: rootwrap.conf
          - mountPath: /etc/neutron/neutron.conf.d/ml2.conf
            name: etc
            subPath: ml2-conf.conf
          - mountPath: /etc/neutron/neutron.conf.d/vpod.conf
            name: etc-vpod
            subPath: vpod.conf
          - mountPath: /etc/neutron/neutron.conf.d/secret.conf
            name: etc-secrets
            subPath: secret.conf
          - mountPath: /etc/sudoers
            name: etc
            subPath: sudoers
          - mountPath: /run
            name: run
          - mountPath: /lib/modules
            name: modules
            readOnly: true
        {{- if $hypervisor.deploy_dhcp_agent }}
        - name: neutron-dhcp-agent
          image: {{$.Values.global.registry}}/loci-neutron:{{$.Values.imageVersionNetworkAgentDHCP | default $.Values.imageVersionNetworkAgent | default $.Values.imageVersion | required "Please set neutron.imageVersionNetworkAgentDHCP or similar"}}
          imagePullPolicy: IfNotPresent
          command: ["dumb-init", "neutron-dhcp-agent", "--config-file", "/etc/neutron/neutron.conf", "--config-dir", "/etc/neutron/secrets", "--config-file", "/etc/neutron/dhcp-agent.ini", "--config-file", "/etc/neutron/az.conf"]
          env:
            - name: DEBUG_CONTAINER
              value: "false"
            - name: SPT_NOENV
              value: "yes,please"
            - name: PYTHONWARNINGS
              value: "ignore:Unverified HTTPS request"
            {{- include "utils.trust_bundle.env" $ | indent 12 }}
          readinessProbe:
            exec:
              command: ["neutron-dhcp-readiness", "-config-file", "/etc/neutron/neutron.conf", "--config-file", "/etc/neutron/secrets/neutron-common-secrets.conf"]
            initialDelaySeconds: 30
            periodSeconds: 60
            timeoutSeconds: 10
          securityContext:
            privileged: true
          resources:
{{ toYaml $.Values.pod.resources.dhcp_agent | indent 12 }}
          volumeMounts:
            - name: metadata-proxy
              mountPath: /run/metadata_proxy
            - name: modules
              mountPath: /lib/modules
              readOnly: true
            - name: logvol
              mountPath: /dev/log
              readOnly: false
            - name: etc-neutron-dhcp-agent
              mountPath: /etc/neutron
              readOnly: true
            - name: etc
              mountPath: /etc/sudoers
              subPath: sudoers
              readOnly: true
            {{- include "utils.trust_bundle.volume_mount" $ | indent 12 }}
        - name: neutron-metadata-agent
          image: {{$.Values.global.registry}}/loci-neutron:{{$.Values.imageVersionNetworkAgentMetadata | default $.Values.imageVersionNetworkAgent | default $.Values.imageVersion | required "Please set neutron.imageVersionNetworkAgentMetadata or similar"}}
          imagePullPolicy: IfNotPresent
          command: ["dumb-init", "neutron-metadata-agent", "--config-file", "/etc/neutron/neutron.conf", "--config-dir", "/etc/neutron/secrets","--config-file", "/etc/neutron/metadata-agent.ini"]
          env:
            - name: PYTHONWARNINGS
              value: "ignore:Unverified HTTPS request"
            - name: DEBUG_CONTAINER
              value: "false"
            {{- include "utils.trust_bundle.env" $ | indent 12 }}
          resources:
{{  toYaml $.Values.pod.resources.metadata_agent | indent 12 }}
          volumeMounts:
            - name: metadata-proxy
              mountPath: /run/metadata_proxy
            - name: etc-neutron-metadata-agent
              mountPath: /etc/neutron
              readOnly: true
            {{- include "utils.trust_bundle.volume_mount" $ | indent 12 }}
        {{- end }}
      dnsConfig:
        searches:
          - {{ .Values.global.region }}.{{ .Values.global.tld }}
      volumes:
      - name: logvol
        hostPath:
          path: /dev/log
      - name: metadata-proxy
        emptyDir: {}
      - name: run
        hostPath:
          path: /run
      - name: etcneutron
        emptyDir:
          medium: Memory
      - name: etcneutronagentconfd
        emptyDir:
          medium: Memory
      - name: modules
        hostPath:
          path: /lib/modules
      - name: etc-secrets
        secret:
          secretName: {{ .Release.Name }}-etc
      - name: etc
        configMap:
          name: {{ .Release.Name }}-etc
      - name: etc-vpod
        configMap:
          name: {{ .Release.Name }}-etc-vpod
      - name: host
        hostPath:
            path: "/"
      - name: etc-neutron-dhcp-agent
        projected:
          defaultMode: 420
          sources:
          - configMap:
              name: {{ .Release.Name }}-etc
              items:
              - key: neutron.conf
                path: neutron.conf
              - key: logging.ini
                path: logging.ini
              - key: rootwrap.conf
                path: rootwrap.conf
              - key: dnsmasq.conf
                path: dnsmasq.conf
              - key: dhcp.filters
                path: rootwrap.d/dhcp.filters
              - key: dhcp-agent.ini
                path: dhcp-agent.ini
              - key: az.conf
                path: az.conf
          - secret:
              name: neutron-common-secrets
              items:
                - key: neutron-common-secrets.conf
                  path: secrets/neutron-common-secrets.conf
      - name: etc-neutron-metadata-agent
        projected:
          defaultMode: 420
          sources:
          - configMap:
              name: {{ .Release.Name }}-etc
              items:
              - key: neutron.conf
                path: neutron.conf
              - key: logging.ini
                path: logging.ini
              - key: metadata-agent.ini
                path: metadata-agent.ini
          - secret:
              name: neutron-common-secrets
              items:
                - key: neutron-common-secrets.conf
                  path: secrets/neutron-common-secrets.conf
          - secret:
              name: neutron-metadata-secrets
              items:
                - key: neutron-metadata-secrets.conf
                  path: secrets/neutron-metadata-secrets.conf
