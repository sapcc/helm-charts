---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  labels:
    app: nova
    release: nova
  name: nova-vspc-pvclaim
  labels:
    ccloud/support-group: compute-storage-api
    ccloud/service: nova
spec:
  # nova-vspc requires ReadWriteMany
  accessModes:
  - ReadWriteMany
  resources:
    requests:
      storage: 10Gi
