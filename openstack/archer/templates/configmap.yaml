apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "archer.fullname" . }}-etc
  labels:
    {{- include "archer.labels" . | nindent 4 }}
data:
  archer.ini: |
    {{- include (print .Template.BasePath "/etc/_archer.ini.tpl") . | nindent 4 }}
  policy.json: |
    {{- include (print .Template.BasePath "/etc/_policy.json.tpl") . | nindent 4 }}
  notification.tmpl: |
    {{ include (print .Template.BasePath "/etc/_notification_body.tmpl.tpl") . | nindent 4 }}
  subject.tmpl: |
    {{ include (print .Template.BasePath "/etc/_notification_subject.tmpl.tpl") . | nindent 4 }}