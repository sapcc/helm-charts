{{- $az_long := "" }}
{{- $cp := "" }}
{{- $apod := "" }}
{{- range $agent := .Values.agents.cp }}
  {{- range $az, $apods := $.Values.global.apods }}
    {{- if has $agent.physical_network $apods }}
      {{- $az_long = $az }}
      {{- $apod = $agent.physical_network }}
      {{- $cp = $agent.physical_network }}
    {{- end }}
  {{- end }}

  {{- if not $apod }}
    {{- $az_long = $.Values.global.default_availability_zone }}
    {{- $cp = $agent.physical_network }}
  {{- end }}

  {{- $name := printf "archer-network-agent-%s" $cp }}
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ $name }}
  labels:
    {{- include "archer.labels" $ | nindent 4 }}
spec:
  updateStrategy:
  {{- if or (eq $.Values.global.region "qa-de-1") (eq $.Values.global.region "qa-de-2") }}
    type: RollingUpdate
{{- else }}
    type: OnDelete
{{- end }}
  replicas: {{ $agent.replicas }}
  selector:
    matchLabels:
      {{- include "archer.selectorLabels" $ | nindent 6 }}
      app.kubernetes.io/component: agent
      name: {{ $name }}
  template:
    metadata:
      {{- with $.Values.podAnnotations }}
      annotations:
        kubectl.kubernetes.io/default-container: archer-network-agent
        checksum/etc: {{ include (print $.Template.BasePath  "/configmap.yaml") $ | sha256sum }}
        k8s.v1.cni.cncf.io/networks: '[{ "name": "cbr1-bridge", "interface":"{{ $agent.network_interface | default $.Values.cp_network_interface }}" }]'
        {{- include "utils.linkerd.pod_and_service_annotation" $ | indent 8 }}
        config.linkerd.io/skip-inbound-ports: "1-65535"
        config.linkerd.io/skip-outbound-ports: "1-65535"
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "archer.labels" $ | nindent 8 }}
        app.kubernetes.io/component: agent
        name: {{ $name }}
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 50
              podAffinityTerm:
                topologyKey: kubernetes.io/hostname
                labelSelector:
                  matchExpressions:
                    - key: component
                      operator: In
                      values:
                        - agent
            - weight: 100
              podAffinityTerm:
                topologyKey: kubernetes.cloud.sap/host
                labelSelector:
                  matchExpressions:
                    - key: component
                      operator: In
                      values:
                        - agent
      nodeSelector:
        multus: bond1
        topology.kubernetes.io/zone: {{ $az_long }}
        {{- with $apod }}
        kubernetes.cloud.sap/apod: {{ $apod }}
        {{- end }}
      initContainers:
        - name: wait-for-server
          image: "{{ $.Values.global.registry }}/kubernetes-entrypoint:{{ $.Values.image.kubernetes_entrypoint_version }}"
          env:
            - name: NAMESPACE
              value: {{ $.Release.Namespace }}
            - name: DEPENDENCY_SERVICE
              value: {{ include "archer.fullname" $ }}
            - name: COMMAND
              value: "true"
      containers:
        - name: archer-network-agent
          securityContext:
            privileged: true
          image: "{{ $.Values.global.registry }}/archer:{{ $.Values.image.tag }}"
          command: ["/usr/bin/archer-ni-agent"]
          args: ["--config-file=/etc/archer/archer.ini"]
          imagePullPolicy: {{ $.Values.image.pullPolicy }}
          env:
            - name: GOMEMLIMIT
              valueFrom:
                resourceFieldRef:
                  containerName: archer-network-agent
                  resource: limits.memory
            - name: GOMAXPROCS
              valueFrom:
                resourceFieldRef:
                  containerName: archer-network-agent
                  resource: limits.cpu
            - name: SENTRY_DSN
              valueFrom:
                secretKeyRef:
                  name: sentry
                  key: archer.DSN
            - name: AVAILABILITY_ZONE
              value: {{ $az_long }}
            - name: PHYSICAL_NETWORK
              value: {{ $cp }}
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: archer-pguser-archer
                  key: postgres-password
            - name: OS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: archer-secret
                  key: service_user_password
          ports:
            - name: metrics
              containerPort: {{ required ".Values.metrics.port missing" $.Values.metrics.port }}
              protocol: TCP
          resources:
            {{- toYaml $.Values.resources.ni_agent | nindent 12 }}
          volumeMounts:
            - name: etc-archer
              mountPath: /etc/archer
              readOnly: true
        - name: neutron-linuxbridge-agent
          image: "{{ $.Values.global.registry }}/loci-neutron:{{ $.Values.image.neutron_version | default "latest" }}"
          imagePullPolicy: IfNotPresent
          command: ["dumb-init", "neutron-linuxbridge-agent", "--config-file", "/etc/neutron/neutron.conf", "--config-dir", "/etc/neutron/secrets", "--config-file", "/etc/neutron/ml2-conf.ini", "--config-file", "/etc/neutron/linux-bridge.ini"]
          env:
            - name: SENTRY_DSN
              valueFrom:
                secretKeyRef:
                  name: sentry
                  key: neutron.DSN.python
            - name: PYTHONWARNINGS
              value: "ignore:Unverified HTTPS request"
            - name: OS_LINUX_BRIDGE__PHYSICAL_INTERFACE_MAPPINGS
              value: {{ $cp }}:{{ required "A valid .Values.cp_network_interface required!" $.Values.cp_network_interface }}
            - name: OS_GLOBAL__HOST
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          readinessProbe:
            exec:
              command: ["neutron-agent-liveness", "-config-file", "/etc/neutron/neutron.conf", "--config-file", "/etc/neutron/secrets/neutron-common-secrets.conf", "-agent-type", "Linux bridge agent"]
            initialDelaySeconds: 30
            periodSeconds: 60
            timeoutSeconds: 10
          securityContext:
            capabilities:
              add:
                - NET_ADMIN
                - SYS_ADMIN
                - DAC_OVERRIDE
                - DAC_READ_SEARCH
                - SYS_PTRACE
          resources:
            {{- toYaml $.Values.resources.linuxbridge_agent | nindent 12 }}
          volumeMounts:
            - mountPath: /lib/modules
              name: modules
              readOnly: true
            - name: etc-neutron-linuxbridge-agent
              mountPath: /etc/neutron
              readOnly: true
            - name: neutron-etc
              mountPath: /etc/sudoers
              subPath: sudoers
              readOnly: true
      volumes:
        - name: modules
          hostPath:
            path: /lib/modules
        - name: neutron-etc
          configMap:
            name: neutron-etc
        - name: etc-neutron-linuxbridge-agent
          projected:
            defaultMode: 420
            sources:
            - configMap:
                name: neutron-etc
                items:
                  - key: neutron.conf
                    path: neutron.conf
                  - key: logging.conf
                    path: logging.conf
                  - key: rootwrap.conf
                    path: rootwrap.conf
                  - key: ml2-conf.ini
                    path: ml2-conf.ini
                  - key: linux-bridge.ini
                    path: linux-bridge.ini
            - secret:
                name: neutron-common-secrets
                items:
                  - key: neutron-common-secrets.conf
                    path: secrets/neutron-common-secrets.conf
        - name: etc-archer
          projected:
            defaultMode: 420
            sources:
              - configMap:
                  name: archer-etc
                  items:
                    - key: archer.ini
                      path: archer.ini
{{- end }}
