apiVersion: "openstack.stable.sap.cc/v1"
kind: OpenstackSeed
metadata:
  name: ceph-seed

spec:
  requires:
  - monsoon3/domain-default-seed
  - monsoon3/domain-ccadmin-seed

  roles:
  - name: cloud_objectstore_admin
  - name: cloud_objectstore_viewer
  - name: objectstore_admin
  - name: objectstore_viewer

  services:
    - name:        ceph
      type:        object-store-ceph
      description: 'CEPH Object Store'
      enabled:     true
      endpoints:
        - region:    '{{ $.Values.global.region }}'
          interface: public
          enabled:   true
          url:       'https://rgw.st1.{{ $.Values.global.region }}.{{ $.Values.global.tld }}/swift/v1/AUTH_%(tenant_id)s'

  domains:
    - name: Default
      users:
        - name: ceph
          description: CEPH Object Store Service
          password: '{{ $.Values.global.ceph_service_password }}'
    - name: Default
      projects:
      - name: admin
        role_assignments:
        - user: ceph@Default
          role: service # for s3tokens auth access
    - name: Default
      users:
        - name: ceph-barbican
          description: CEPH Object Store Service
          password: '{{ $.Values.global.ceph_barbican_service_password }}'
    - name: Default
      projects:
      - name: admin
        role_assignments:
        - user: ceph-barbican@Default
          role: reader # ceph-barbican needs as minimal as possible access role, the access to keys is managed by barbican ACL

    - name: ccadmin
      projects:
      - name: cloud_admin
        role_assignments:
        - group: CCADMIN_CLOUD_ADMINS
          role: cloud_objectstore_admin
      - name: master
        role_assignments:
        - group: CCADMIN_CLOUD_ADMINS
          role: objectstore_admin
        - group: CCADMIN_DOMAIN_ADMINS
          role: objectstore_admin
        - user: db_backup@Default
          role: objectstore_admin
