# NOTE: Helm is only used to create this secret. Its contents are filled by templates/cronjob-generate-issuer-key.yaml.
#
# Setting up the secret in this way avoids having to give a "create secret" RBAC permission to the cronjob.
# These are particularly problematic because "create" cannot be restricted to specific resource names.
# Ref: <https://stackoverflow.com/a/65203104>

apiVersion: v1
kind: Secret
metadata:
  name: keppel-issuer-key
data: {}
