{{- if not (or .Values.keppel.slim (.Values.global.region | hasPrefix "qa-")) }}

# Because Keppel is instrumental for the continued availability of many other
# Docker images, we want to be able to start it reliably and fast. To ensure this,
# this daemonset (through its existence) keeps the Keppel image permanently
# pulled on all nodes.
#
# The condition above skips this daemonset on QA and lab regions, because high
# availability is not a concern there. By omitting the daemonset there, the
# Helm deployment will finish faster since it does not have to wait on it.
# This also avoids wasting resources in small lab clusters.

# To get the same image references as generated by the relevant library
# subcharts, we call their helper functions. This requires setting up
# some of our own values to look like those that exist within the scope of the
# library subchart:

{{- $amended_values := merge (dict "useAlternateRegion" true) .Values }}
{{- $amended_context := merge (dict "Values" $amended_values) . }}

kind: DaemonSet
apiVersion: apps/v1

metadata:
  name: keep-image-pulled
  annotations:
    # This pod intentionally has extremely tight resource requests.
    # The VerticalPodAutoscaler should never waste resources by increasing those.
    vpa-butler.cloud.sap/update-mode: "Off"

spec:
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1000 # allow updating all pods at once
  selector:
    matchLabels:
      name: keep-image-pulled
  template:
    metadata:
      labels:
        name: keep-image-pulled
      annotations:
        linkerd.io/inject: disabled # This pod does not interact with the network.
    spec:
      # NOTE: observed resource usage in eu-de-1 (as of 2020-02-26)
      # - no measurable CPU usage once started
      # - RAM max. 1.5 MiB (but it turns out that k8s itself runs into OOM when
      #   starting a container with less than 16-32 MiB RAM limit)
      containers:
        - name: keppel
          image: "{{ include "keppel_image" . }}"
          imagePullPolicy: IfNotPresent
          {{ include "tmplKeepImagePulled" . }}
        - name: postgres
          image: "{{ .Values.global.registryAlternateRegion }}/postgres-ng:{{.Values.postgresql.imageTag}}"
          imagePullPolicy: IfNotPresent
          {{ include "tmplKeepImagePulled" . }}
        - name: postgres-kubectl
          image: "{{ include "postgresql-ng.shared-app-images.ref" (tuple $amended_context "alpine-kubectl" "latest") }}"
          imagePullPolicy: IfNotPresent
          {{ include "tmplKeepImagePulled" . }}
        - name: postgres-psql
          image: "{{ include "postgresql-ng.shared-app-images.ref" (tuple $amended_context "alpine-psql" "latest") }}"
          imagePullPolicy: IfNotPresent
          {{ include "tmplKeepImagePulled" . }}
        - name: valkey # NOTE: redis-metrics is a separate pod, so we don't need to care about it
          image: {{ include "redis.shared-app-images.ref" (tuple $amended_context "alpine-valkey" "9.0") }}
          imagePullPolicy: IfNotPresent
          {{ include "tmplKeepImagePulled" . }}
        - name: valkey-kubectl
          image: {{ include "redis.shared-app-images.ref" (tuple $amended_context "alpine-kubectl" "latest") }}
          imagePullPolicy: IfNotPresent
          {{ include "tmplKeepImagePulled" . }}
        - name: nginx
          image: {{ include "shared-app-images.ref_using_alternate" (tuple $ "alpine-nginx" "mainline-slim") }}
          imagePullPolicy: IfNotPresent
          {{ include "tmplKeepImagePulled" . }}
      priorityClassName: important-infrastructure
      # sleep(1) doesn't seem to react to SIGTERM at all, so skip right ahead to SIGKILL
      terminationGracePeriodSeconds: 1

{{- end }}
