{{- if .Values.tls.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ .Release.Name }}-tls-bootstrap
  labels:
    app: {{ template "fullname" . }}
    chart: "{{ .Chart.Name }}-{{ .Chart.Version }}"
    release: "{{ .Release.Name }}"
    component: barbican
    type: tls-bootstrap
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  template:
    spec:
      restartPolicy: Never
      serviceAccountName: {{ .Release.Name }}-tls-manager
      containers:
        - name: tls-bootstrap
          image: {{ .Values.tls.lifecycle.image }}:{{ .Values.tls.lifecycle.imageTag }}
          imagePullPolicy: IfNotPresent
          args:
            - --mode=bootstrap
            - --namespace={{ .Release.Namespace }}
            - --secret-name={{ .Values.tls.secretName | default "barbican-tls" }}
            - --key-algorithm={{ .Values.tls.keyAlgorithm | default "ECDSAP256" }}
            - --issuer-name={{ .Values.tls.issuerName | default "digicert-issuer" }}
            - --issuer-kind={{ .Values.tls.issuerKind | default "ClusterDigicertIssuer" }}
            - --issuer-group={{ .Values.tls.issuerGroup | default "certmanager.cloud.sap" }}
            - --common-name={{ include "barbican_api_endpoint_host_public" . }}
            - --san-dns={{ include "barbican_api_endpoint_host_public" . }}
            - --envelope-encryption={{ .Values.tls.envelopeEncryption | default "none" }}
  backoffLimit: 3
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Release.Name }}-tls-manager
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ .Release.Name }}-tls-manager
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "create", "update"]
  - apiGroups: ["cert-manager.io"]
    resources: ["certificaterequests"]
    verbs: ["create", "get", "delete", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ .Release.Name }}-tls-manager
subjects:
  - kind: ServiceAccount
    name: {{ .Release.Name }}-tls-manager
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ .Release.Name }}-tls-manager
{{- end }}
