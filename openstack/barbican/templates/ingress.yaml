kind: Ingress
apiVersion: networking.k8s.io/v1

metadata:
  name: barbican-api
  namespace:  {{.Release.Namespace}}
  labels:
    app: {{ template "fullname" . }}
    chart: "{{ .Chart.Name }}-{{ .Chart.Version }}"
    release: "{{ .Release.Name }}"
    heritage: "{{ .Release.Service }}"
    system: openstack
    type: api
    component: barbican
  annotations:
  {{- if and .Values.tls.enabled .Values.tls.passthrough }}
    ingress.kubernetes.io/ssl-passthrough: "true"
    nginx.ingress.kubernetes.io/ssl-passthrough: "true"
    ingress.kubernetes.io/backend-protocol: "HTTPS"
    nginx.ingress.kubernetes.io/backend-protocol: "HTTPS"
    config.linkerd.io/skip-inbound-ports: "443"
    disco: "true"
  {{- else if .Values.tlsacme }}
    kubernetes.io/tls-acme: "true"
    disco: "true"
  {{- end }}
  {{- include "utils.linkerd.ingress_annotation" . | indent 4 }}
spec:
  tls:
     - secretName: tls-{{ include "barbican_api_endpoint_host_public" . | replace "." "-" }}
       hosts: [{{include "barbican_api_endpoint_host_public" .}}]
  rules:
    - host: {{include "barbican_api_endpoint_host_public" .}}
      http:
        paths:
        - path: /
          pathType: Prefix
          backend:
            service:
              name: barbican-api
              port:
                {{- if and .Values.tls.enabled .Values.tls.passthrough }}
                number: 443
                {{- else }}
                number: {{.Values.api_port_internal}}
                {{- end }}
