kind: Ingress
apiVersion: networking.k8s.io/v1

metadata:
  name: barbican-api
  namespace:  {{.Release.Namespace}}
  labels:
    app: {{ template "fullname" . }}
    chart: "{{ .Chart.Name }}-{{ .Chart.Version }}"
    release: "{{ .Release.Name }}"
    heritage: "{{ .Release.Service }}"
    system: openstack
    type: api
    component: barbican
  annotations:
  {{- if .Values.tlsacme }}
    kubernetes.io/tls-acme: "true"
    disco: "true"
  {{- end }}
  {{- include "utils.linkerd.ingress_annotation" . | indent 4 }}
    # Return 404 for favicon.ico requests to prevent Pecan content-type errors
    # Browsers automatically request /favicon.ico which triggers:
    # "Controller 'on_get' does not support content_type 'image/vnd.microsoft.icon'"
    nginx.ingress.kubernetes.io/server-snippet: |
      location = /favicon.ico {
        return 404;
        access_log off;
        log_not_found off;
      }
spec:
  tls:
     - secretName: tls-{{ include "barbican_api_endpoint_host_public" . | replace "." "-" }}
       hosts: [{{include "barbican_api_endpoint_host_public" .}}]
  rules:
    - host: {{include "barbican_api_endpoint_host_public" .}}
      http:
        paths:
        - path: /
          pathType: Prefix
          backend:
            service:
              name: barbican-api
              port:
                number: {{.Values.api_port_internal}}
