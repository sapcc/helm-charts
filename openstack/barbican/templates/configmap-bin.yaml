apiVersion: v1
kind: ConfigMap
metadata:
  name: barbican-bin
  labels:
    app: {{ template "fullname" . }}
    chart: "{{ .Chart.Name }}-{{ .Chart.Version }}"
    release: "{{ .Release.Name }}"
    heritage: "{{ .Release.Service }}"
    system: openstack
    component: barbican
    type: config
data:
  barbican-api.sh: |
{{ include (print .Template.BasePath "/bin/_barbican_api.sh.tpl") . | indent 4 }}