apiVersion: templates.gatekeeper.sh/v1
kind: ConstraintTemplate
metadata:
  name: gkregionvaluemissing
spec:
  crd:
    spec:
      names:
        kind: GkRegionValueMissing
      validation:
        # Schema for the `parameters` field
        openAPIV3Schema:
          type: object
          properties:
            helmManifestParserURL:
              type: string

  targets:
    - target: admission.k8s.gatekeeper.sh
      code:
        - engine: Rego
          source:
            version: "v1"
            rego: |
              package gkregionvaluemissing

              {{ .Files.Get "lib/add-support-labels.rego" | nindent 14 }}
              {{ .Files.Get "lib/helm-release.rego" | nindent 14 }}
              {{ .Files.Get "lib/validation.rego" | nindent 14 }}

              iro := input.review.object
              release := parse_k8s_object(iro, input.parameters.helmManifestParserURL)

              violation contains {"msg": release.error} if {
                  release.error != ""
              }

              violation contains {"msg": from_helm_release(release, msg)} if {
                  release.error == ""

                  not is_region_name(object.get(release, ["values", "global", "region"], ""))

                  msg := "missing or invalid .Values.global.region value"
              }
