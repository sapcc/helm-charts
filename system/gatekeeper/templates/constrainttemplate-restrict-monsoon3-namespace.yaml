apiVersion: templates.gatekeeper.sh/v1
kind: ConstraintTemplate
metadata:
  name: gkrestrictmonsoon3namespace
spec:
  crd:
    spec:
      names:
        kind: GkRestrictMonsoon3Namespace
      validation:
        openAPIV3Schema:
          type: object
          properties:
            helmManifestParserURL:
              type: string
            patterns:
              type: object
              properties:
                monsoon3:
                  type: string
                monsoon3global:
                  type: string
  targets:
    - target: admission.k8s.gatekeeper.sh
      libs:
        - |
          {{ .Files.Get "lib/helm-release.rego" | nindent 10 }}
      rego: |
        package restrictnewnamespace
        import data.lib.helm_release
        
        iro := input.review.object
        n := iro.metadata.namespace
        release := helm_release.parse_k8s_object(iro, input.parameters.helmManifestParserURL)

        violation[{"msg": release.error}] { 
          release.error != ""
        }

        violation[{"msg": msg}] {
          iro.kind == "Secret"

          pattern := input.parameters.patterns[n]

          matches := regex.find_all_string_submatch_n("^sh\\.helm\\.release\\.v1\\.(.*?)\\.v\\d+$", iro.metadata.name, 2)
          release_name = matches[0][1]
          
          not regex.match(pattern, release_name)

          msg := sprintf("helm release %q is not allowed in namespace %q", [release_name, n])
        }

        

  