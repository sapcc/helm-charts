apiVersion: templates.gatekeeper.sh/v1
kind: ConstraintTemplate
metadata:
  name: gkimagesfromnonkeppel
spec:
  crd:
    spec:
      names:
        kind: GkImagesFromNonKeppel

  targets:
    - target: admission.k8s.gatekeeper.sh
      code:
        - engine: Rego
          source:
            version: "v1"
            rego: |
              package imagesfromnonkeppel

              {{ .Files.Get "lib/add-support-labels.rego" | nindent 14 }}
              {{ .Files.Get "lib/traversal.rego" | nindent 14 }}

              iro := input.review.object
              containers := find_container_specs(iro)

              violation contains {"msg": from_k8s_object(iro, msg)} if {
                  container := containers[_]
                  image := container.image

                  not regex.match("^keppel\\.[^/.]*\\.cloud.sap/", image)
                  msg := sprintf("container %q uses an image that is not from a Keppel registry: %s", [container.name, image])
              }
