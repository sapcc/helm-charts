{{/*
  Constraint objects cannot be included in the Helm manifest directly.
  See templates/configmap-delayed-payloads.yaml and templates/job-apply-delayed-payloads.yaml for details.
*/}}
{{- define "owner-info-on-helm-releases" -}}

apiVersion: constraints.gatekeeper.sh/v1beta1
kind: GkOwnerInfoOnHelmReleases
metadata:
  name: owner-info-on-helm-releases
  annotations:
    {{- include "sources" (tuple "owner-info-on-helm-releases" "owner-info-on-helm-releases") | indent 4 }}
    {{- include "docstring" (tuple $ "GkOwnerInfoOnHelmReleases") | indent 4 }}
  labels:
    severity: 'error'
spec:
  enforcementAction: {{ if (eq .Values.cluster_type "baremetal" "cloudshell" "concourse" "gh-actions" "internet" "scaleout") }}deny{{ else }}dryrun{{ end }}
  match: {{ include "match_active_helm_releases" . | indent 4 }}
  parameters:
    helmManifestParserURL: {{ include "helm_manifest_parser_url" . | quote }}
    knownBrokenReleases:
      # This is a list of Helm releases (in the format "namespace/name") that
      # are TEMPORARILY exempted from the owner-info requirement because
      # their owners do not belong to a support group yet.
      #
      # When adding entries, add a comment with the date of inclusion in the
      # list and the responsible owners for that deployment. We will use this
      # to regularly follow up with the service owners to check on the state of
      # their support group assignment.
      {{- if eq .Values.cluster_type "test" }}
      - testing/known-broken # used for testing the exception mechanism
      {{- end }}
      {{- if and (eq .Values.cluster_type "baremetal") (eq .Values.global.region "qa-de-1") }}
      - owner-label-injector-staging/owner-label-injector-staging   # staging deployment of owner-label-injector
      - owner-label-injector-staging/test-chart-without-owner-info  # dummy chart for testing for owner-label-injector
      - owner-label-injector-staging/test-chart-with-owner-info     # dummy chart for testing for owner-label-injector
      {{- end }}
      # All of the following are Greenhouse Plugin Deployments.
      # Until we have the full integration of Greenhouse Ownership, owner-label-injector and gatekeeper as GH Plugins we need these.
      # Reference issue tracking the above: https://github.wdf.sap.corp/PlusOne/greenhouse/issues/899
      {{- if eq .Values.cluster_name "eu-de-3" }}
      - cert-manager/cert-manager
      - digicert/digicert-issuer
      - disco/disco
      - go-pmtud/go-pmtud
      - ingress-nginx/ingress-nginx
      - kube-monitoring/kube-monitoring
      - kube-monitoring/perses
      - kube-monitoring/thanos
      - ldap-named-user/ldap-named-user
      - logs/logs
      - network-cc/blackbox-exporter
      - network-cc/json-exporter
      - network-cc/kube-monitoring-cc
      - network-cc/net-cc-prometheus-config
      - network-cc/snmp-exporter
      - network-cc/ssh-exporter
      - network-cc/thanos-net-cc
      - network-cc/thanos-net-cc-rules
      - network-wan/blackbox-exporter
      - network-wan/json-exporter
      - network-wan/kube-monitoring-wan
      - network-wan/net-wan-prometheus-config
      - network-wan/snmp-exporter
      - network-wan/ssh-exporter
      - network-wan/thanos-net-wan
      - network-wan/thanos-net-wan-rules
      - network/netbox-iface-connection-exporter
      - network/netbox-sd
      - network/thanos-net
      - opensearch-logs/opensearch
      - priority-class/priority-class
      - secrets-injector/secrets-injector
      - controlplane-operations/controlplane-operations
      {{- end }}

{{- end -}}
