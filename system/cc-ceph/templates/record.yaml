{{- $externalIP := "" }}                                                                                                                                                                                         
{{- if .Values.objectstore.service.externalIP }}                                                                                                                                                                 
  {{- $externalIP = .Values.objectstore.service.externalIP }}                                                                                                                                                    
{{- else if .Values.objectstore.service.annotations }}                                                                                                                                                           
  {{- $annotationVal := index .Values.objectstore.service.annotations "projectcalico.org/loadBalancerIPs" }}                                                                                                     
  {{- if $annotationVal }}                                                                                                                                                                                       
    {{- $externalIP = index (fromJsonArray $annotationVal) 0 }}                                                                                                                                                  
  {{- end }}                                                                                                                                                                                                     
{{- end }}

{{- range $key, $record := .Values.objectstore.gateway.dnsNames }}
{{- if or (not $.Values.dnsNamesSkipRecord) (not (has $record $.Values.dnsNamesSkipRecord)) }}
{{- if $externalIP }}
---
apiVersion: disco.stable.sap.cc/v1
kind: Record
metadata:
  name: "{{ $record }}"
spec:
  type: A
  record: {{ $externalIP }}
  hosts:
    - "{{ $record }}."
{{- if or (not $.Values.dnsNamesSkipRecordWildcard) (not (has $record $.Values.dnsNamesSkipRecordWildcard)) }}
---
apiVersion: disco.stable.sap.cc/v1
kind: Record
metadata:
  name: "{{ $record }}-wildcard"
spec:
  type: CNAME
  record: "{{ $record }}."
  hosts:
    - "*.{{ $record }}."
{{- end }}
{{- end }}
{{- end }}
{{- end }}
