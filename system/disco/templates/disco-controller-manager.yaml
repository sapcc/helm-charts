apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: disco
    {{- with .Values.controllerLabels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- if .Values.reloader.enabled }}
  annotations:
    secret.reloader.stakater.com/reload: "disco-config"
  {{- end }}
  name: disco-controller-manager
spec:
  replicas: 1
  selector:
    matchLabels:
      app: disco
  template:
    metadata:
      annotations:
        kubectl.kubernetes.io/default-container: manager
        checksum/config: {{ include (print $.Template.BasePath "/disco-config.yaml") . | sha256sum }}
      labels:
        app: disco
        {{- if .Values.remote.enable }}
        networking.gardener.cloud/to-shoot-apiserver: allowed
        networking.resources.gardener.cloud/to-kube-apiserver-tcp-443: allowed
        {{- end }}
        {{- with .Values.controllerLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      containers:
      - command:
        - /disco
        env:
        - name: NAMESPACE
        {{- if .Values.remote.enable }}
          value: {{ .Values.remote.leaderElectionNamespace | default "kube-system" | quote }}
        {{- else }}
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        {{- end }}
        {{- if .Values.remote.enable }}
        - name: KUBERNETES_SERVICE_HOST
          value: {{ required "remote.apiServerHost is required when remote.enable is true" .Values.remote.apiServerHost | quote }}
        - name: KUBERNETES_SERVICE_PORT
          value: {{ .Values.remote.apiServerPort | default "443" | quote }}
        {{- end }}
        envFrom:
        - secretRef:
            name: disco-config
        image: {{ required ".Values.image.repository missing" .Values.image.repository }}:{{ required ".Values.image.tag missing" .Values.image.tag }}
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8081
          initialDelaySeconds: 15
          periodSeconds: 20
        name: manager
        ports:
        {{- if .Values.webhooks.enabled }}
        - containerPort: 9443
          name: webhook-server
          protocol: TCP
        {{- end }}
        - containerPort: 8080
          name: https
          protocol: TCP
        readinessProbe:
          httpGet:
            path: /readyz
            port: 8081
          initialDelaySeconds: 5
          periodSeconds: 10
        securityContext:
          allowPrivilegeEscalation: false
        {{- if or .Values.webhooks.enabled .Values.remote.enable }}
        volumeMounts:
        {{- if .Values.webhooks.enabled }}
        - mountPath: /tmp/k8s-webhook-server/serving-certs
          name: cert
          readOnly: true
        {{- end }}
        {{- if .Values.remote.enable }}
        - name: remote-kubeconfig
          mountPath: /var/run/secrets/kubernetes.io/serviceaccount
          readOnly: true
        {{- end }}
        {{- end }}
      securityContext:
        runAsNonRoot: true
      serviceAccountName: {{ .Values.serviceAccount.name }}
      terminationGracePeriodSeconds: 10
      {{- if or .Values.webhooks.enabled .Values.remote.enable }}
      volumes:
      {{- if .Values.webhooks.enabled }}
      - name: cert
        secret:
          defaultMode: 420
          secretName: tls-disco-webhook-service
      {{- end }}
      {{- if .Values.remote.enable }}
      - name: remote-kubeconfig
        secret:
          secretName: disco-remote-kubeconfig
          items:
            - key: token
              path: token
            - key: bundle.crt
              path: ca.crt
      {{- end }}
      {{- end }}
