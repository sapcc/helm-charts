image:
  repository: keppel.global.cloud.sap/ccloud-ghcr-io-mirror/sapcc/disco
  tag: v2.0.0

# Remote Kubernetes cluster configuration (for Gardener token-requestor)
remote:
  # Enable remote kubeconfig mounting for connecting to a remote Kubernetes cluster
  enabled: false
  # API server host for the remote cluster (required when enabled: true)
  # Example: api.my-shoot.cp.internal.garden.example.com
  apiServerHost: ""
  # API server port for the remote cluster (defaults to 443)
  apiServerPort: "443"
  # Namespace on the shoot cluster where the ServiceAccount, namespaced RBAC resources,
  # and leader election lease are created.
  shootNamespace: kube-system

# These labels will be set on the DISCO controller manager
controllerLabels: {}

# Only an ingress with this annotation will be considered.
ingressAnnotation: "disco"

# Enable the OpenStack seed for the service user described in the openstack section below.
seed:
  enabled: false

rbac:
  # Create RBAC resources (ClusterRoles, ClusterRoleBindings, Roles, RoleBindings)
  create: true

serviceAccount:
  # Create the service account
  create: true
  # Name of the service account to use (if create is false, this must be an existing service account)
  name: disco-controller-manager

# Cert-manager resources for webhook TLS certificates.
# The disco binary always starts a webhook server and requires TLS certificates
# at startup. Keep this enabled unless you are providing your own TLS secret
# named tls-disco-webhook-service.
certManager:
  # Create cert-manager Issuer and Certificate resources
  enabled: true

# Webhook admission configuration for Record validation.
# Controls whether the MutatingWebhookConfiguration and webhook Service are
# created, making the webhook active for admission. Can be set to false to run
# disco without intercepting Record creates/updates (e.g. remote deployments),
# while still starting the webhook server with TLS certs from cert-manager.
webhooks:
  # Create webhook service and MutatingWebhookConfiguration
  enabled: true

# Metrics service for Prometheus scraping
metrics:
  # Create the metrics service
  enabled: true
  # Port to expose metrics on.
  port: 8080
  # Name of the Prometheis by which the metrics will be scraped.
  # Can be a comma (,) separated list.
  prometheus: kubernetes

# Reload the controller manager when the disco-config secret changes.
reloader:
  enabled: true

# Annotations for the Deployment metadata.
# By default, triggers a rolling restart when the disco-config secret changes.
deploymentAnnotations:
  secret.reloader.stakater.com/reload: "disco-config"

# Credentials of the service user who creates the recordsets in OpenStack Designate.
openstack: {}
  # authURL:            DEFINED-IN-SECRETS
  # regionName:         DEFINED-IN-SECRETS
  # username:           DEFINED-IN-SECRETS
  # userDomainName:     DEFINED-IN-SECRETS
  # password:           DEFINED-IN-SECRETS
  # projectName:        DEFINED-IN-SECRETS
  # projectDomainName:  DEFINED-IN-SECRETS
  # The name of the zone in which the record should be created
  # zoneName:           DEFINED-IN-SECRETS

# Record which should be used. e.g.: 'ingress.domain.tld.'. Must be provided.
# record: DEFINED-IN-SECRETS

# The resources provide boundaries for the VPA, by which the actual resource requirements are configured based on usage.
resources:
  requests:
    cpu: 10m
    memory: 64Mi
  limits:
    cpu: 500m
    memory: 500Mi

owner-info:
  support-group: containers
  service: disco
  helm-chart-url: https://github.com/sapcc/helm-charts/tree/master/system/disco
  maintainers:
    - Abhijith Ravindra
    - David Gogl
