---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ .Release.Name }}
spec:
  accessModes:
    {{- .Values.pvc.bind.accessModes | toYaml | nindent 4 }}
  resources:
    requests:
      storage: {{ .Values.pvc_size }}
{{ if .Values.sshd.enabled }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ .Release.Name }}-sshd
spec:
  accessModes:
    {{- .Values.pvc.sshd.accessModes | toYaml | nindent 4 }}
  resources:
    requests:
      storage: 10Mi
{{ end }}
