cluster:
  type: ""          # test | baremetal | postfix | <other>; selects monsoon3 pattern-set and gates prometheusrule policy
  layer: ""         # cluster layer label (e.g. prod, qa)
  region: ""        # expected region for region-value-* policies (e.g. eu-de-1)

policies:
  restrictMonsoon3Namespace:
    enabled: true
    enforcementAction: dryrun

  outdatedMirrors:
    enabled: true
    enforcementAction: dryrun

  prometheusruleAlertLabels:
    enabled: true
    enforcementAction: dryrun

  # requires gatekeeper-doop (helm-manifest-parser) at runtime
  regionValueMismatch:
    enabled: false
    enforcementAction: dryrun
    helmManifestParserURL: ""

  # requires gatekeeper-doop (helm-manifest-parser) at runtime
  regionValueMissing:
    enabled: false
    enforcementAction: dryrun
    helmManifestParserURL: ""

tests:
  enabled: false
