cluster:
  type: baremetal
  layer: qa
  region: eu-de-1

policies:
  restrictMonsoon3Namespace:
    enabled: true
    enforcementAction: dryrun

  outdatedMirrors:
    enabled: true
    enforcementAction: dryrun

  prometheusruleAlertLabels:
    enabled: true
    enforcementAction: dryrun

  # requires gatekeeper-doop (helm-manifest-parser) at runtime; not gator-testable
  regionValueMismatch:
    enabled: false
    enforcementAction: dryrun
    helmManifestParserURL: ""

  # requires gatekeeper-doop (helm-manifest-parser) at runtime; not gator-testable
  regionValueMissing:
    enabled: false
    enforcementAction: dryrun
    helmManifestParserURL: ""

tests:
  enabled: true
