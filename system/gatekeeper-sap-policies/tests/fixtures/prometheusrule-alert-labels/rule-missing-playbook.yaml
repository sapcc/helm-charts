apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: rule-missing-playbook
  namespace: default
spec:
  groups:
    - name: example.alerts
      rules:
        - alert: SomethingCritical
          expr: up == 0
          labels:
            severity: critical
            support_group: myteam
          annotations:
            description: something is wrong
            summary: something is wrong
