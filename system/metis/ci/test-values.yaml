global:
  region: test-region-1
  registry: my-registry
  registryAlternateRegion: my-alternate-region-registry
  dockerHubMirrorAlternateRegion: dockerhub-alternate-mirror
  metis:
    user: test123
    password: test123
  backup_v2:
    aws_access_key_id: test123
    aws_secret_access_key: test123
  mariadb:
    backup_v2:
      aws:
        region: aws-europe-1
        sse_customer_key: test123
mariadb:
  root_password: secret123

mysql_metrics:
  enabled: true
  db_name: metis
  db_user: metis
  db_password: testpass

metis:
  openstackPassword: testpass

metisSync:
  enabled: true
  common:
    binlog_max_reconnect_attempts: 60
    resources:
      requests:
        memory: 30Mi
        cpu: 50m
      limits:
        memory: 2Gi
        cpu: 500m
  backups:
    - name: "some-openstack-service"
      root_password: "some-secret"
      parse_schema: true
      databases:
        - "schema-one"
      resources:
        requests:
          memory: 50Mi
          cpu: 100m
        limits:
          memory: 4Gi
          cpu: 5000m
