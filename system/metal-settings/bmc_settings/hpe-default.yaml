#
# Default iLO BMC settings for HPE ProLiant models (iLO 5, iLO 6, iLO 7).
# Applied via BMCSettingsSet after the BMC firmware reaches the target version.
# Rendered as a Helm template via tpl — clusterConfig values are substituted at chart render time.
#
# Keys use the format "METHOD /redfish/endpoint" — the controller issues the
# corresponding HTTP call and compares the current response against the desired body.
# Multiple settings for the same endpoint are merged into a single JSON body.
#
# Values sourced from: baremetal-config/hpe/*/bmc/defaultsettings.yml
settings:
  # License key — $(LicenseKey) fetched at reconcile time from the Secret named by clusterConfig.hpeLicenseSecretName.
  "POST /redfish/v1/Managers/1/LicenseService/": '{"LicenseKey": "$(LicenseKey)"}'
  # Network protocol: HTTP port, IPMI, disable XML responses
  "PATCH /redfish/v1/managers/1/networkprotocol": '{"HTTP": {"Port": 1080}, "IPMI": {"ProtocolEnabled": true}, "Oem": {"Hpe": {"XMLResponseEnabled": false}}}'
  # SNMP: disable SNMPv1, disable cold-start trap broadcast
  "PATCH /redfish/v1/Managers/1/SnmpService": '{"SNMPv1Enabled": false, "Oem": {"Hpe": {"SNMPColdStartTrapBroadcast": false}}}'
  # iLO Federation: disable discovery; require login for iLO RBSU
  "PATCH /redfish/v1/Managers/1": '{"Oem": {"Hpe": {"FederationConfig": {"iLOFederationManagement": "Disabled", "MulticastDiscovery": "Disabled"}, "RequiredLoginForiLORBSU": true}}}'
  # Account service: enforce password complexity
  "PATCH /redfish/v1/accountservice": '{"Oem": {"Hpe": {"EnforcePasswordComplexity": true}}}'
  # NTP servers
  "PATCH /redfish/v1/Managers/1/DateTime": '{"StaticNTPServers": ["timehost1.global.cloud.sap", "timehost2.global.cloud.sap"]}'
  # Security: Production state, disable weak ciphers
  "PATCH /redfish/v1/Managers/1/SecurityService": '{"SecurityState": "Production", "DisableWeakCiphers": true}'
  # ServerFQDN — $(NodeName)r-$(BB) resolved at reconcile time from BMC labels (e.g. "node002r-ap052")
  "PATCH /redfish/v1/systems/1": '{"Oem": {"Hpe": {"ServerFQDN": "$(NodeName)r-$(BB)"}}}'
variables:
  # BmcName: resolved from the BMCSettings object itself — used as the name for objectFieldRef lookups below.
  - key: BmcName
    valueFrom:
      fieldRef:
        fieldPath: spec.BMCRef.name
  # NodeName: short node name from BMC label (e.g. "node002").
  - key: NodeName
    valueFrom:
      objectFieldRef:
        kind: BMC
        name: $(BmcName)
        fieldPath: metadata.labels[kubernetes.metal.cloud.sap/nodename]
  # BB: building block identifier from BMC label (e.g. "ap052").
  - key: BB
    valueFrom:
      objectFieldRef:
        kind: BMC
        name: $(BmcName)
        fieldPath: metadata.labels[kubernetes.metal.cloud.sap/bb]
  # LicenseKey: iLO license fetched at reconcile time — secret name configured via Helm values.
  - key: LicenseKey
    valueFrom:
      secretKeyRef:
        name: {{ .Values.clusterConfig.hpeLicenseSecretName }}
        namespace: {{ .Values.clusterConfig.managedNamespace }}
        key: licenseKey
