{{- if and .Values.bmcSettings.enabled .Values.clusterConfig.hpeLicenseSecretName }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.clusterConfig.hpeLicenseSecretName }}
  namespace: {{ .Values.clusterConfig.managedNamespace }}
type: Opaque
stringData:
  # HPE iLO license key — referenced by hpe-default.yaml via secretKeyRef at reconcile time.
  licenseKey: {{ .Values.clusterConfig.hpeLicenseKey | quote }}
{{- end }}
