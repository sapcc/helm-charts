{{- if and .Values.bmcSettings.enabled .Values.clusterConfig.configMapName }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Values.clusterConfig.configMapName }}
  namespace: {{ .Values.clusterConfig.managedNamespace }}
data:
  # syslogServer: cluster-local syslog endpoint, e.g. "remotesyslog.cc.qa-de-1.cloud.sap"
  syslogServer: {{ .Values.clusterConfig.syslogServer | quote }}
{{- end }}
