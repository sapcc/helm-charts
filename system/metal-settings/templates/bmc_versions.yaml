{{- if .Values.bmcVersions.enabled }}
{{- range $vendor, $vendorConfig := .Values.machines }}
{{- if $vendorConfig }}

{{/* Vendor filtering */}}
{{- if include "metal-settings.shouldInclude" (dict "item" $vendor "filters" $.Values.bmcVersions.filters.vendors) }}
{{- $processedModels := dict }}
{{- range $entryName, $entry := $vendorConfig.models }}
{{- if $entry.bmc }}
{{- $model := $entry.model }}
{{- $version := $entry.bmc.version }}
{{- $modelKey := printf "%s-%s" $model $version }}
{{- $versionParams := (get $entry.bmc "versionParams") | default dict }}
{{- $serverFilters := (get $versionParams "serverFilter") | default (dict "included" (list) "excluded" (list)) }}

{{/* Skip if we've already processed this model-version combination */}}
{{- if not (hasKey $processedModels $modelKey) }}
{{- $_ := set $processedModels $modelKey true }}

{{/* Model and Version filtering */}}
{{- if and (include "metal-settings.shouldInclude" (dict "item" $model "filters" $.Values.bmcVersions.filters.models)) (include "metal-settings.shouldInclude" (dict "item" $version "filters" $.Values.bmcVersions.filters.versions)) }}
apiVersion: metal.ironcore.dev/v1alpha1
kind: BMCVersionSet
metadata:
  {{- $defaultName := printf "%s-%s" (lower $vendor) (lower $model) }}
  {{- $resourceName := (get $versionParams "setMetadataName") | default $defaultName }}
  name: {{ $resourceName }}
spec:
  bmcSelector:
    matchLabels:
      kubernetes.metal.cloud.sap/type: {{ $model }}
{{- $serverMatchExpressions := include "metal-settings.serverMatchExpressions" (dict "serverFilters" $serverFilters) }}
{{- if $serverMatchExpressions }}
{{ $serverMatchExpressions | nindent 4 }}
{{- end }}
  bmcVersionTemplate:
    serverMaintenancePolicy: OwnerApproval
    version: {{ $version | quote }}
    image:
      URI: {{ $entry.bmc.imageURI | quote }}
      transferProtocol: "HTTPS"
{{- if gt (int $.Values.bmcVersions.RetryPolicy) 0 }}
    retryPolicy: {{ $.Values.bmcVersions.RetryPolicy }}
{{- end }}
---
{{- end }}
{{- end }}
{{- end }}
{{- end }}
{{- end }}
{{- end }}
{{- end }}
{{- end }}
