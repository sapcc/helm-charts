suite: bios_versions
templates:
  - bios_versions.yaml
tests:
  #############################################################################
  # BASELINE TESTS - Verify current behavior (deploy everything)
  #############################################################################

  - it: should render BIOSVersionSet resources by default
    asserts:
      - hasDocuments:
          count: 26
      - isKind:
          of: BIOSVersionSet

  - it: should render Dell resources
    asserts:
      - containsDocument:
          kind: BIOSVersionSet
          apiVersion: metal.ironcore.dev/v1alpha1
          name: dell-poweredge-r7615-1-11-2
          any: true

  - it: should render HPE resources
    asserts:
      - containsDocument:
          kind: BIOSVersionSet
          apiVersion: metal.ironcore.dev/v1alpha1
          name: hpe-proliant-dl560-gen11-u59-2.50
          any: true

  - it: should render Lenovo resources
    asserts:
      - containsDocument:
          kind: BIOSVersionSet
          apiVersion: metal.ironcore.dev/v1alpha1
          name: lenovo-thinksystem-sr850p-tee184h
          any: true

  - it: should set correct serverSelector labels
    documentSelector:
      path: metadata.name
      value: dell-poweredge-r7615-1-11-2
    asserts:
      - equal:
          path: spec.serverSelector.matchLabels["kubernetes.metal.cloud.sap/type"]
          value: poweredge-r7615

  - it: should set serverMaintenancePolicy to OwnerApproval
    documentSelector:
      path: metadata.name
      value: dell-poweredge-r7615-1-11-2
    asserts:
      - equal:
          path: spec.biosVersionTemplate.serverMaintenancePolicy
          value: OwnerApproval

  #############################################################################
  # FILTERING TESTS
  #############################################################################

  # UC1: Filter by vendor
  - it: should only render Dell resources when vendors.included is set
    set:
      biosVersions.filters.vendors.included: [dell]
    asserts:
      - containsDocument:
          kind: BIOSVersionSet
          apiVersion: metal.ironcore.dev/v1alpha1
          name: dell-poweredge-r7615-1-11-2
          any: true
      - not: true
        containsDocument:
          kind: BIOSVersionSet
          apiVersion: metal.ironcore.dev/v1alpha1
          name: hpe-proliant-dl560-gen11-u59-2.50
          any: true
      - not: true
        containsDocument:
          kind: BIOSVersionSet
          apiVersion: metal.ironcore.dev/v1alpha1
          name: lenovo-thinksystem-sr850p-tee184h
          any: true

  # UC2: Filter by model
  - it: should only render specific model when models.included is set
    set:
      biosVersions.filters.models.included: [poweredge-r7615]
    asserts:
      - containsDocument:
          kind: BIOSVersionSet
          apiVersion: metal.ironcore.dev/v1alpha1
          name: dell-poweredge-r7615-1-11-2
          any: true
      - not: true
        containsDocument:
          kind: BIOSVersionSet
          apiVersion: metal.ironcore.dev/v1alpha1
          name: dell-poweredge-r660-7-20-60-50
          any: true

  # UC3: Combination filter
  - it: should filter by vendor and model combination
    set:
      biosVersions.filters.vendors.included: [dell]
      biosVersions.filters.models.included: [poweredge-r7615]
    asserts:
      - hasDocuments:
          count: 1
      - containsDocument:
          kind: BIOSVersionSet
          apiVersion: metal.ironcore.dev/v1alpha1
          name: dell-poweredge-r7615-1-11-2
          any: true

  # UC4: Disable entirely
  - it: should render no resources when enabled is false
    set:
      biosVersions.enabled: false
    asserts:
      - hasDocuments:
          count: 0

  # UC5: Exclude model
  - it: should exclude specific model when models.excluded is set
    set:
      biosVersions.filters.vendors.included: [dell]
      biosVersions.filters.models.excluded: [poweredge-r7615]
    asserts:
      - not: true
        containsDocument:
          kind: BIOSVersionSet
          apiVersion: metal.ironcore.dev/v1alpha1
          name: dell-poweredge-r7615-1-11-2
          any: true
      - containsDocument:
          kind: BIOSVersionSet
          apiVersion: metal.ironcore.dev/v1alpha1
          name: dell-poweredge-r660-2-4-4
          any: true

  # UC6: Exclude vendor
  - it: should exclude vendor when vendors.excluded is set
    set:
      biosVersions.filters.vendors.excluded: [hpe]
    asserts:
      - containsDocument:
          kind: BIOSVersionSet
          apiVersion: metal.ironcore.dev/v1alpha1
          name: dell-poweredge-r7615-1-11-2
          any: true
      - not: true
        containsDocument:
          kind: BIOSVersionSet
          apiVersion: metal.ironcore.dev/v1alpha1
          name: hpe-proliant-dl560-gen11-u59-2.50
          any: true
