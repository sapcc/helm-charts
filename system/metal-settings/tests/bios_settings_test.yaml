suite: bios_settings
templates:
  - bios_settings.yaml
tests:
  #############################################################################
  # BASELINE TESTS - Verify current behavior (deploy everything)
  #############################################################################

  - it: should render BIOSSettingsSet resources by default
    asserts:
      - hasDocuments:
          count: 105
      - isKind:
          of: BIOSSettingsSet

  - it: should render Dell resources
    asserts:
      - containsDocument:
          kind: BIOSSettingsSet
          apiVersion: metal.ironcore.dev/v1alpha1
          name: dell-poweredge-r7615-sci-k8s-controlplane
          any: true

  - it: should render HPE resources
    asserts:
      - containsDocument:
          kind: BIOSSettingsSet
          apiVersion: metal.ironcore.dev/v1alpha1
          name: hpe-proliant-dl560-gen11-sci-k8s-controlplane
          any: true

  - it: should render Lenovo resources
    asserts:
      - containsDocument:
          kind: BIOSSettingsSet
          apiVersion: metal.ironcore.dev/v1alpha1
          name: lenovo-thinksystem-sr850p-sci-k8s-controlplane
          any: true

  - it: should set correct serverSelector labels
    documentSelector:
      path: metadata.name
      value: dell-poweredge-r7615-sci-k8s-controlplane
    asserts:
      - equal:
          path: spec.serverSelector.matchLabels["kubernetes.metal.cloud.sap/type"]
          value: poweredge-r7615
      - equal:
          path: spec.serverSelector.matchLabels["kubernetes.metal.cloud.sap/cluster-type"]
          value: sci-k8s-controlplane

  - it: should set serverMaintenancePolicy to OwnerApproval
    documentSelector:
      path: metadata.name
      value: dell-poweredge-r7615-sci-k8s-controlplane
    asserts:
      - equal:
          path: spec.biosSettingsTemplate.serverMaintenancePolicy
          value: OwnerApproval

  #############################################################################
  # FILTERING TESTS
  #############################################################################

  # UC1: Filter by vendor
  - it: should only render Dell resources when vendors.included is set
    set:
      biosSettings.filters.vendors.included: [dell]
    asserts:
      - containsDocument:
          kind: BIOSSettingsSet
          apiVersion: metal.ironcore.dev/v1alpha1
          name: dell-poweredge-r7615-sci-k8s-controlplane
          any: true
      - not: true
        containsDocument:
          kind: BIOSSettingsSet
          apiVersion: metal.ironcore.dev/v1alpha1
          name: hpe-proliant-dl560-gen11-sci-k8s-controlplane
          any: true
      - not: true
        containsDocument:
          kind: BIOSSettingsSet
          apiVersion: metal.ironcore.dev/v1alpha1
          name: lenovo-thinksystem-sr850p-sci-k8s-controlplane
          any: true

  # UC2: Filter by model
  - it: should only render specific model when models.included is set
    set:
      biosSettings.filters.models.included: [poweredge-r7615]
    asserts:
      - containsDocument:
          kind: BIOSSettingsSet
          apiVersion: metal.ironcore.dev/v1alpha1
          name: dell-poweredge-r7615-sci-k8s-controlplane
          any: true
      - not: true
        containsDocument:
          kind: BIOSSettingsSet
          apiVersion: metal.ironcore.dev/v1alpha1
          name: dell-poweredge-r660-sci-k8s-controlplane
          any: true
      - not: true
        containsDocument:
          kind: BIOSSettingsSet
          apiVersion: metal.ironcore.dev/v1alpha1
          name: hpe-proliant-dl560-gen11-sci-k8s-controlplane
          any: true

  # UC3: Filter by clusterType
  - it: should only render specific clusterType when clusterTypes.included is set
    set:
      biosSettings.filters.clusterTypes.included: [sci-k8s-controlplane]
    asserts:
      - containsDocument:
          kind: BIOSSettingsSet
          apiVersion: metal.ironcore.dev/v1alpha1
          name: dell-poweredge-r7615-sci-k8s-controlplane
          any: true
      - not: true
        containsDocument:
          kind: BIOSSettingsSet
          apiVersion: metal.ironcore.dev/v1alpha1
          name: dell-poweredge-r7615-sci-k8s-storage
          any: true
      - not: true
        containsDocument:
          kind: BIOSSettingsSet
          apiVersion: metal.ironcore.dev/v1alpha1
          name: dell-poweredge-r7615-sci-k8s-runtime
          any: true

  # UC4: Combination filter
  - it: should filter by vendor and model combination
    set:
      biosSettings.filters.vendors.included: [dell]
      biosSettings.filters.models.included: [poweredge-r7615]
      biosSettings.filters.clusterTypes.included: [sci-k8s-controlplane]
    asserts:
      - hasDocuments:
          count: 1
      - containsDocument:
          kind: BIOSSettingsSet
          apiVersion: metal.ironcore.dev/v1alpha1
          name: dell-poweredge-r7615-sci-k8s-controlplane
          any: true

  # UC5: Disable entirely
  - it: should render no resources when enabled is false
    set:
      biosSettings.enabled: false
    asserts:
      - hasDocuments:
          count: 0

  # UC6: Include vendor but exclude model
  - it: should exclude specific model when models.excluded is set
    set:
      biosSettings.filters.vendors.included: [dell]
      biosSettings.filters.models.excluded: [poweredge-r7615]
    asserts:
      - not: true
        containsDocument:
          kind: BIOSSettingsSet
          apiVersion: metal.ironcore.dev/v1alpha1
          name: dell-poweredge-r7615-sci-k8s-controlplane
          any: true
      - containsDocument:
          kind: BIOSSettingsSet
          apiVersion: metal.ironcore.dev/v1alpha1
          name: dell-poweredge-r660-sci-k8s-controlplane
          any: true

  # UC7: Exclude specific vendor
  - it: should exclude vendor when vendors.excluded is set
    set:
      biosSettings.filters.vendors.excluded: [hpe]
    asserts:
      - containsDocument:
          kind: BIOSSettingsSet
          apiVersion: metal.ironcore.dev/v1alpha1
          name: dell-poweredge-r7615-sci-k8s-controlplane
          any: true
      - containsDocument:
          kind: BIOSSettingsSet
          apiVersion: metal.ironcore.dev/v1alpha1
          name: lenovo-thinksystem-sr850p-sci-k8s-controlplane
          any: true
      - not: true
        containsDocument:
          kind: BIOSSettingsSet
          apiVersion: metal.ironcore.dev/v1alpha1
          name: hpe-proliant-dl560-gen11-sci-k8s-controlplane
          any: true

  # UC8: Exclude clusterType
  - it: should exclude clusterType when clusterTypes.excluded is set
    set:
      biosSettings.filters.clusterTypes.excluded: [cc-kvm-compute]
    asserts:
      - containsDocument:
          kind: BIOSSettingsSet
          apiVersion: metal.ironcore.dev/v1alpha1
          name: dell-poweredge-r7615-sci-k8s-controlplane
          any: true
      - not: true
        containsDocument:
          kind: BIOSSettingsSet
          apiVersion: metal.ironcore.dev/v1alpha1
          name: dell-poweredge-r7615-cc-kvm-compute
          any: true
