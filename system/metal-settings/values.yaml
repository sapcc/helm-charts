# Regional filtering configuration for selective deployment
# Use these settings to control which resources are deployed in each region
#
# FILTER BEHAVIOR:
# - included: [] (empty) = include all items (default behavior)
# - included: [dell, hpe] = ONLY include items in this list
# - excluded: [lenovo] = exclude these items (takes precedence over included)
# - If an item appears in both included and excluded, excluded wins
#
# CLUSTER TYPES & RESOURCE GENERATION:
# - BIOSSettingsSet/BMCSettingsSet: Generate one resource PER clusterType listed below
#   (e.g., if a model has 6 clusterTypes, it generates 6 separate Settings resources)
# - BIOSVersionSet/BMCVersionSet: Generate one resource PER model+version
#   (clusterTypes field is ignored)
#
# defaultClusterTypes anchor: Used by most models to reference standard cluster types
# Some models (e.g., proliant-dl560-gen11) may have multiple entries with different
# clusterTypes to support different BIOS/BMC settings per cluster type.

defaultClusterTypes: &defaultClusterTypes
  - cc-kvm-compute
  - sci-k8s-controlplane
  - sci-k8s-management
  - sci-k8s-runtime
  - sci-k8s-storage
  - cc-ironcore

biosSettings:
  enabled: true
  filters:
    # Filter by vendor (dell, hpe, lenovo)
    vendors:
      included: [] # Empty = include all. E.g., [dell, hpe]
      excluded: [] # E.g., [lenovo] to exclude Lenovo
    # Filter by model (e.g., poweredge-r7615, proliant-dl560-gen11)
    models:
      included: []
      excluded: []
    # Filter by cluster type (e.g., sci-k8s-controlplane, cc-kvm-compute)
    clusterTypes:
      included: []
      excluded: []
    # Filter by version
    versions:
      included: []
      excluded: []

bmcSettings:
  enabled: false
  filters:
    # Filter by vendor (dell, hpe, lenovo)
    vendors:
      included: [] # Empty = include all. E.g., [dell, hpe]
      excluded: [] # E.g., [lenovo] to exclude Lenovo
    # Filter by model (e.g., poweredge-r7615, proliant-dl560-gen11)
    models:
      included: []
      excluded: []
    # Filter by cluster type (e.g., sci-k8s-controlplane, cc-kvm-compute)
    clusterTypes:
      included: []
      excluded: []
    # Filter by version
    versions:
      included: []
      excluded: []

biosVersions:
  enabled: true
  filters:
    vendors:
      included: []
      excluded: []
    models:
      included: []
      excluded: []
    versions:
      included: []
      excluded: []

bmcVersions:
  enabled: true
  filters:
    vendors:
      included: []
      excluded: []
    models:
      included: []
      excluded: []
    versions:
      included: []
      excluded: []

# Cluster-specific values injected into the metal-bmc-settings ConfigMap.
# These are region/cluster-level overrides consumed by BMCSettings variables at reconcile time.
clusterConfig:
  # Name of the ConfigMap created by this chart and referenced by BMCSettings variables.
  configMapName: ""
  syslogServer: ""   # e.g. "remotesyslog.cc.qa-de-1.cloud.sap"
  # Name of the Secret holding the HPE iLO license key (key: licenseKey).
  hpeLicenseSecretName: ""   # e.g. "hpe-ilo-license"
  # The actual HPE iLO license key value — stored in the Secret above.
  # In production, override via external secret management (Vault, SealedSecrets, etc.).
  hpeLicenseKey: ""

  managedNamespace: "metal-servers"   # Namespace where BMCSettingsSets related resources are deployed



# Machine inventory: Hardware configurations for all supported servers
#
# SETTINGS FILE ORGANIZATION:
# BIOS Settings Files (bios_settings/):
#   - Dell: Most models use "dell-default.yaml" (shared by 10+ models)
#     Exception: poweredge-r7615 uses "dell-r7615.yaml" (special PXE settings)
#   - HPE: Most use "hpe-dl380-gen11.yaml"
#     Exception: proliant-dl560-gen11 has TWO files:
#       * hpe-dl560-gen11-kvm.yaml (for cc-kvm-compute with AdvancedEcc)
#       * hpe-dl560-gen11-sci.yaml (for sci-k8s-* with FastFaultTolerantADDDC)
#   - Lenovo: Each model series has its own file (sr650.yaml, sr850-v3.yaml, etc.)
#
# BMC Settings Files (bmc_settings/):
#   - Dell: "dell-idrac.yaml" (shared by all Dell models)
#   - HPE: "hpe-ilo.yaml" (shared by all HPE models)
#   - Lenovo: "lenovo-xcc.yaml" (shared by all Lenovo models)
#
# SETTINGS CONTENT SOURCES (settingsFileName vs settingsContent):
#   - settingsFileName: References a file in bios_settings/ or bmc_settings/ bundled with the chart.
#                      Used for shared, stable settings across all regions.
#   - settingsContent: Inline YAML string provided via values (e.g., in kube-secrets overrides).
#                      Used for region-specific or node-specific settings overrides.
#                      When both are present, settingsContent takes precedence.
#                      Use YAML anchors (&name) to define content once and reference (*name) multiple times
#                      to avoid duplication in region-specific values files.
#
# Map keys: use the hardware model name as the key (e.g., poweredge-r640).
# For models that need multiple entries (different clusterTypes/settings), use a descriptive
# suffix as the key (e.g., proliant-dl560-gen11-kvm) and set model: explicitly inside the
# entry so the hardware label in selectors stays correct.
#
# OPTIONAL PER-ENTRY PARAMS (SEPARATE PER PURPOSE):
# - BIOS settings: machines.<vendor>.models.<name>.bios.settingsParams
# - BIOS versions: machines.<vendor>.models.<name>.bios.versionParams
# - BMC settings:  machines.<vendor>.models.<name>.bmc.settingsParams
# - BMC versions:  machines.<vendor>.models.<name>.bmc.versionParams
#
# Params object supports:
# - serverFilter:
#     included: []                   # empty = all servers
#     excluded: []                   # excluded wins
# - setMetadataName: <string>        # optional explicit CRD metadata.name

