settingsFlow:
- name: defaultsettings
  priority: 20
  settings:
    DevicesandIOPorts_IntelVTforDirectedIOVTd: "Enabled"
    DevicesandIOPorts_MMConfigBase: "MMConfigBase_3GB"
    DevicesandIOPorts_PCI64BitResourceAllocation: "Auto"
    Memory_MemorySpeed: "MaximumPerformance"
    Memory_PatrolScrub: "Enabled"
    OperatingModes_ChooseOperatingMode: "CustomMode"
    POSTAttempts_POSTAttemptsLimit: "Disabled"
    Power_ASPM: "Disabled"
    Power_PCIePowerBrake: "Disabled"
    Power_PlatformControlledType: "MaximumPerformance"
    Power_PowerPerformanceBias: "PlatformControlled"
    Power_WorkloadConfiguration: "IO_Sensitive"
    Processors_C1EnhancedMode: "Disabled"
    Processors_CPUFrequencyLimits: "FullTurboUplift"
    Processors_CPUPCIeRelaxedOrdering: "Disabled"
    Processors_CPUPstateControl: "None"
    Processors_CStates: "Disabled"
    Processors_DCUIPPrefetcher: "Enabled"
    Processors_EnergyEfficientTurbo: "Disabled"
    Processors_HyperThreading: "Enabled"
    Processors_L1: "Disabled"
    Processors_LimitCPUPAto46bits: "Disabled"
    Processors_LLCPrefetch: "Enabled"
    Processors_MONITORMWAIT: "Enabled"
    Processors_P_StateHysteresis: "P-StateHysteresis_0Us"
    Processors_SNC: "Disabled"
    Processors_TurboMode: "Enabled"
    Processors_UncoreFrequencyScaling: "Disabled"
    Processors_UPILinkFrequency: "MaximumPerformance"
    Processors_UPIPrefetcher: "Enabled"
    # Broadcom 57508 100GbE OCP adapter MSI-X vector settings
    Broadcom57508100GbEQSFP562_PortOCPEthernetAdapter__Slot1PhysicalPort1LogicalPort1_MaximumNumberofPFMSI_XVectors: "128"
    Broadcom57508100GbEQSFP562_PortOCPEthernetAdapter__Slot1PhysicalPort2LogicalPort1_MaximumNumberofPFMSI_XVectors: "128"
    Broadcom57508100GbEQSFP562_PortOCPEthernetAdapter__Slot2PhysicalPort1LogicalPort1_MaximumNumberofPFMSI_XVectors: "128"
    Broadcom57508100GbEQSFP562_PortOCPEthernetAdapter__Slot2PhysicalPort2LogicalPort1_MaximumNumberofPFMSI_XVectors: "128"

