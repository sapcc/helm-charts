# BIOS configuration recommendations settings for Dell R860 KVM servers
settingsFlow:
- name: enableIntegratedNIC
  priority: 10
  settings:
    IntegratedNetwork1: Enabled
- name: enablePxeDev1
  priority: 15
  settings:
    PxeDev1EnDis: Enabled
- name: PXEBootWithNIC.Integrated.1.1
  priority: 20
  settings:
    PxeDev1Interface: NIC.Integrated.1-1-1
    PxeDev1Protocol: IPv4
    PxeDev1VlanEnDis: Disabled
    PxeDev2EnDis: Disabled
    PxeDev3EnDis: Disabled
    PxeDev4EnDis: Disabled
    BootMode: Uefi
    IscsiDev1EnDis: Disabled
- name: SetSysProfile                                                                                                                                        
  priority: 25                                                                                                                                               
  settings:                                                                                                                                                  
    SysProfile: PerfOptimized     # ← set this first to unlock other settings 
- name: R860KVMBiosSettings
  priority: 30
  settings:
    AcPwrRcvry: Last
    AcPwrRcvryDelay: Random
    AdddcSetting: Disabled
    AvxIccpPreGrantLicense: Disabled
    BootSeqRetry: Enabled
    CECriticalSEL: Enabled
    ControlledTurbo: Disabled
    CpuInterconnectBusLinkPower: Disabled
    CpuInterconnectBusSpeed: MaxDataRate
    CpuPaLimit: Enabled
    DcuIpPrefetcher: Enabled
    DcuStreamerPrefetcher: Enabled
    DeadLineLlcAlloc: Enabled
    DirectoryAtoS: Disabled
    DirectoryMode: Enabled
    EnergyEfficientTurbo: Disabled
    EnergyPerformanceBias: MaxPower
    KernelDmaProtection: Disabled
    L2RfoPrefetch: Enabled
    LlcPrefetch: Enabled
    LogicalProc: Enabled
    MadtCoreEnumeration: RoundRobin
    MemFrequency: MaxPerf
    MemOpMode: OptimizerMode
    MemPatrolScrub: Standard
    MemRefreshRate: 1x
    MonitorMwait: Enabled
    NodeInterleave: Disabled
    PcieAspmL1: Disabled
    PPROnUCE: Enabled
    ProcAdjCacheLine: Enabled
    ProcAvxP1: Normal
    ProcC1E: Disabled
    ProcCores: All
    ProcCStates: Disabled
    ProcessorSstCpSetting: Disabled
    ProcHwPrefetcher: Enabled
    ProcPwrPerf: MaxPerf
    ProcTurboMode: Enabled
    ProcUncoreFreqRapl: Disabled
    ProcVirtualization: Enabled
    ProcX2Apic: Enabled
    PwrButton: Disabled
    SubNumaCluster: Disabled
    TpmSecurity: "On"
    UncoreFrequency: MaxUFS
    UpiPrefetch: Enabled
    WorkloadConfiguration: Balance
    XptPrefetch: Enabled
