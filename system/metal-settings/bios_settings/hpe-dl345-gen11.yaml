#
# BIOS settings for HPE ProLiant DL345 Gen11 (AMD EPYC).
#
# Key differences from Intel HPE models:
#   - AdvancedMemProtection, MinProcIdlePkgState, EnergyPerfBias, UncoreFreqScaling,
#     SubNumaClustering, EnergyEfficientTurbo, and EnhancedProcPerf are not available
#     on AMD-based iLO platforms.
#
# Values sourced from: baremetal-config/hpe/proliant-dl345-gen11/bios/defaultsettings.yml
settingsFlow:
- name: customerWorkProfile
  priority: 10
  settings:
    WorkloadProfile: Custom
- name: defaultsettings
  priority: 20
  settings:
    CollabPowerControl: Disabled
    MemPatrolScrubbing: Disabled
    MinProcIdlePower: NoCStates
    NumaGroupSizeOpt: Clustered
    PowerOnDelay: Random
    PowerRegulator: StaticHighPerf
    ThermalConfig: IncreasedCooling
