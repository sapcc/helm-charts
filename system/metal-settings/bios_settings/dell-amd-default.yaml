#
# BIOS settings for AMD-based Dell PowerEdge models (r6715, r770, r7715).
# Key differences from Intel (dell-default.yaml):
#   - No AcPwrRcvry / AcPwrRcvryDelay (not supported on AMD iDRAC)
#   - No MemFrequency / PPROnUCE / CECriticalSEL / TpmSecurity
#   - Reduced general_settings: SysProfile, PwrButton, MemOpMode, AdddcSetting only
#
# Values sourced from: baremetal-config/dell/poweredge-r6715|r770|r7715/bios/defaultsettings.yml
settingsFlow:
- name: enableIntegratedNIC
  priority: 10
  settings:
    IntegratedNetwork1: Enabled
- name: enablePxeDev1
  priority: 15
  settings:
    PxeDev1EnDis: Enabled
- name: PXEBootWithNIC.Integrated.1-1-1
  priority: 20
  settings:
    BootMode: Uefi
    IscsiDev1EnDis: Disabled
    MemOpMode: OptimizerMode
    AdddcSetting: Disabled
    PwrButton: Disabled
    PxeDev1Interface: NIC.Integrated.1-1-1
    PxeDev1Protocol: IPv4
    PxeDev1VlanEnDis: Disabled
    PxeDev2EnDis: Disabled
    PxeDev3EnDis: Disabled
    PxeDev4EnDis: Disabled
    SysProfile: PerfOptimized
