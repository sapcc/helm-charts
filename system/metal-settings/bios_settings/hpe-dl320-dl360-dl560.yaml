#
# Shared BIOS settings for HPE ProLiant dl320-gen11, dl360-gen10, and dl560-gen10.
# All three models use identical BIOS settings profiles (Intel-based, iLO 5/6).
#
# Values sourced from:
#   baremetal-config/hpe/proliant-dl320-gen11/bios/defaultsettings.yml
#   baremetal-config/hpe/proliant-dl360-gen10/bios/defaultsettings.yml
#   baremetal-config/hpe/proliant-dl560-gen10/bios/defaultsettings.yml
settingsFlow:
- name: customerWorkProfile
  priority: 10
  settings:
    WorkloadProfile: Custom
- name: defaultsettings
  priority: 20
  settings:
    AdvancedMemProtection: FastFaultTolerantADDDC
    CollabPowerControl: Disabled
    EnergyEfficientTurbo: Disabled
    EnergyPerfBias: MaxPerf
    MemPatrolScrubbing: Disabled
    MinProcIdlePkgState: NoPackageState
    MinProcIdlePower: NoCStates
    NumaGroupSizeOpt: Clustered
    PowerOnDelay: Random
    PowerRegulator: StaticHighPerf
    SubNumaClustering: Disabled
    ThermalConfig: IncreasedCooling
    UncoreFreqScaling: Maximum
    EnhancedProcPerf: Enabled
