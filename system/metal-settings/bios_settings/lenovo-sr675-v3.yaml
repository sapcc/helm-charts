#
# BIOS settings for Lenovo ThinkSystem SR675 V3 (AMD EPYC).
# These settings match the SR655 V3 profile — both are AMD-based ThinkSystem servers
# with the same BIOS attribute set and performance tuning requirements.
#
# Values sourced from: baremetal-config/lenovo/thinksystem-sr675-v3/bios/default-settings.yml
settingsFlow:
- name: defaultsettings
  priority: 20
  settings:
    Processors_SVMMode: "Enabled"
    DevicesandIOPorts_IOMMU: "Enabled"
    Processors_GlobalC_stateControl: "Disabled"
    Processors_SMTMode: "Enabled"
    Memory_Interleave: "Enabled"
    BootModes_SystemBootMode: "UEFIMode"
    NetworkStackSettings_NetworkStack: "Enabled"
    # Secure boot disabled — allows custom OS installations
    SecureBootConfiguration_SecureBootSetting: "Disabled"
    SecureBootConfiguration_SecureBootMode: "UserMode"
    DevicesandIOPorts_SRIOV: "Enabled"
    OperatingModes_ChooseOperatingMode: "MaximumPerformance"
    POSTAttempts_POSTAttemptsLimit: "Disabled"
