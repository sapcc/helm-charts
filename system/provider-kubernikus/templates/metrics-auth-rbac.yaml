apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "provider-kubernikus.fullname" . }}-metrics-auth-role
  labels:
    app.kubernetes.io/created-by: cluster-api-control-plane-provider-kubernikus
    app.kubernetes.io/part-of: cluster-api-control-plane-provider-kubernikus
    cluster.x-k8s.io/provider: kubernikus
  {{- include "provider-kubernikus.labels" . | nindent 4 }}
rules:
- apiGroups:
  - authentication.k8s.io
  resources:
  - tokenreviews
  verbs:
  - create
- apiGroups:
  - authorization.k8s.io
  resources:
  - subjectaccessreviews
  verbs:
  - create
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "provider-kubernikus.fullname" . }}-metrics-auth-rolebinding
  labels:
    app.kubernetes.io/created-by: cluster-api-control-plane-provider-kubernikus
    app.kubernetes.io/part-of: cluster-api-control-plane-provider-kubernikus
    cluster.x-k8s.io/provider: kubernikus
  {{- include "provider-kubernikus.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: '{{ include "provider-kubernikus.fullname" . }}-metrics-auth-role'
subjects:
- kind: ServiceAccount
  name: '{{ include "provider-kubernikus.serviceAccountName" . }}'
  namespace: '{{ .Release.Namespace }}'
