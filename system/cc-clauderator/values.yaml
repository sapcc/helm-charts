name: clauderator

# rbacProfile: must be set via --set rbacProfile=<profile>
# Available profiles are defined in rbacProfiles below.
# This is intentionally left unset to force explicit selection at install time.

rbacProfiles:
  # ---------------------------------------------------------------------------
  # Compute cluster - KVM hypervisor workloads
  # ---------------------------------------------------------------------------
  # Basic K8s debugging + kvm.cloud.sap CRDs (Hypervisor, Eviction, etc.)
  compute:
    - apiGroups: [""]
      resources:
        - namespaces
        - pods
        - services
        - events
      verbs: ["get", "list", "watch"]
    - apiGroups: [""]
      resources:
        - pods/log
      verbs: ["get"]
    - apiGroups: ["apps"]
      resources:
        - deployments
        - replicasets
        - daemonsets
        - statefulsets
      verbs: ["get", "list", "watch"]
    - apiGroups: ["kvm.cloud.sap"]
      resources: ["*"]
      verbs: ["get", "list", "watch"]

  # ---------------------------------------------------------------------------
  # Controlplane cluster - OpenStack control plane
  # ---------------------------------------------------------------------------
  # Basic K8s debugging (same as runtime)
  controlplane:
    - apiGroups: [""]
      resources:
        - namespaces
        - pods
        - services
        - events
      verbs: ["get", "list", "watch"]
    - apiGroups: [""]
      resources:
        - pods/log
      verbs: ["get"]
    - apiGroups: ["apps"]
      resources:
        - deployments
        - replicasets
        - daemonsets
        - statefulsets
      verbs: ["get", "list", "watch"]

  # ---------------------------------------------------------------------------
  # Management cluster - Gardener machine controller
  # ---------------------------------------------------------------------------
  # Basic K8s debugging + machine.sapcloud.io CRDs
  management:
    - apiGroups: [""]
      resources:
        - namespaces
        - pods
        - services
        - events
      verbs: ["get", "list", "watch"]
    - apiGroups: [""]
      resources:
        - pods/log
      verbs: ["get"]
    - apiGroups: ["apps"]
      resources:
        - deployments
        - replicasets
        - daemonsets
        - statefulsets
      verbs: ["get", "list", "watch"]
    - apiGroups: ["machine.sapcloud.io"]
      resources:
        - machineclasses
        - machinedeployments
        - machinesets
        - machines
      verbs: ["get", "list", "watch"]

  # ---------------------------------------------------------------------------
  # Metal cluster - IronCore bare metal inventory
  # ---------------------------------------------------------------------------
  # Namespaces + metal.ironcore.dev CRDs (Servers, BMCs) + IPAM
  metal:
    - apiGroups: [""]
      resources:
        - namespaces
      verbs: ["get", "list", "watch"]
    - apiGroups: ["metal.ironcore.dev"]
      resources:
        - servers
        - bmcs
      verbs: ["get", "list", "watch"]
    - apiGroups: ["ipam.cluster.x-k8s.io"]
      resources:
        - ipaddresses
      verbs: ["get", "list", "watch"]

  # ---------------------------------------------------------------------------
  # Runtime cluster - foundational "Soil" cluster
  # ---------------------------------------------------------------------------
  # Basic K8s debugging
  runtime:
    - apiGroups: [""]
      resources:
        - namespaces
        - pods
        - services
        - events
      verbs: ["get", "list", "watch"]
    - apiGroups: [""]
      resources:
        - pods/log
      verbs: ["get"]
    - apiGroups: ["apps"]
      resources:
        - deployments
        - replicasets
        - daemonsets
        - statefulsets
      verbs: ["get", "list", "watch"]

  # ---------------------------------------------------------------------------
  # Garden cluster - Virtual Garden (Gardener control plane)
  # ---------------------------------------------------------------------------
  # Full Gardener API access (shoots, seeds, projects, etc.)
  garden:
    - apiGroups: [""]
      resources:
        - namespaces
        - pods
        - services
        - events
        - configmaps
        - nodes
      verbs: ["get", "list", "watch"]
    - apiGroups: [""]
      resources:
        - pods/log
      verbs: ["get"]
    - apiGroups: ["apps"]
      resources:
        - deployments
        - replicasets
        - daemonsets
        - statefulsets
      verbs: ["get", "list", "watch"]
    - apiGroups:
        - core.gardener.cloud
        - seedmanagement.gardener.cloud
        - settings.gardener.cloud
        - extensions.gardener.cloud
        - resources.gardener.cloud
        - operator.gardener.cloud
      resources: ["*"]
      verbs: ["get", "list", "watch"]

  # ---------------------------------------------------------------------------
  # Greenhouse cluster - plugin lifecycle management
  # ---------------------------------------------------------------------------
  # Greenhouse CRDs (Plugins, PluginPresets, Clusters, etc.)
  greenhouse:
    - apiGroups: [""]
      resources:
        - namespaces
        - pods
        - services
        - events
      verbs: ["get", "list", "watch"]
    - apiGroups: [""]
      resources:
        - pods/log
      verbs: ["get"]
    - apiGroups: ["apps"]
      resources:
        - deployments
        - replicasets
        - daemonsets
        - statefulsets
      verbs: ["get", "list", "watch"]
    - apiGroups: ["greenhouse.sap"]
      resources:
        - clusters
        - organizations
        - plugins
        - pluginpresets
        - plugindefinitions
        - teams
        - teammemberships
        - teamrolebindings
      verbs: ["get", "list", "watch"]
