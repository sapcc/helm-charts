apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: clauderator-readonly
  labels:
    app.kubernetes.io/name: clauderator
rules:
  # Core API group — read access for debugging management cluster components
  - apiGroups: [""]
    resources:
      - namespaces
      - pods
      - services
      - events
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources:
      - pods/log
    verbs: ["get"]

  # Apps API group — deployments, replicasets, daemonsets, statefulsets
  - apiGroups: ["apps"]
    resources:
      - deployments
      - replicasets
      - daemonsets
      - statefulsets
    verbs: ["get", "list", "watch"]

  # Machine controller API — the primary reason we need access to mgmt cluster
  - apiGroups:
      - machine.sapcloud.io
    resources:
      - machineclasses
      - machinedeployments
      - machinesets
      - machines
    verbs: ["get", "list", "watch"]

# EXPLICITLY NO ACCESS TO:
# - secrets, configmaps (sensitive data)
# - any write operations (create, update, patch, delete)
