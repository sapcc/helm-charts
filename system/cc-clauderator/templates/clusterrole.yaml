{{- if not .Values.rbacProfile }}
{{- fail "rbacProfile is required. Set it via --set rbacProfile=<profile>. Available profiles: management" }}
{{- end }}
{{- $profile := index .Values.rbacProfiles .Values.rbacProfile }}
{{- if not $profile }}
{{- fail (printf "Unknown rbacProfile '%s'. Available profiles: %s" .Values.rbacProfile (keys .Values.rbacProfiles | join ", ")) }}
{{- end }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ .Values.name }}-readonly
  labels:
    app.kubernetes.io/name: {{ .Values.name }}
rules:
{{- range $profile }}
  - apiGroups: {{ .apiGroups | toJson }}
    resources: {{ .resources | toJson }}
    verbs: {{ .verbs | toJson }}
{{- end }}

# EXPLICITLY NO ACCESS TO:
# - secrets, configmaps (sensitive data)
# - any write operations (create, update, patch, delete)
