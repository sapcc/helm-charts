apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "kube-state-metrics-remote.fullname" . }}
  labels:
  {{- include "kube-state-metrics-remote.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.kubeStateMetrics.replicas }}
  strategy:
    type: {{ .Values.kubeStateMetrics.strategy.type | quote }}
  selector:
    matchLabels:
    {{- include "kube-state-metrics-remote.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
      {{- include "kube-state-metrics-remote.selectorLabels" . | nindent 8 }}
        networking.gardener.cloud/to-dns: allowed
        networking.gardener.cloud/to-public-networks: allowed
        networking.resources.gardener.cloud/to-virtual-garden-kube-apiserver-tcp-443: allowed
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/metrics"
        prometheus.io/port: {{ with index .Values.kubeStateMetrics.ports 0 }}{{ .port | quote }}{{ end }}
        greenhouse/scrape: "true"
        greenhouse/target: {{ .Values.greenhouseScrapeTarget | quote }}
    spec:
      automountServiceAccountToken: true
      containers:
      - env:
        - name: ENABLE_WEBHOOKS
          value: {{ quote .Values.kubeStateMetrics.container.env.enableWebhooks }}
        - name: KUBERNETES_SERVICE_HOST
          value: {{ quote .Values.kubeStateMetrics.container.env.kubernetesServiceHost }}
        - name: KUBERNETES_CLUSTER_DOMAIN
          value: {{ quote .Values.kubeStateMetrics.container.env.kubernetesClusterDomain }}
        image: {{ .Values.kubeStateMetrics.container.image.repository }}:{{ .Values.kubeStateMetrics.container.image.tag | default .Chart.AppVersion }}
        args:
        {{- toYaml .Values.kubeStateMetrics.container.args | nindent 8 }}
        livenessProbe:
          failureThreshold: 3
          httpGet:
            path: /livez
            port: metrics
          initialDelaySeconds: 15
          periodSeconds: 20
          timeoutSeconds: 5
        name: kube-state-metrics
        ports:
        - containerPort: {{ with index .Values.kubeStateMetrics.ports 0 }}{{ .port }}{{ end }}
          name: metrics
        - containerPort: {{ with index .Values.kubeStateMetrics.ports 1 }}{{ .port }}{{ end }}
          name: telemetry
        readinessProbe:
          failureThreshold: 3
          httpGet:
            path: /readyz
            port: telemetry
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 5
        resources: {}
        securityContext: {{- toYaml .Values.kubeStateMetrics.container.containerSecurityContext | nindent 10 }}
        volumeMounts:
        - mountPath: /var/run/secrets/kubernetes.io/serviceaccount
          name: remote-kubeconfig
          readOnly: true
        - mountPath: /etc/config
          name: config-volume
          readOnly: true
      hostNetwork: {{ .Values.kubeStateMetrics.hostNetwork }}
      nodeSelector: {{- toYaml .Values.kubeStateMetrics.nodeSelector | nindent 8 }}
      serviceAccountName: {{ include "kube-state-metrics-remote.fullname" . }}
      volumes:
      - name: remote-kubeconfig
        secret:
          items:
          - key: token
            path: token
          - key: bundle.crt
            path: ca.crt
          secretName: {{ include "kube-state-metrics-remote.fullname" . }}-kubeconfig
      - configMap:
          name: {{ include "kube-state-metrics-remote.fullname" . }}-config
        name: config-volume
