apiVersion: v1
kind: Secret
metadata:
  name: {{ include "kube-state-metrics-remote.fullname" . }}-kubeconfig
  labels:
    resources.gardener.cloud/purpose: token-requestor
    resources.gardener.cloud/class: shoot
    {{- include "kube-state-metrics-remote.labels" . | nindent 4 }}
  annotations:
    serviceaccount.resources.gardener.cloud/name: kube-state-metrics-remote
    serviceaccount.resources.gardener.cloud/namespace: kube-system
    serviceaccount.resources.gardener.cloud/inject-ca-bundle: "true"
stringData:
  token: ""
  bundle.crt: ""
