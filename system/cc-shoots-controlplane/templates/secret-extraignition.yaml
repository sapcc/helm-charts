{{- range $key, $cluster := .Values.cpShoots }}
---
apiVersion: v1
kind: Secret
metadata:
  name: extraignition-cp-{{ $key }}
type: Opaque
stringData:
  ignition: |
    passwd:
      users:
        - name: "{{ printf "{{ resolve `vault+kvv2:///secrets/%s/cc-gardener/nodes/controlplane-user/username` }}" $key }}"
          password_hash: "{{ printf "{{ resolve `vault+kvv2:///secrets/%s/cc-gardener/nodes/controlplane-user/passwordHash` }}" $key }}"
          groups: [ "wheel" ]
{{- end }}
