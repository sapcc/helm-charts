kind: ConfigMap
apiVersion: v1
metadata:
  name: metal-dnsmasq
  namespace: {{ .Release.Namespace }}
data:
  dnsmasq.conf: |
    except-interface=lo
    bind-dynamic
    enable-tftp
    tftp-root=/shared/tftpboot
    log-queries

{{ if .Values.dnsmasq.service }}
    listen-address={{ .Values.dnsmasq.externalIP }}
{{ end }}

    # Configure listening for DNS (0 disables DNS)
    port=0
    log-dhcp

    {{ if .Values.local }}
    {{ range $pool := .Values.local.dhcpPools }}
    {{- $ipPoolStart := $pool.ipPoolStart -}}
    {{- $ipPoolEnd := $pool.ipPoolEnd -}}
    {{- $router := $pool.router -}}
    dhcp-range=set:{{ $pool.subnetPrefix }},{{ $ipPoolStart }},{{ $ipPoolEnd }},{{ $pool.mask }},{{ $.Values.dnsmasq.leaseTime }}
    dhcp-option=set:{{ $pool.subnetPrefix }},option:router,{{ $router }}
    dhcp-boot=tag:{{ $pool.subnetPrefix }},tag:ipxe,{{ $.Values.local.url }}/ipxe/${uuid}
    {{ end }}
    {{ end }}

    {{ if .Values.remote }}
    {{ range $pool := .Values.remote.dhcpPools }}
    {{- $ipPoolStart := $pool.ipPoolStart -}}
    {{- $ipPoolEnd := $pool.ipPoolEnd -}}
    {{- $router := $pool.router -}}
    dhcp-range=set:{{ $pool.subnetPrefix }},{{ $ipPoolStart }},{{ $ipPoolEnd }},{{ $pool.mask }},{{ $.Values.dnsmasq.leaseTime }}
    dhcp-option=set:{{ $pool.subnetPrefix }},option:router,{{ $router }}
    dhcp-boot=tag:{{ $pool.subnetPrefix }},tag:ipxe,{{ $.Values.remote.url }}/ipxe/${uuid}
    {{ end }}
    {{ end }}

    {{- if .Values.dnsmasq.staticHosts }}
    {{- range .Values.dnsmasq.staticHosts }}
    {{ . }}
    {{- end }}
    {{- end }}

    # Set dns servers
    dhcp-option=6,{{ .Values.dnsmasq.dnsServers }}
    dhcp-option=option:domain-name,cc.{{ .Values.global.region }}.cloud.sap

    # Set ntp servers
    dhcp-option=option:ntp-server,{{ .Values.ntpServers }}

    # IPv4 Configuration:
    dhcp-match=ipxe,175

    # Note: Need to test EFI booting
    dhcp-match=set:efi,option:client-arch,7
    dhcp-match=set:efi,option:client-arch,9
    dhcp-match=set:efi,option:client-arch,11
    # Client is PXE booting over EFI without iPXE ROM; send EFI version of iPXE chainloader
    dhcp-boot=tag:efi,tag:!ipxe,{{ .Values.ipxe.efi.file | default "snponly.efi" }},{{ .Values.dnsmasq.externalIP }}

    # Client is running PXE over BIOS; send BIOS version of iPXE chainloader
    dhcp-boot=/undionly.kpxe,{{ .Values.dnsmasq.externalIP }}
    {{- if .Values.networkOperator.enabled }}

    # Network Operator ZTP — tag-scoped, does not interfere with iPXE options
    {{- range $tag, $cfg := .Values.networkOperator.tags }}
    {{- range $cfg.networks }}
    dhcp-range=set:{{ $tag }},{{ .gateway }},static,{{ .netmask }},4h
    dhcp-option=tag:{{ $tag }},option:router,{{ .gateway }}
    {{- end }}
    dhcp-option=tag:{{ $tag }},66,{{ $.Values.dnsmasq.externalIP }}
    dhcp-option=tag:{{ $tag }},67,{{ $cfg.bootScript }}
    {{- end }}
    {{- range .Values.networkOperator.devices }}
    dhcp-host=id:{{ .dhcpClientId }},set:{{ .tag }},{{ .address }},{{ .name }},4h
    {{- end }}
    {{- end }}
  initdnsmasq.sh: |
    #!/usr/bin/env bash
    set -euxo pipefail

    mkdir -p /shared/tftpboot

    export INTERFACE=$(/sbin/ip route | grep -v cbr | awk '/default/ { print $5 }')
    echo "Outgoing inteface is ${INTERFACE}"
    echo "${INTERFACE}" > /shared/interface

    {{- if .Values.ipxe.efi.host }}
    curl -o /shared/tftpboot/{{ .Values.ipxe.efi.file }} {{ .Values.ipxe.efi.host }}/{{ .Values.ipxe.efi.file }}
    {{- else }}
    # snponly.efi is built into the dnsmasq-metal image at /tftpboot/snponly.efi
    cp /tftpboot/snponly.efi /shared/tftpboot/{{ .Values.ipxe.efi.file | default "snponly.efi" }}
    {{- end }}

    cp /opt/dnsmasq/dnsmasq.conf /shared/dnsmasq.conf

    exec /usr/sbin/dnsmasq -d -q -C /shared/dnsmasq.conf
  dhcp-init.sh: |
    #!/usr/bin/env bash
    set -euxo pipefail
    # make sure to update dhcp-stop script to keep commands aligned

    export INTERFACE=$(/sbin/ip route | grep -v cbr | awk '/default/ { print $5 }')

    echo "Outgoing inteface is ${INTERFACE}"

{{ if .Values.dnsmasq.service }}
    ip addr add ${DHCPSERVERIP}/32 dev ${INTERFACE}
{{ end }}

    # Bypass kube-proxy DNAT for TFTP traffic destined to the externalIP.
    # The pod binds directly to the externalIP (hostNetwork + ip addr add) so
    # kube-proxy's DNAT to the endpoint IP causes ICMP port unreachable.
    echo "Adding PREROUTING ACCEPT rule to bypass kube-proxy DNAT for TFTP"
    if iptables-nft -t nat -C PREROUTING -d ${DHCPSERVERIP}/32 -p udp --dport 69 -j ACCEPT 2>/dev/null; then
      echo "PREROUTING ACCEPT rule for TFTP already present - skipping"
    else
      echo "PREROUTING ACCEPT rule for TFTP not present - creating rule"
      iptables-nft -t nat -I PREROUTING 1 -d ${DHCPSERVERIP}/32 -p udp --dport 69 -j ACCEPT
    fi

    echo "Adding rule for SNAT DHCP Reply to correct server IP address"

    if iptables-nft -t nat -C POSTROUTING -p udp --sport 67 --dport 67 -j SNAT --to-source ${DHCPSERVERIP} 2>/dev/null; then
      echo "Rule for SNAT DHCP Reply already present - skipping"
    else
      echo "Rule for SNAT DHCP Reply not present - creating rule"
      iptables-nft -t nat -I POSTROUTING 1 -p udp --sport 67 --dport 67 -j SNAT --to-source ${DHCPSERVERIP}
    fi

    # TFTP data transfers use a second UDP flow from an ephemeral server port back to the client,
    # which conntrack sees as a new unrelated connection. The nf_conntrack_tftp helper inspects
    # the initial TFTP request and marks subsequent data flows as RELATED to it, so NAT rules
    # can match them. nf_nat_tftp rewrites the addresses inside those RELATED flows.
    echo "Loading TFTP conntrack helper modules"
    modprobe nf_conntrack_tftp
    modprobe nf_nat_tftp

    # Attach the tftp helper to incoming port-69 traffic before conntrack processes it.
    # Without this, newer kernels ignore the helper even if the module is loaded.
    echo "Adding CT helper rule for TFTP in raw table"
    if iptables-nft -t raw -C PREROUTING -p udp --dport 69 -j CT --helper tftp 2>/dev/null; then
      echo "CT helper rule for TFTP already present - skipping"
    else
      echo "CT helper rule for TFTP not present - creating rule"
      iptables-nft -t raw -I PREROUTING 1 -p udp --dport 69 -j CT --helper tftp
    fi

    # SNAT the RELATED data flows so the client sees replies from the LB IP, not the node IP.
    # --ctstate RELATED matches only the helper-tagged data flows, not the initial request.
    # --ctorigdstport 69 narrows it to TFTP specifically (avoids catching other RELATED traffic).
    echo "Adding rule for SNAT TFTP Reply to correct server IP address"
    if iptables-nft -t nat -C POSTROUTING -p udp -m conntrack --ctstate RELATED --ctorigdstport 69 -j SNAT --to-source ${DHCPSERVERIP} 2>/dev/null; then
      echo "Rule for SNAT TFTP Reply already present - skipping"
    else
      echo "Rule for SNAT TFTP Reply not present - creating rule"
      iptables-nft -t nat -I POSTROUTING 1 -p udp -m conntrack --ctstate RELATED --ctorigdstport 69 -j SNAT --to-source ${DHCPSERVERIP}
    fi
  dhcp-stop.sh: |
    #!/usr/bin/env bash
    set -euxo pipefail
    # make sure to update dhcp-init script to keep commands aligned

    INTERFACE=$(cat /shared/interface 2>/dev/null || true)

{{ if .Values.dnsmasq.service }}
    if [[ -n "${INTERFACE}" ]]; then
      ip addr del ${DHCPSERVERIP}/32 dev ${INTERFACE} || true
    else
      echo "WARNING: could not determine interface from /shared/interface, skipping ip addr del"
    fi
{{ end }}

    echo "Deleting PREROUTING ACCEPT rule for kube-proxy DNAT bypass (TFTP)"
    iptables-nft -t nat -D PREROUTING -d ${DHCPSERVERIP}/32 -p udp --dport 69 -j ACCEPT || true

    echo "Deleting rule for SNAT DHCP Reply"
    iptables-nft -t nat -D POSTROUTING -p udp --sport 67 --dport 67 -j SNAT --to-source ${DHCPSERVERIP}

    echo "Deleting rule for SNAT TFTP Reply"
    iptables-nft -t nat -D POSTROUTING -p udp -m conntrack --ctorigdstport 69 -j SNAT --to-source ${DHCPSERVERIP}

    echo "Removing CT helper rule for TFTP in raw table"
    iptables-nft -t raw -D PREROUTING -p udp --dport 69 -j CT --helper tftp

    echo "Removing SNAT TFTP rules"
    iptables-nft -t nat -D POSTROUTING -p udp -m conntrack --ctstate RELATED --ctorigdstport 69 -j SNAT --to-source ${DHCPSERVERIP}
