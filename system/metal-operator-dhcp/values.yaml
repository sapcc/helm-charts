owner-info:
  support-group: containers
  helm-chart-url: https://github.com/sapcc/helm-charts/tree/master/system/metal-operator-dhcp

global:
  region:

dnsmasq:
  image:
    repository:
    tag:
  dhcpServerPort: 67
  tftpPort: 69
  dhcppool:
  dnsServers:
  externalIP:
  leaseTime: 1h
  hostNetwork: false
  service: false

ipxe:
  efi:
    host:
    file:

# Optional: import DHCP pools from NetBox automatically.
# When configured, creates a Secret with the NetBox token and a DhcpPool CR
# that the dnsmasq-controller uses to fetch and merge prefixes from NetBox.
# netboxImport:
#   netboxURL: https://netbox.global.cloud.sap
#   token: ""  # injected from Vault via kube-secrets
#   clusterType: admin  # or runtime
#   clusterName: a-qa-de-1
#   region: qa-de-1
#   syncInterval: 5m
#   leaseTime: 10m
#   roles:
#     - roleID: 40
#       name: runtime-discovery
