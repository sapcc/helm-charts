{{- if .Values.repoguard.enabled }}
apiVersion: greenhouse.sap/v1alpha1
kind: Plugin
metadata:
  name: repo-guard
  namespace: {{ .Release.Namespace }}
spec:
  displayName: Repo Guard
  pluginDefinitionRef:
    kind: PluginDefinition
    name: repo-guard
  releaseNamespace: {{ .Release.Namespace }}
  optionValues:
    {{- if .Values.repoguard.manager }}
    - name: manager
      value:
{{ toYaml .Values.repoguard.manager | indent 8 }}
    {{- end }}
    {{- if .Values.repoguard.ttl }}
    - name: ttl
      value:
{{ toYaml .Values.repoguard.ttl | indent 8 }}
    {{- end }}
    {{- if .Values.repoguard.monitoring }}
    - name: monitoring
      value:
{{ toYaml .Values.repoguard.monitoring | indent 8 }}
    {{- end }}
    {{- if .Values.repoguard.ldaps }}
    - name: ldaps
      value:
{{ toYaml .Values.repoguard.ldaps | indent 8 }}
    {{- end }}
    {{- if .Values.repoguard.genericExternalMemberProviders }}
    - name: genericExternalMemberProviders
      value:
{{ toYaml .Values.repoguard.genericExternalMemberProviders | indent 8 }}
    {{- end }}
    {{- if .Values.repoguard.staticMemberProviders }}
    - name: staticMemberProviders
      value:
{{ toYaml .Values.repoguard.staticMemberProviders | indent 8 }}
    {{- end }}
    {{- if .Values.repoguard.githubs }}
    - name: githubs
      value:
{{ toYaml .Values.repoguard.githubs | indent 8 }}
    {{- end }}
    {{- if .Values.repoguard.githubAccountLinks }}
    - name: githubAccountLinks
      value:
{{ toYaml .Values.repoguard.githubAccountLinks | indent 8 }}
    {{- end }}
    {{- if .Values.repoguard.githubOrganizations }}
    - name: githubOrganizations
      value:
{{ toYaml .Values.repoguard.githubOrganizations | indent 8 }}
    {{- end }}
{{- end }}