global:
  # The DNS domain to be used for all Greenhouse components.
  dnsDomain:
  # OIDC configuration for Greenhouse.
  oidc:
    issuer:
    redirectURL:
    clientID:
    clientSecret:
  supportGroup: "containers"
  caCert: my-cert

# disable secrets-injector per default
secrets-injector:
  enabled: false

# Organization & IDProxy should be enabled only after the initial install of greenhouse
organization:
  enabled: true
  oauth2ClientRedirectURIs:
    - "http://localhost:33768"
    - "http://localhost:33768/auth/callback"
    - "http://localhost:8000"
    - "http://localhost:18000"
    - https://repo.eu-de-1.cloud.sap/via-oidc/index.html

catalogs:
  kubeExtensions:
    external:
      ref:
        branch: main
    internal:
      ref:
        branch: main

commons:
  catalogs:
    observability-tagged:
      labels:
        greenhouse.sap/owned-by: observability
      sources:
        - repository: https://github.com/cloudoperators/greenhouse-extensions
          ref:
            sha: f3607e8da8e464109d77c0682c2311471fbc43f1
          interval: 10m
          resources:
            - alerts/plugindefinition.yaml
          overrides:
            - name: alerts
              repository: oci://keppel.eu-de-1.cloud.sap/ccloud-ghcr-io-mirror/cloudoperators/greenhouse-extensions/charts
        - repository: https://github.com/cloudoperators/greenhouse-extensions
          ref: 
            tag: audit-logs/0.0.4
          interval: 10m
          resources:
            - audit-logs/plugindefinition.yaml
          overrides:
            - name: audit-logs
              repository: oci://keppel.eu-de-1.cloud.sap/ccloud-ghcr-io-mirror/cloudoperators/greenhouse-extensions/charts
        - repository: https://github.com/cloudoperators/greenhouse-extensions
          ref:
            sha: f3607e8da8e464109d77c0682c2311471fbc43f1
          interval: 10m
          resources:
            - kube-monitoring/plugindefinition.yaml
          overrides:
            - name: kube-monitoring
              repository: oci://keppel.eu-de-1.cloud.sap/ccloud-ghcr-io-mirror/cloudoperators/greenhouse-extensions/charts
        - repository: https://github.com/cloudoperators/greenhouse-extensions
          ref:
            tag: logs/0.12.0
          interval: 10m
          resources:
            - logs/plugindefinition.yaml
          overrides:
            - name: logs
              repository: oci://keppel.eu-de-1.cloud.sap/ccloud-ghcr-io-mirror/cloudoperators/greenhouse-extensions/charts
        - repository: https://github.com/cloudoperators/greenhouse-extensions
          ref:
            sha: f3607e8da8e464109d77c0682c2311471fbc43f1
          interval: 10m
          resources:
            - logshipping/plugindefinition.yaml
          overrides:
            - name: logshipping
              repository: oci://keppel.eu-de-1.cloud.sap/ccloud-ghcr-io-mirror/cloudoperators/greenhouse-extensions/charts
        - repository: https://github.com/cloudoperators/greenhouse-extensions
          ref:
            sha: f3607e8da8e464109d77c0682c2311471fbc43f1
          interval: 10m
          resources:
            - opensearch/plugindefinition.yaml
          overrides:
            - name: opensearch
              repository: oci://keppel.eu-de-1.cloud.sap/ccloud-ghcr-io-mirror/cloudoperators/greenhouse-extensions/charts
        - repository: https://github.com/cloudoperators/greenhouse-extensions
          ref:
            sha: f3607e8da8e464109d77c0682c2311471fbc43f1
          interval: 10m
          resources:
            - perses/plugindefinition.yaml
          overrides:
            - name: perses
              repository: oci://keppel.eu-de-1.cloud.sap/ccloud-ghcr-io-mirror/cloudoperators/greenhouse-extensions/charts
        - repository: https://github.com/cloudoperators/greenhouse-extensions
          ref:
            sha: f3607e8da8e464109d77c0682c2311471fbc43f1
          interval: 10m
          resources:
            - prometheus/plugindefinition.yaml
          overrides:
            - name: prometheus
              repository: oci://keppel.eu-de-1.cloud.sap/ccloud-ghcr-io-mirror/cloudoperators/greenhouse-extensions/charts
        - repository: https://github.com/cloudoperators/greenhouse-extensions
          ref:
            sha: f3607e8da8e464109d77c0682c2311471fbc43f1
          interval: 10m
          resources:
            - thanos/plugindefinition.yaml
          overrides:
            - name: thanos
              repository: oci://keppel.eu-de-1.cloud.sap/ccloud-ghcr-io-mirror/cloudoperators/greenhouse-extensions/charts


scim:
  enabled: false
  # authType: basic | token
  # username:
  # password:
  # bearerToken:
  # bearerHeader:
  # bearerPrefix:

# Configures core Greenhouse teams.
teams:
  # An admin team must be specified. Additional teams are optional.
  # admin:
  #   description:
  #   mappedIdPGroup:
  #   supportRBAC: true

### Configure several Plugins for the Greenhouse organization below.

certManager:
  webhook:
    timeoutSeconds: 15
# Configures the DigiCert issuer for the Greenhouse organization,
# which enables obtaining DigiCert certificates via the cert-manager.
digicertIssuer:
  enabled: false
  apiToken:
  organizationID:
  organizationUnits:
  caCertID:

# Configures the DISCO, Designate Ingress CNAME operator, for the Greenhouse organization,
# which enables automated management of DNS records with OpenStack Designate.
disco:
  enabled: false
  record:
  zoneName:
  authURL:
  regionName:
  username:
  userDomainName:
  password:
  projectName:
  projectDomainName:

# Configures the NGINX ingress for the Greenhouse organization, which enables external access.
ingress:
  enabled: true
  # Specify the loadBalancer IP for the ingress service.
  # loadBalancerIP:

monitoring:
  enabled: false
  supportGroup: observability
  alertmanager:
    enabled: false

thanos:
  enabled: false
  supportGroup: observability

alerts:
  enabled: false
  supportGroup: observability
  # Supernova options.
  endpoint:

  slack:
    channel:
    webhookURL:

  ingress:
    host:

  filterLabels:
    - app
    - service
    - severity
    - organization
  silenceExcludedLabels:
    - pod
    - pod_name
    - instance
  silenceTemplates: []

  predefinedFilters: []

  # Alertmanager options.
  alertmanager:
    # Whether to deploy the alertmanager.
    enabled: false

logshipping:
  enabled: false
  supportGroup: observability
  fluent-bit:
    image:
      repository: cr.fluentbit.io/fluent/fluent-bit
    hotReload:
      image:
        repository: ghcr.io/jimmidyson/configmap-reload

openTelemetry:
  enabled: false
  supportGroup: observability
  # set via secrets
  #   region:
  #   cluster:
  #   openSearchLogs
  #     username:
  #     password:
  #     endpoint:
  logsCollector:
    enabled: true
  metricsCollector:
    enabled: true
  prometheus:
    podMonitor:
      enabled: true
    serviceMonitor:
      enabled: true
  admissionWebhooks:
    certManager:
      enabled: true
    autoGenerateCert:
      enabled: false
      recreate: false
  kubeRBACProxy:
    enabled: false
  manager:
    prometheusRule:
      defaultRules:
        enabled: false
      enabled: false
perses:
  enabled: true
  supportGroup: observability

shootgrafter:
  enabled: true
  supportGroup: containers
