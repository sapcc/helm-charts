apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: admin-cert
  namespace: hermes
spec:
  dnsNames:
  - 'opensearchhermesadmin.{{ .Values.global.region }}.{{ .Values.global.tld }}'
  issuerRef:
    group: certmanager.{{ .Values.global.tld }}
    kind: DigicertIssuer
    name: digicert-issuer
  privateKey:
    algorithm: RSA
    encoding: PKCS8
    size: 2048
  usages:
    - client auth
    - server auth
  secretName: admin-cert
