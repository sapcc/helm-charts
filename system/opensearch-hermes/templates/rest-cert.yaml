# Self-signed issuer to bootstrap the CA
apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  name: selfsigned-issuer
  namespace: hermes
spec:
  selfSigned: {}
---
# CA certificate
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: ca-certs
  namespace: hermes
spec:
  isCA: true
  commonName: opensearch-hermes-ca
  secretName: opensearch-hermes-ca-secret
  duration: 87600h
  renewBefore: 2880h
  issuerRef:
    name: selfsigned-issuer
    kind: Issuer
---
# CA-backed issuer
apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  name: opensearch-hermes-ca-issuer
  namespace: hermes
spec:
  ca:
    secretName: opensearch-hermes-ca-secret
---
# Actual service cert with internal SANs
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: rest-cert
  namespace: hermes
spec:
  secretName: rest-cert
  duration: 8760h
  renewBefore: 720h
  issuerRef:
    name: opensearch-hermes-ca-issuer
    kind: Issuer
  dnsNames:
    - opensearch-hermes
    - opensearch-hermes.hermes
    - opensearch-hermes.hermes.svc
    - opensearch-hermes.hermes.svc.cluster.local
  privateKey:
    algorithm: RSA
    encoding: PKCS8
    size: 2048
