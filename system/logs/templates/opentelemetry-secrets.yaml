apiVersion: v1
kind: Secret
metadata:
  name: otel-basic-auth-ccloud
  labels:
  {{- include "plugin.labels" . | nindent 4 }}
  {{- if .Values.customLabels }}
  {{ toYaml .Values.customLabels | nindent 4 }}
  {{- end }}
data:
   failover_username_a: {{ .Values.openTelemetryPlugin.openTelemetry.openSearchLogs.failover_username_a | b64enc | quote }}
   failover_password_a: {{ .Values.openTelemetryPlugin.openTelemetry.openSearchLogs.failover_password_a | b64enc | quote }}
   failover_username_b: {{ .Values.openTelemetryPlugin.openTelemetry.openSearchLogs.failover_username_b | b64enc | quote }}
   failover_password_b: {{ .Values.openTelemetryPlugin.openTelemetry.openSearchLogs.failover_password_b | b64enc | quote }}
   