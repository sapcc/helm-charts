apiVersion: v1
kind: Secret
metadata:
  name: otel-basic-auth-ccloud
  labels:
  {{- include "plugin.labels" . | nindent 4 }}
  {{- if .Values.customLabels }}
  {{ toYaml .Values.customLabels | nindent 4 }}
  {{- end }}
data:
   username_a: {{ .Values.openTelemetryPlugin.openTelemetry.openSearchLogs.username_a | b64enc }}
   password_a: {{ .Values.openTelemetryPlugin.openTelemetry.openSearchLogs.password_a | b64enc }}
   username_b: {{ .Values.openTelemetryPlugin.openTelemetry.openSearchLogs.username_b | b64enc }}
   password_b: {{ .Values.openTelemetryPlugin.openTelemetry.openSearchLogs.password_b | b64enc }}
