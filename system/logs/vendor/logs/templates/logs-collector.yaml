{{- if .Values.openTelemetry.logsCollector.enabled }}
apiVersion: opentelemetry.io/v1beta1
kind: OpenTelemetryCollector
metadata:
  name: logs
  labels:
  {{- include "plugin.labels" . | nindent 4 }}
  {{- if .Values.openTelemetry.customLabels }}
  {{ toYaml .Values.openTelemetry.customLabels | nindent 4 }}
  {{- end }}
spec:
  mode: daemonset
  tolerations:
  - operator: Exists
  podAnnotations:
    kubectl.kubernetes.io/default-container: "otc-container"
{{- if not .Values.openTelemetry.kafka.enabled }}
    secret.reloader.stakater.com/reload: "otel-basic-auth"
{{- end }}
    prometheus.io/scrape: "false"
  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
        - matchExpressions:
          - key: cloud.sap/deployment-state
            operator: NotIn
            values:
            - reinstalling
          - key: cloud.sap/esx-in-maintenance
            operator: NotIn
            values:
            - alarm
  terminationGracePeriodSeconds: 10
  env:
    - name: NAMESPACE
      valueFrom:
        fieldRef:
          fieldPath: metadata.namespace
    - name: KUBE_NODE_NAME
      valueFrom:
        fieldRef:
          fieldPath: spec.nodeName
    - name: MY_POD_IP
      valueFrom:
        fieldRef:
          apiVersion: v1
          fieldPath: status.podIP
    - name: cluster
      value: "{{ .Values.openTelemetry.cluster }}"
    - name: region
      value: "{{ .Values.openTelemetry.region }}"
{{- if not .Values.openTelemetry.kafka.enabled }}
  envFrom:
    - secretRef:
         name: otel-basic-auth
{{- end }}
{{- if .Values.openTelemetry.prometheus.podMonitor.enabled }}
  ports:
    - name: prometheus
      port: 8888
{{- end }}
  image: {{ index .Values "openTelemetry" "collectorImage" "repository" }}:{{ index .Values "openTelemetry" "collectorImage" "tag" }}
  volumeMounts:
  - mountPath: /var/log
    name: varlog
    readOnly: true
  volumes:
  - name: varlog
    hostPath:
      path: /var/log
  config:
    receivers:
{{- if .Values.openTelemetry.logsCollector.journaldConfig.enabled }}
    {{- include "journald.receiver" . | nindent 6 -}}
{{- end }}
{{- if .Values.openTelemetry.logsCollector.k8seventsConfig.enabled }}
      k8s_events:
        auth_type: serviceAccount
{{- end }}
{{- if and .Values.openTelemetry.logsCollector.containerdConfig.enabled .Values.openTelemetry.logsCollector.openstackConfig.enabled }}
  {{- include "openstack.receiver" . | nindent 6 -}}
{{- else if .Values.openTelemetry.logsCollector.containerdConfig.enabled }}
  {{- include "containerd.receiver" . | nindent 6 -}}
{{- end }}
{{- if .Values.openTelemetry.logsCollector.kvmConfig.enabled }}
    {{- include "kvm.receiver" . | nindent 6 -}}
{{- end }}
    processors:
      batch:
        send_batch_max_size: 5000
        timeout: 30s
        send_batch_size: 100
      attributes/cluster:
        actions:
          - action: insert
            key: k8s.cluster.name
            value: ${cluster}
          - action: insert
            key: region
            value: ${region}
          - action: insert
            key: k8s.node.name
            value: ${KUBE_NODE_NAME}
{{- if not .Values.openTelemetry.kafka.enabled }}
      attributes/failover_username_a:
        actions:
          - action: insert
            key: failover_username_opensearch
            value: ${failover_username_a}
      attributes/failover_username_b:
        actions:
          - action: insert
            key: failover_username_opensearch
            value: ${failover_username_b}
{{- end }}
{{- if .Values.openTelemetry.logsCollector.journaldConfig.enabled }}
    {{- include "journald.transform" . | nindent 6 -}}
{{- end }}
{{- if and .Values.openTelemetry.logsCollector.containerdConfig.enabled .Values.openTelemetry.logsCollector.openstackConfig.enabled }}
    {{- include "openstack.transform" . | nindent 6 -}}
{{- else if .Values.openTelemetry.logsCollector.containerdConfig.enabled }}
    {{- include "containerd.transform" . | nindent 6 -}}
{{- end }}
{{- if .Values.openTelemetry.logsCollector.k8seventsConfig.enabled }}
    {{- include "k8sevents.transform" . | nindent 6 -}}
{{- end }}
{{- if .Values.openTelemetry.logsCollector.cephConfig.enabled }}
    {{- include "ceph.transform" . | nindent 6 -}}
{{- end }}
{{- if .Values.openTelemetry.logsCollector.kvmConfig.enabled }}
    {{- include "kvm.transform" . | nindent 6 -}}
{{- end }}
      k8s_attributes:
        auth_type: "serviceAccount"
        passthrough: false
        filter:
          node_from_env_var: KUBE_NODE_NAME
        extract:
          metadata:
            - k8s.namespace.name
            - k8s.pod.name
            - k8s.pod.uid
            - k8s.pod.ip
            - k8s.pod.start_time
            - k8s.deployment.name
            - k8s.deployment.uid
            - k8s.node.name
            - k8s.replicaset.name
            - k8s.replicaset.uid
            - k8s.statefulset.name
            - k8s.statefulset.uid
            - k8s.daemonset.name
            - k8s.daemonset.uid
            - k8s.job.name
            - k8s.job.uid
            - k8s.cronjob.name
            - k8s.node.uid
            - k8s.cluster.uid
            - k8s.container.name
            - container.image.name
            - container.image.tag
          labels:
            - tag_name: app.label.ingress-nginx
              key: ingress-nginx
              from: pod
            - tag_name: app.label.ccloud.support-group
              key: ccloud/support-group
              from: pod
            - tag_name: app.label.ccloud.service
              key: ccloud/service
              from: pod
            - tag_name: app.label.app_name
              key: app.kubernetes.io/app_name
              from: pod
            - tag_name: app.label.cloud.sap.decommissioning
              key: cloud.sap/decommissioning
              from: pod
            - tag_name: app.label.cloud.sap.scheduling-disabled
              key: cloud.sap/scheduling-disabled
              from: pod
            - tag_name: app.label.component
              key: component
              from: pod
            - tag_name: app.label.name
              key: app.kubernetes.io/name
              from: pod
            - tag_name: app.label.instance
              key: app.kubernetes.io/instance
              from: pod
            - tag_name: app.label.pod-template-hash
              key: pod-template-hash
              from: pod
            - tag_name: app.label.release
              key: release
              from: pod
{{- if .Values.openTelemetry.logsCollector.cephConfig.enabled }}
    {{- include "ceph.labels" . | nindent 12 -}}
{{- end }}
        pod_association:
          - sources:
              - from: resource_attribute
                name: k8s.pod.ip
          - sources:
              - from: resource_attribute
                name: k8s.pod.uid
          - sources:
              - from: resource_attribute
                name: k8s.pod.name
          - sources:
              - from: connection
      memory_limiter:
        check_interval: 5s
        limit_percentage: 80
        spike_limit_percentage: 30
      resource:
        attributes:
        - action: insert
          key: k8s.cluster.name
          value: ${cluster}
        - action: insert
          key: region
          value: ${region}
        - action: insert
          key: k8s.node.name
          value: ${KUBE_NODE_NAME}
    exporters:
      debug:
        verbosity: basic
{{- if .Values.openTelemetry.kafka.enabled }}
      kafka:
        brokers:
{{- range .Values.openTelemetry.kafka.brokers }}
          - {{ . }}
{{- end }}
        protocol_version: {{ .Values.openTelemetry.kafka.protocol_version }}
        logs:
          topic: {{ .Values.openTelemetry.logsCollector.kafkaTopic }}
          encoding: {{ .Values.openTelemetry.kafka.encoding }}
        producer:
          compression: {{ .Values.openTelemetry.kafka.compression }}
      kafka/storage:
        brokers:
{{- range .Values.openTelemetry.kafka.brokers }}
          - {{ . }}
{{- end }}
        protocol_version: {{ .Values.openTelemetry.kafka.protocol_version }}
        logs:
          topic: {{ .Values.openTelemetry.logsCollector.kafkaStorageTopic }}
          encoding: {{ .Values.openTelemetry.kafka.encoding }}
        producer:
          compression: {{ .Values.openTelemetry.kafka.compression }}
{{- else }}
      opensearch/failover_a:
        http:
          auth:
            authenticator: basicauth/failover_a
          endpoint: {{ .Values.openTelemetry.openSearchLogs.endpoint }}
        logs_index: logs-datastream
        retry_on_failure:
          enabled: true
          initial_interval: 1s
          max_interval: 5s
          max_elapsed_time: 30s
        timeout: 10s
      opensearch/failover_b:
        http:
          auth:
            authenticator: basicauth/failover_b
          endpoint: {{ .Values.openTelemetry.openSearchLogs.endpoint }}
        logs_index: logs-datastream
        retry_on_failure:
          enabled: true
          initial_interval: 1s
          max_interval: 5s
          max_elapsed_time: 30s
        timeout: 10s
      opensearch/cronus_failover_a:
        http:
          auth:
            authenticator: basicauth/failover_a
          endpoint: {{ .Values.openTelemetry.openSearchLogs.endpoint }}
        logs_index: cronus-datastream
        retry_on_failure:
          enabled: true
          initial_interval: 1s
          max_interval: 5s
          max_elapsed_time: 30s
        timeout: 10s
      opensearch/cronus_failover_b:
        http:
          auth:
            authenticator: basicauth/failover_b
          endpoint: {{ .Values.openTelemetry.openSearchLogs.endpoint }}
        logs_index: cronus-datastream
        retry_on_failure:
          enabled: true
          initial_interval: 1s
          max_interval: 5s
          max_elapsed_time: 30s
        timeout: 10s
{{- if or .Values.openTelemetry.logsCollector.openstackConfig.enabled .Values.openTelemetry.logsCollector.cephConfig.enabled }}
    {{- include "openstack.exporter" . | nindent 6 -}}
{{- end }}
{{- end }}
    extensions:
      file_storage/journald:
        directory: .
{{- if .Values.openTelemetry.kafka.enabled }}
      opensearch_log_encoding: {}
{{- else }}
      basicauth/failover_a:
        client_auth:
          username: ${failover_username_a}
          password: ${failover_password_a}
      basicauth/failover_b:
        client_auth:
          username: ${failover_username_b}
          password: ${failover_password_b}
{{- end }}
    connectors:
      routing:
        default_pipelines:
          - logs/route_default
        error_mode: ignore
        table:
          - pipelines:
              - logs/route_cronus
            statement: route() where resource.attributes["k8s.namespace.name"] == "cronus"
{{- if .Values.openTelemetry.logsCollector.openstackConfig.enabled }}
          - pipelines:
              - logs/route_storage
            statement: route() where resource.attributes["k8s.namespace.name"] == "swift"
{{- end }}
{{- if .Values.openTelemetry.logsCollector.cephConfig.enabled }}
          - pipelines:
              - logs/route_storage
            statement: route() where resource.attributes["k8s.namespace.name"] == "ceph"
{{- end }}{{- if .Values.openTelemetry.kafka.enabled }}
{{- else }}
      failover/opensearch:
        priority_levels:
          - [logs/failover_a]
          - [logs/failover_b]
        retry_interval: 20m
        sending_queue:
          block_on_overflow: true
          enabled: true
          num_consumers: 10
          queue_size: 10000
          sizer: requests
      failover/opensearch_cronus:
        priority_levels:
          - [logs/failover_a_cronus]
          - [logs/failover_b_cronus]
        retry_interval: 20m
        sending_queue:
          block_on_overflow: true
          enabled: true
          num_consumers: 2
          queue_size: 1000
          sizer: requests
{{- if or .Values.openTelemetry.logsCollector.openstackConfig.enabled .Values.openTelemetry.logsCollector.cephConfig.enabled }}
      failover/opensearch_storage:
        priority_levels:
          - [logs/failover_a_storage]
          - [logs/failover_b_storage]
        retry_interval: 1h
        sending_queue:
          block_on_overflow: true
          enabled: true
          num_consumers: 10
          queue_size: 10000
          sizer: requests
{{- end }}
{{- end }}
    service:
      extensions:
        - file_storage/journald
{{- if .Values.openTelemetry.kafka.enabled }}
        - opensearch_log_encoding
{{- else }}
        - basicauth/failover_a
        - basicauth/failover_b
{{- end }}
{{- if .Values.openTelemetry.prometheus.podMonitor.enabled }}
      telemetry:
        metrics:
          level: detailed
          readers:
          - pull:
              exporter:
                prometheus:
                  host: 0.0.0.0
                  port: 8888
                  without_type_suffix: false
                  with_resource_constant_labels:
                    included:
                    - k8s_node_name
                    - k8s_cluster_name
                    - region
        resource:
          k8s_cluster_name: ${cluster}
          k8s_node_name: ${KUBE_NODE_NAME}
          region: ${region}
{{- end }}
      pipelines:
        logs/route_default:
          receivers: [routing]
          processors: [batch]
{{- if .Values.openTelemetry.kafka.enabled }}
          exporters: [kafka]
{{- else }}
          exporters: [failover/opensearch]
        logs/failover_a:
          receivers: [failover/opensearch]
          processors: [attributes/failover_username_a]
          exporters: [opensearch/failover_a]
        logs/failover_b:
          receivers: [failover/opensearch]
          processors: [attributes/failover_username_b]
          exporters: [opensearch/failover_b]
{{- end }}
        logs/route_cronus:
          receivers: [routing]
          processors: [batch]
{{- if .Values.openTelemetry.kafka.enabled }}
          exporters: [kafka]
{{- else }}
          exporters: [failover/opensearch_cronus]
        logs/failover_a_cronus:
          receivers: [failover/opensearch_cronus]
          processors: [attributes/failover_username_a]
          exporters: [opensearch/cronus_failover_a]
        logs/failover_b_cronus:
          receivers: [failover/opensearch_cronus]
          processors: [attributes/failover_username_b]
          exporters: [opensearch/cronus_failover_b]
{{- end }}
{{- if .Values.openTelemetry.logsCollector.journaldConfig.enabled }}
    {{- include "journald.pipeline" . | nindent 8 -}}
{{- end }}
{{- if .Values.openTelemetry.logsCollector.k8seventsConfig.enabled }}
    {{- include "k8sevents.pipeline" . | nindent 8 -}}
{{- end }}
{{- if and .Values.openTelemetry.logsCollector.containerdConfig.enabled .Values.openTelemetry.logsCollector.openstackConfig.enabled }}
    {{- include "openstack.pipeline" . | nindent 8 -}}
{{- else if .Values.openTelemetry.logsCollector.containerdConfig.enabled }}
    {{- include "containerd.pipeline" . | nindent 8 -}}
{{- end }}
{{- if .Values.openTelemetry.logsCollector.kvmConfig.enabled }}
    {{- include "kvm.pipeline" . | nindent 8 -}}
{{- end }}
{{- if .Values.openTelemetry.logsCollector.cephConfig.enabled }}
    {{- include "ceph.pipeline" . | nindent 8 -}}
{{- end }}
{{- if or .Values.openTelemetry.logsCollector.openstackConfig.enabled .Values.openTelemetry.logsCollector.cephConfig.enabled }}
        logs/route_storage:
          receivers: [routing]
          processors: [batch]
{{- if .Values.openTelemetry.kafka.enabled }}
          exporters: [kafka/storage]
{{- else }}
          exporters: [failover/opensearch_storage]
        logs/failover_a_storage:
          receivers: [failover/opensearch_storage]
          processors: [attributes/failover_username_a]
          exporters: [opensearch/storage_failover_a]
        logs/failover_b_storage:
          receivers: [failover/opensearch_storage]
          processors: [attributes/failover_username_b]
          exporters: [opensearch/storage_failover_b]
{{- end }}
{{- end }}
{{- end }}
