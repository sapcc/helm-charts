{{- if and (.Capabilities.APIVersions.Has "monitoring.coreos.com/v1") .Values.openTelemetry.prometheus.rules.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: {{ printf "%s-alerts" $.Release.Name | trunc 63 }}
  labels:
    {{- include "plugin.labels" . | nindent 4 }}
    {{- include "plugin.prometheusLabels" . | nindent 4 }}
{{- if $.Values.openTelemetry.prometheus.rules.labels }}
{{ toYaml $.Values.openTelemetry.prometheus.rules.labels | indent 4 }}
{{- end }}
{{- if $.Values.openTelemetry.prometheus.rules.annotations }}
  annotations:
{{ toYaml $.Values.openTelemetry.prometheus.rules.annotations | indent 4 }}
{{- end }}
spec:
  groups:
  - name: logs-plugin-alerts
    rules:
  {{- if (has "FilelogRefusedLogs" .Values.openTelemetry.prometheus.rules.enabled) }}
      - alert: FilelogRefusedLogs
        expr: sum(rate(otelcol_receiver_refused_log_records_total{receiver=~"filelog"}[1m])) > 0
        for: 5m
        labels:
          severity: warning
          no_alert_on_absence: "true" # OTel will not expose the metric if null 
          playbook: https://github.com/cloudoperators/greenhouse-extensions/tree/main/logs/playbooks/FilelogRefusedLogs.md
          {{- include "plugin.additionalRuleLabels" . | nindent 10 }}
        annotations:
          summary: Logs are not successfully pushed into the filelog-receiver
          description: Filelog receiver is increasingly rejecting logs
  {{- end }}

  {{- if (has "ReceiverRefusedMetric" .Values.openTelemetry.prometheus.rules.enabled) }}
      - alert: ReceiverRefusedMetric
        expr: sum(rate(otelcol_receiver_refused_metric_points_total{}[1m])) > 0
        for: 5m
        labels:
          severity: warning
          no_alert_on_absence: "true" # OTel will not expose the metric if null
          playbook: https://github.com/cloudoperators/greenhouse-extensions/tree/main/logs/playbooks/ReceiverRefusedMetric.md
          {{- include "plugin.additionalRuleLabels" . | nindent 10 }}
        annotations:
          summary: OTel is refusing metric points
          description: The OTel Collector has refused metric points for over 5 minutes. This may indicate malformed metrics. Review configuration and incoming traffic for issues.
  {{- end }}

  {{- if (has "OTelLogsMissing" .Values.openTelemetry.prometheus.rules.enabled) }}
      - alert: OTelLogsMissing
        expr: sum by (region, k8s_node_name, pod) (rate(otelcol_exporter_sent_log_records_total{job=~".*/opentelemetry-collector-logs", exporter !~"debug"}[60m])) == 0
        for: 120m
        labels:
          context: logshipping
          severity: warning
          no_alert_on_absence: "true"
          playbook: https://github.com/cloudoperators/greenhouse-extensions/tree/main/logs/playbooks/OTelLogsMissing.md
          {{- include "plugin.additionalRuleLabels" . | nindent 10 }}
        annotations:
          description: 'OTel Collectors on {{`{{ $labels.k8s_node_name }}`}} in {{`{{ $labels.region }}`}} are not shipping logs. Please check.'
          summary: OTel is not shipping logs
  {{- end }}

  {{- if and (has "ReconcileErrors" .Values.openTelemetry.prometheus.rules.enabled) (index .Values "opentelemetry-operator" "enabled") }}
      - alert: ReconcileErrors
        expr: rate(controller_runtime_reconcile_total{controller="opentelemetrycollector",result="error"}[5m]) > 0
        for: 5m
        labels:
          severity: warning
          playbook: https://github.com/cloudoperators/greenhouse-extensions/tree/main/logs/playbooks/ReconcileErrors.md
          {{- include "plugin.additionalRuleLabels" . | nindent 10 }}
        annotations:
          summary: OpenTelemetryCollector Reconciliation
          description: Reconciliation errors for OTel are increasing
  {{- end }}

  {{- if and (has "WorkqueueDepth" .Values.openTelemetry.prometheus.rules.enabled) (index .Values "opentelemetry-operator" "enabled") }}
      - alert: WorkqueueDepth
        expr: rate(workqueue_depth{controller="opentelemetrycollector"}[5m]) > 0
        for: 5m
        labels:
          severity: warning
          playbook: https://github.com/cloudoperators/greenhouse-extensions/tree/main/logs/playbooks/WorkqueueDepth.md
          {{- include "plugin.additionalRuleLabels" . | nindent 10 }}
        annotations:
          summary: WorkqueueDepth is increasing
          description: Check OTel manager logs for reasons why this might happen
  {{- end }}

  {{- if (has "OTelLogsIncreasing" .Values.openTelemetry.prometheus.rules.enabled) }}
      - alert: OTelLogsIncreasing
        expr: sum(increase(otelcol_exporter_sent_log_records_total{job=~".*/opentelemetry-collector-logs"}[1h])) by (k8s_cluster_name) / sum(increase(otelcol_exporter_sent_log_records_total{job=~".*/opentelemetry-collector-logs"}[1h]offset 2h)) by (k8s_cluster_name) > 4
        for: 6h
        labels:
          context: logshipping
          severity: info
          no_alert_on_absence: "true"
          playbook: 'https://github.com/cloudoperators/greenhouse-extensions/tree/main/logs/playbooks/LogsOTelLogsIncreasing.md'
          {{- include "plugin.additionalRuleLabels" . | nindent 10 }}
        annotations:
          description: 'OTel Collectors on {{`{{ $labels.k8s_cluster_name }}`}} are sending 4 times more logs in the last 6h. Please check.'
          summary: OTel log volume is increasing, check log volume.
  {{- end }}

  {{- if (has "OTelLogsDecreasing" .Values.openTelemetry.prometheus.rules.enabled) }}
      - alert: OTelLogsDecreasing
        expr: sum(rate(otelcol_exporter_sent_log_records_total{job=~".*/opentelemetry-collector-logs"}[1h]offset 2h)) by (k8s_cluster_name)/sum(rate(otelcol_exporter_sent_log_records_total{job=~".*/opentelemetry-collector-logs"}[1h])) by (k8s_cluster_name) > 4
        for: 2h
        labels:
          context: logshipping
          severity: warning
          no_alert_on_absence: "true"
          playbook: 'https://github.com/cloudoperators/greenhouse-extensions/tree/main/logs/playbooks/LogsOTelLogsDecreasing.md'
          {{- include "plugin.additionalRuleLabels" . | nindent 10 }}
        annotations:
          description: 'OTel Collectors on {{`{{ $labels.k8s_cluster_name }}`}} are sending 4 times fewer logs in the last 2h. Please check.'
          summary: OTel log volume is decreasing, check log volume.
  {{- end }}

  {{- if (has "OTelLogsExportingFailed" .Values.openTelemetry.prometheus.rules.enabled) }}
      - alert: OTelLogsExportingFailed
        expr: sum(increase(otelcol_exporter_sent_log_records_total{job=~".*/opentelemetry-collector-logs"}[1h])) by (k8s_cluster_name)/ sum(increase(otelcol_exporter_send_failed_log_records_total{job=~".*/opentelemetry-collector-logs"}[1h]) + increase(otelcol_exporter_sent_log_records_total{job=~".*/opentelemetry-collector-logs"}[1h])) by (k8s_cluster_name) < 0.9
        for: 1h
        labels:
          context: logshipping
          severity: info
          no_alert_on_absence: "true"
          playbook: 'https://github.com/cloudoperators/greenhouse-extensions/tree/main/logs/playbooks/LogsExportingFailed.md'
          {{- include "plugin.additionalRuleLabels" . | nindent 10 }}
        annotations:
          description: 'OTel Collectors on {{`{{ $labels.k8s_cluster_name }}`}} are exporting logs below 90%. Please check.'
          summary: OTel log exporting is failing. Check logs and exporter connectivity.
  {{- end }}
{{- end }}
