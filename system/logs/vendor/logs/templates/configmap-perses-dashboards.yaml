{{ $root := . }}
{{- range $path, $bytes := .Files.Glob "perses-dashboards/*.json" }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ printf "%s-%s" $root.Release.Name ($path | replace ".json" "" | replace "/" "-" | trunc 63) }}
  labels:
     perses.dev/resource: "true"
data:     
{{ printf "%s: |-" ($path | replace "/" "-" | indent 2) }}
{{ printf "%s" $bytes | indent 4 }}
{{- end }}
