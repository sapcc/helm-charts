opentelemetry-operator:
  enabled: true
  crds:
    create: false
  admissionWebhooks:
    create: true
    failurePolicy: 'Ignore'
    certManager:
      enabled: false
    autoGenerateCert:
      enabled: true
      recreate: false
  manager:
    prometheusRule:
      enabled: false
      defaultRules:
        enabled: false
    serviceMonitor:
      enabled: false

customCRDs:
  enabled: true

openTelemetry:
  collectorImage:
    repository: ghcr.io/cloudoperators/opentelemetry-collector-contrib
    tag: main
  openSearchLogs:
    endpoint: test
    failover_username_a: test
    failover_password_a: test
    failover_username_b: test
    failover_password_b: test
  cluster: test
  region: test
  kafka:
    enabled: true
    brokers:
      - kafka-bootstrap.kafka.svc.cluster.local:9092
  logsCollector:
    enabled: true
    kafkaTopic: "logs"
    kafkaStorageTopic: "storage"
    journaldConfig:
      enabled: true
    k8seventsConfig:
      enabled: true
    containerdConfig:
      enabled: true
    kvmConfig:
      enabled: true
    cephConfig:
      enabled: true
    openstackConfig:
      enabled: true
  externalCollector:
    enabled: true
    replicas: 2
    loadBalancerIP: 10.0.0.1
    kafkaTopic: "logs"
    kafkaTracesTopic: "traces"
    externalConfig:
      enabled: true
      alertmanager_port: 1515
      deployments_port: 1516
    syslogConfig:
      enabled: true
      tcp_port: 514
      udp_port: 514
    syslogTLSConfig:
      enabled: true
      tcp_port: 6514
      dnsName: logs-collector-syslog.test.cloud.sap
      issuerName: digicert-issuer
    tracesConfig:
      enabled: true
      otlp_grpc_port: 4317
      otlp_http_port: 4318
  metricsCollector:
    enabled: false
  prometheus:
    additionalLabels:
      key1: value1
      key2: value2
    rules:
      enabled:
        - FilelogRefusedLogs
        - ReconcileErrors
        - FilelogRefusedLogs
        - LogsOTelLogsMissing
        - LogsExportingFailed

testFramework:
  enabled: true
  image:
    registry: ghcr.io
    repository: cloudoperators/greenhouse-extensions-integration-test
    tag: main
  imagePullPolicy: IfNotPresent
