{{- range $clusterName, $cluster := .Values.clusters }}
{{- $regionName := include "cc-shoots-workerless.clusterRegion" (dict "clusterName" $clusterName "cluster" $cluster) }}
{{- $clusterType := include "cc-shoots-workerless.clusterType" $ }}
{{- $cmName := printf "%s-auth-%s" $clusterType $regionName }}
{{- if not (lookup "v1" "ConfigMap" $.Release.Namespace $cmName) }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ $cmName }}
  namespace: {{ $.Release.Namespace }}
  annotations:
    # We need this configmap to be present early because it is references in Shoot spec.
    # Further management of structured auth configmap is done by shoot-grafter.
    # Since CI runs helm upgrade --install, we need pre-upgrade hook.
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-delete-policy: "hook-succeeded,before-hook-creation"
    helm.sh/hook-weight: "1"
data:
  config.yaml: |
{{- toYaml $.Values.authenticationConfig | nindent 4 }}
{{- end }}
{{- end }}
