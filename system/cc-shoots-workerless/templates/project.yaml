{{- if not (has .Release.Namespace (list "garden" "garden-compute" "garden-storage")) -}}
{{- $clusterValues := (get .Values "cluster" | default dict) -}}
{{- $projectName := (get $clusterValues "gardenerProject" | default (include "cc-shoots-workerless.supportGroup" .)) -}}
---
apiVersion: v1
kind: Namespace
metadata:
  name: {{ .Release.Namespace }}
  labels:
    gardener.cloud/role: project
    project.gardener.cloud/name: {{ $projectName }}
---
apiVersion: core.gardener.cloud/v1beta1
kind: Project
metadata:
  name: {{ $projectName }}
spec:
  namespace: {{ .Release.Namespace }}
{{- end }}
