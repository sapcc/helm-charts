{{- if .Values.regional_thanos.persesDatasource.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: thanos-regional-perses-datasource
  labels:
    "perses.dev/resource": "true"
data:
  thanos-regional-perses-datasource.json: |
    {
      "kind": "GlobalDatasource",
      "metadata": {
        "name": "thanos-regional-query"
      },
      "spec": {
        "default": true,
        "plugin": {
          "kind": "PrometheusDatasource",
          "spec": {
            "proxy": {
              "kind": "HTTPProxy",
              "spec": {
                "url": "http://thanos-regional-query.thanos.svc:10902"
              }
            }
          }
        }
      }
    }
{{- end }}
---
{{- if .Values.thanos.persesDatasource.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: thanos-metal-perses-datasource
  labels:
    "perses.dev/resource": "true"
data:
  thanos-metal-perses-datasource.json: |
    {
      "kind": "GlobalDatasource",
      "metadata": {
        "name": "thanos-metal-query"
      },
      "spec": {
        "default": false,
        "plugin": {
          "kind": "PrometheusDatasource",
          "spec": {
            "proxy": {
              "kind": "HTTPProxy",
              "spec": {
                "url": "http://thanos-metal-query.thanos.svc:10902"
              }
            }
          }
        }
      }
    }
{{- end }}
