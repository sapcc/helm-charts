global:
  region:
  domain:
  clusterType: metal

  rbac:
    create: true

owner-info:
  support-group: containers
  helm-chart-url: https://github.com/sapcc/helm-charts/tree/master/system/kube-monitoring-metal
  service: kube-monitoring

# Disable the prometheus-operator kube-state-metrics sub-chart. We deploy independently. See below.
kubeStateMetrics:
  enabled: false

absent-metrics-operator:
  enabled: true

kube-state-metrics:
  image:
    registry: keppel.global.cloud.sap/ccloud-registry-k8s-io-mirror
    repository: kube-state-metrics/kube-state-metrics
  rbac:
    create: true

  customLabels:
    app: kube-state-metrics

  resources:
    requests:
      memory: 150Mi
      cpu: 100m

  # Allow all labels from nodes to be exported.
  metricLabelsAllowlist:
    - nodes=[*]
    - namespaces=[*]

  selfMonitor:
    enabled: true

# Deploy basic set of Prometheus alert and aggregation rules for monitoring Kubernetes.
prometheus-kubernetes-rules:
  prometheusName: kubernetes
  tier: k8s

prometheus-node-exporter:
  image:
    registry: keppel.global.cloud.sap
    repository: ccloud-dockerhub-mirror/prom/node-exporter

  serviceAccount:
    create: true

  kubeRBACProxy:
    enabled: true
    proxyEndpointsPort: 8889
    image:
      registry: keppel.global.cloud.sap
      repository: ccloud-quay-mirror/brancz/kube-rbac-proxy

  extraArgs:
    - --collector.filesystem.ignored-mount-points=^/(sys|proc|dev|host|etc)($$|/)
    - --collector.filesystem.ignored-fs-types=^(autofs|binfmt_misc|bpf|cgroup|configfs|debugfs|devpts|devtmpfs|fusectl|hugetlbfs|mqueue|nsfs|overlay|proc|procfs|pstore|rpc_pipefs|securityfs|selinuxfs|squashfs|sysfs|tmpfs|tracefs)$$
    - --collector.systemd.enable-task-metrics
    - --collector.systemd.enable-restarts-metrics
    - --collector.systemd.enable-start-time-metrics
    - --collector.processes
    - --collector.mountstats
    - --collector.bonding

  extraHostVolumeMounts:
    - name: dbus
      hostPath: /var/run/dbus/system_bus_socket
      mountPath: /var/run/dbus/system_bus_socket
      readOnly: true

  resources:
    requests:
      memory: 100Mi
      cpu: 100m

  rbac:
    pspEnabled: false

kube-state-metrics-exporter:
  prometheusName: kubernetes

prober-static:
  prometheusName: kubernetes

prober-static-alt-region:
  prometheusName: kubernetes

http-keep-alive-monitor:
  alert:
    ignore_ingress_names:
      - cfm
  image:
    repository: keppel.global.cloud.sap/ccloud/http-keep-alive-monitor

falco:
  enabled: false
  image:
    registry: keppel.global.cloud.sap/ccloud-dockerhub-mirror

  driver:
    loader:
      initContainer:
        image:
          registry: keppel.global.cloud.sap/ccloud-dockerhub-mirror

  controller:
    daemonset:
      updateStrategy:
        type: RollingUpdate
        rollingUpdate:
          maxUnavailable: 25%

  falcoctl:
    image:
      registry: keppel.global.cloud.sap/ccloud-dockerhub-mirror

  tolerations:
    - operator: Exists

  extra:
    args:
      - -v
      - --unbuffered
      - -o
      - json_output=true

  falco:
    rules_files:
      - /etc/falco/rules.d
    rules:
      - disable:
          rule: "*"
      - enable:
          tag: pci

  customRules:
    barbican-exec-alert.yaml: |-
      - rule: Terminal Shell or Port-Forward in Barbican Container
        desc: >
          A shell was spawned or a port-forward session was opened inside a
          Barbican API container. Barbican is a key-management service; interactive
          access to its containers is unexpected and must be investigated
          immediately. Satisfies SCIBPL-219.
        condition: >
          (evt.type in (execve, execveat) and container.name = "barbican-api"
           and k8s.ns.name = "monsoon3"
           and proc.name in (sh, bash, dash, ash, zsh, ksh, fish, python, python3))
          or
          (evt.type = connect and container.name = "barbican-api"
           and k8s.ns.name = "monsoon3"
           and fd.sport in (10250))
        output: >
          Interactive access detected in Barbican container
          (user=%user.name cmd=%proc.cmdline pod=%k8s.pod.name ns=%k8s.ns.name
          image=%container.image.repository)
        priority: CRITICAL
        tags: [barbican, security, pci, scibpl-219]
        source: syscall
      prometheus.io/port: "9793"
      prometheus.io/scrape: "true"
      prometheus.io/targets: kubernetes
  hostPathsExporter:
    daemonSets: null
  service:
    create: false
  prometheusServiceMonitor:
    create: false
  prometheusRules:
    create: false
