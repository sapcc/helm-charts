global:
  registry: "replace-me"
  registryK8sIoMirror: "replace-me"
  ghcrIoMirror: "replace-me"
  region: eu-de-1
  domain: persephone.eu-de-1.cloud.sap

plutono:
  image: credativ/plutono
  image_version: latest
  mode: operator

  auth:
    basic_auth:
      enabled: true
    ldap:
      enabled: true

  endpoint:
    host:
      public: plutono-central.runtime.prod.persephone.eu-de-1.cloud.sap

  gitsync:
    enabled: false

  centralMonitoring:
    enabled: true
    # Production seed datasource template (password placeholders only).
    # Do not commit real passwords; use the generator script in this folder.
    datasources:
      - name: prometheus-apae1-01
        type: prometheus
        access: proxy
        url: https://p-garden--apae1-01p.ingress.prt-p-eu-de-1.soil.prod.persephone.eu-de-1.cloud.sap
        basicAuth: true
        basicAuthUser: admin
        isDefault: false
        jsonData:
          timeInterval: 1m
        secureJsonData:
          basicAuthPassword: REPLACE_ME

