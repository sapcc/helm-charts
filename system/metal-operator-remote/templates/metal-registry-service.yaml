apiVersion: v1
kind: Service
metadata:
  name: {{ include "chart.fullname" . }}-metal-registry-service
  labels:
  {{- include "chart.labels" . | nindent 4 }}
spec:
  type: {{ .Values.metalRegistryService.type }}
  selector:
    control-plane: controller-manager
    app.kubernetes.io/instance: metal-operator-remote
    app.kubernetes.io/name: metal-operator-remote
  ports:
  {{- .Values.metalRegistryService.ports | toYaml | nindent 2 }}