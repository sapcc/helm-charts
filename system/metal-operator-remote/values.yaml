owner-info:
  support-group: containers
  helm-chart-url: https://github.com/sapcc/helm-charts/tree/master/system/metal-operator-remote
kubernetesClusterDomain: cluster.local
metalRegistryService:
  ports:
    - port: 10000
      protocol: TCP
      targetPort: 10000
  type: ClusterIP
fullnameOverride: metal-operator
remote:
  ca: ""
macdb: {}
hostNetwork: false
webhook:
  enable: true
certmanager:
  enable: false
metrics:
  enable: false
webhookInjector:
  repository: "keppel.global.cloud.sap/ccloud-ghcr-io-mirror/SAP-cloud-infrastructure/webhook-injector"
  tag: latest
metal-operator-core:
  rbac:
    enable: false
  crd:
    enable: false
  metrics:
    enable: false
  webhook:
    enable: false
  prometheus:
    enable: false
  certmanager:
    enable: false
  networkPolicy:
    enable: false
  controllerManager:
    enable: false
# controllerManager values are auto-generated by `make build-metal-operator-remote`.
# Upstream defaults from the metal-operator chart are merged with our deployment-specific
# overrides from values-overrides.yaml. To customize, edit values-overrides.yaml and re-run make.
controllerManager:
  enable: true
  replicas: 1
  strategy:
    type: Recreate
  manager:
    image:
      repository: ghcr.io/ironcore-dev/metal-operator-controller-manager
      tag: sha-4854c23
    args:
      - --mac-prefixes-file=/etc/macdb/macdb.yaml
      - --probe-image=keppel.global.cloud.sap/ccloud-ghcr-io-mirror/ironcore-dev/metalprobe:latest
      - --probe-os-image=ghcr.io/ironcore-dev/os-images/gardenlinux:1443.3
      - --insecure=false
      - --registry-url=http://[2a10:afc0:e013:d002::]:30010
      - --manager-namespace=metal-operator-system
      - --kubeconfig=/var/run/remote-kubeconfig/kubeconfig
    resources:
      limits:
        cpu: "5000m"
        memory: "5120Mi"
      requests:
        cpu: 300m
        memory: 50Mi
    livenessProbe:
      initialDelaySeconds: 15
      periodSeconds: 20
      httpGet:
        path: /healthz
        port: 8081
    readinessProbe:
      initialDelaySeconds: 5
      periodSeconds: 10
      httpGet:
        path: /readyz
        port: 8081
    securityContext:
      allowPrivilegeEscalation: false
      capabilities:
        drop:
          - "ALL"
    env:
      KUBERNETES_SERVICE_HOST: "apiserver-url"
      KUBERNETES_CLUSTER_DOMAIN: "cluster.local"
    volumes:
      - name: webhook-certs
        mountPath: /tmp/k8s-webhook-server/serving-certs
        readOnly: true
        source:
          emptyDir: {}
      - name: remote-serviceaccount
        mountPath: /var/run/secrets/kubernetes.io/remote-serviceaccount
        readOnly: true
        source:
          secret:
            secretName: metal-operator-remote-kubeconfig
            items:
              - key: token
                path: token
              - key: bundle.crt
                path: ca.crt
      - name: remote-kubeconfig
        mountPath: /var/run/remote-kubeconfig
        readOnly: true
        source:
          configMap:
            name: remote-kubeconfig
  dnsRecordTemplate:
    enabled: false
  podSecurityContext:
    runAsNonRoot: true
    seccompProfile:
      type: RuntimeDefault
  terminationGracePeriodSeconds: 10
  serviceAccountName: metal-operator-webhook-injector
  hostNetwork: false
  pod:
    labels:
      networking.gardener.cloud/to-dns: allowed
      networking.gardener.cloud/to-private-networks: allowed
      networking.gardener.cloud/to-public-networks: allowed
      networking.gardener.cloud/to-runtime-apiserver: allowed
      networking.resources.gardener.cloud/to-all-istio-ingresses-istio-ingressgateway-tcp-9443: allowed
      networking.resources.gardener.cloud/to-kube-apiserver-tcp-443: allowed
