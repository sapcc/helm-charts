owner-info:
  support-group: observability
  service: audit-logs-otel
  maintainers:
    - "Olaf Heydorn"
    - "Timo Johner"
    - "Simon Olander"
  helm-chart-url: "https://github.com/sapcc/helm-charts/tree/master/system/audit-logs-otel"

linkerd-support:
  annotate_namespace: true

global:
  region: DEFINED-IN-SECRETS
  tld: DEFINED-IN-SECRETS
  prometheus: DEFINED-IN-SECRETS
  linkerd_requested: true
  opensearch:
    data:
      user: DEFINED-IN-SECRETS
      password: DEFINED-IN-SECRETS
    syslog:
      user: DEFINED-IN-SECRETS
      password: DEFINED-IN-SECRETS
    jump:
      user: DEFINED-IN-SECRETS
      password: DEFINED-IN-SECRETS
  metis:
    user: DEFINED-IN-SECRETS
    password: DEFINED-IN-SECRETS

openTelemetryPlugin:
  auditLogs:
    cluster: DEFINED-IN-SECRETS
    elastic:
      enabled: false
      tls:
        crt: none
    collectorImage:
      repository: keppel.eu-de-1.cloud.sap/ccloud/opentelemetry-collector-contrib
      tag: a8981ba
    customLabels:
      prometheus: DEFINED-IN-SECRETS
    podAnnotations:
      kubectl.kubernetes.io/default-container: "otc-container"
    updateStrategy:
      type: RollingUpdate
      rollingUpdate:
        maxSurge: 0
        maxUnavailable: "25%"
    terminationGracePeriodSeconds: 10
    affinity:
      nodeAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          nodeSelectorTerms:
          - matchExpressions:
            - key: cloud.sap/deployment-state
              operator: NotIn
              values:
              - reinstalling
            - key: cloud.sap/esx-in-maintenance
              operator: NotIn
              values:
              - alarm
    logsCollector:
      enabled: false
      auditd:
        enabled: false
      auditpoller:
        enabled: false
    region: DEFINED-IN-SECRETS
    openSearchLogs:
      endpoint: DEFINED-IN-SECRETS
      failover_username_a: DEFINED-IN-SECRETS
      failover_password_a: DEFINED-IN-SECRETS
      failover_username_b: DEFINED-IN-SECRETS
      failover_password_b: DEFINED-IN-SECRETS
      index: DEFINED-IN-SECRETS
    prometheus:
      additionalLabels:
        prometheus: infra-frontend
      podMonitor:
        enabled: false
  auditPoller:
    enabled: true
    logLevel: info
    iasApi:
      user: DEFINED-IN-SECRETS
      password: DEFINED-IN-SECRETS
      tokenURL: DEFINED-IN-SECRETS
      apiURL: DEFINED-IN-SECRETS
      alternateApiURL: DEFINED-IN-SECRETS
      syncFrom: DEFINED-IN-SECRETS
    iasChangelog:
      user: DEFINED-IN-SECRETS
      password: DEFINED-IN-SECRETS
      url: DEFINED-IN-SECRETS
    persistence:
      enabled: true