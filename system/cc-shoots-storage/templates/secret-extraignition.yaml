{{- range $key, $cluster := .Values.stShoots }}
{{- $region := regexReplaceAll "^st[0-9]+-" $key "" }}
---
apiVersion: v1
kind: Secret
metadata:
  name: extraignition-storage-{{ $key }}
type: Opaque
stringData:
  ignition: |
    passwd:
      users:
        - name: "{{ printf "{{ resolve `vault+kvv2:///secrets/%s/cc-gardener/nodes/storage-user/username` }}" $region }}"
          password_hash: "{{ printf "{{ resolve `vault+kvv2:///secrets/%s/cc-gardener/nodes/storage-user/passwordHash` }}" $region }}"
          groups: [ "wheel" ]
{{- end }}
