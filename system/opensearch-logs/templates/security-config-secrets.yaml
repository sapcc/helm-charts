  ds-storage-ism.json: {{ include (print .Template.BasePath  "/config/_ds-storage-ism.json.tpl") . | b64enc }}
  ds.json: {{ include (print .Template.BasePath  "/config/_ds.json.tpl") . | b64enc }}
