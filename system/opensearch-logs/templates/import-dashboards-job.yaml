apiVersion: batch/v1
kind: Job
metadata:
  name: "import-dashboards"
  labels:
    app.kubernetes.io/managed-by: {{ .Release.Service | quote }}
    app.kubernetes.io/instance: {{ .Release.Name | quote }}
    app.kubernetes.io/version: {{ .Chart.AppVersion }}
    helm.sh/chart: "{{ .Chart.Name }}-{{ .Chart.Version }}"
    ccloud/service: logs
    ccloud/support-group: observability
  annotations:
    # This is what defines this resource as a hook. Without this line, the
    # job is considered part of the release.
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "-5"
spec:
  template:
    metadata:
      name: "import-dashboards"
      labels:
        app.kubernetes.io/managed-by: {{ .Release.Service | quote }}
        app.kubernetes.io/instance: {{ .Release.Name | quote }}
        helm.sh/chart: "{{ .Chart.Name }}-{{ .Chart.Version }}"
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: ccloud.sap.com/nodepool
                operator: In
                values:
                - {{ .Values.global.nodepool }}
      restartPolicy: Never
      containers:
      - name: import-dashboards 
        image: "{{ .Values.global.registry }}/unified-kubernetes-toolbox:latest"
        command: ["/bin/bash", "/scripts/import-dashboards.sh"]
        env:
          - name: ISM_INDEXES
            value: "{{ .Values.global.index.ism_indexes }}"
          - name: ADMIN_USER
            valueFrom:
              secretKeyRef:
                name: cron-secrets
                key: ADMIN_USER
          - name: ADMIN_PASSWORD
            valueFrom:
              secretKeyRef:
                name: cron-secrets
                key: ADMIN_PASSWORD
          - name: ADMIN2_USER
            valueFrom:
              secretKeyRef:
                name: cron-secrets
                key: ADMIN2_USER
          - name: ADMIN2_PASSWORD
            valueFrom:
              secretKeyRef:
                name: cron-secrets
                key: ADMIN2_PASSWORD
          - name: CLUSTER_HOST
            value: "https://opensearch-logs-client.{{ .Values.global.clusterType }}.{{ .Values.global.region }}.{{ .Values.global.tld }}:{{ .Values.httpPort }}"
          - name: RETENTION_NAME
            value: "log"
          - name: FILE_RETENTION_SCHEMA_VERSION
            value: "{{ .Values.global.index.schema_version }}"
        volumeMounts:
        - mountPath: /scripts
          name: security-config
        - mountPath: /dashboards
          name: dashboards
      volumes:
      - name: security-config
        secret:
          defaultMode: 420
          secretName: security-config
      - name: dashboards
        configMap:
          defaultMode: 420
          name: dashboards
