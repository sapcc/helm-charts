---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: cc:oidc-ias-admin
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-admin
subjects:
  - apiGroup: rbac.authorization.k8s.io
    kind: Group
    name: MUST_BE_SET_IN_OVERLAY
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: metal-token-rotate
  namespace: kube-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: metal-token-rotate
rules:
  - apiGroups:
      - "authentication.k8s.io"
    resources:
      - tokenreviews
    verbs:
      - create
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: metal-token-rotate
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: metal-token-rotate
subjects:
  - kind: ServiceAccount
    name: metal-token-rotate
    namespace: kube-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: metal-token-rotate
  namespace: kube-system
rules:
  - apiGroups:
      - ""
    resources:
      - serviceaccounts/token
    resourceNames:
      - metal-operator-controller-manager
    verbs:
      - create
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: metal-token-rotate
  namespace: kube-system
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: metal-token-rotate
subjects:
  - kind: ServiceAccount
    name: metal-token-rotate
    namespace: kube-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: cc:oidc-ias-viewer
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: view
subjects:
  - apiGroup: rbac.authorization.k8s.io
    kind: Group
    name: MUST_BE_SET_IN_OVERLAY
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: cc:oidc-ias-metal-viewer
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: metal-api-viewer
subjects:
  - apiGroup: rbac.authorization.k8s.io
    kind: Group
    name: MUST_BE_SET_IN_OVERLAY
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: cc:oidc-ias-servermaintenance-editor
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: servermaintenance-editor-role
subjects:
  - apiGroup: rbac.authorization.k8s.io
    kind: Group
    name: MUST_BE_SET_IN_OVERLAY
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: metal-api-viewer
rules:
  - apiGroups:
      - metal.ironcore.dev
    resources:
      - '*'
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - boot.ironcore.dev
    resources:
      - '*'
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - ipam.metal.ironcore.dev
    resources:
      - '*'
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - ipam.cluster.x-k8s.io
    resources:
      - '*'
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - ""
    resources:
      - secrets
    verbs:
      - get
      - list
      - watch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: metal-operator-webhook-injector
# Narrowed scope per the kustomize-sidecar-injection spec: in caBundle-rotation
# mode the sidecar only needs to get + patch the caBundle field of named
# Validating/MutatingWebhookConfigurations on the workerless cluster. It does
# NOT create or replace WebhookConfigurations (they are applied directly by the
# remote/ kustomize root). Tracked in SAP-cloud-infrastructure/webhook-injector#9.
rules:
  - apiGroups: ["admissionregistration.k8s.io"]
    resources: ["mutatingwebhookconfigurations", "validatingwebhookconfigurations"]
    verbs: ["get", "list", "watch", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: metal-operator-webhook-injector-rolebinding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: metal-operator-webhook-injector
subjects:
  - kind: ServiceAccount
    name: metal-operator-controller-manager
    namespace: kube-system
