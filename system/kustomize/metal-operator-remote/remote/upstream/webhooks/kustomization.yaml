apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
# Consume only the upstream VWC manifest, NOT the whole `config/webhook/`
# directory — the directory URL would also pull `service.yaml` (a regular
# ClusterIP Service in the `system` namespace), which is endpointless on
# the workerless cluster (the manager Pod runs in the host cluster) and
# never used for callbacks: the webhook-injector admission webhook
# (`metal-operator-webhook-injector-mutator`, bootstrapped on the workerless
# cluster) rewrites clientConfig.Service → clientConfig.URL synchronously
# at admission time, so the apiserver only ever stores URL form.
#
# Architecture per webhook-injector PR #10 v2 patch mode + admission
# bootstrap (see openspec change replace-managedresource-with-dual-kustomize
# Section 16). The VWC's clientConfig.service.namespace=system field reference
# is harmless: K8s does not validate Service existence at VWC apply time, and
# admission rewrite replaces it with URL form before any callback fires.
resources:
  # Plain HTTPS URL (raw.githubusercontent.com) — kustomize's git-ref form
  # (`https://github.com/...//config/webhook/manifests.yaml?ref=v0.4.0`)
  # treats the path as a directory and refuses to resolve to a file. The
  # raw URL pins to a tag and pulls the single VWC manifest without also
  # pulling upstream's `service.yaml`.
  - https://raw.githubusercontent.com/ironcore-dev/metal-operator/v0.4.0/config/webhook/manifests.yaml
# Label the upstream-shipped ValidatingWebhookConfiguration so the
# webhook-injector sidecar's --webhook-label selector finds it. The VWC
# name (validating-webhook-configuration, from upstream config/webhook/
# manifests.yaml@v0.4.0) is preserved verbatim — selection is by label,
# not by name.
patches:
  - target:
      kind: ValidatingWebhookConfiguration
      name: validating-webhook-configuration
    patch: |
      - op: add
        path: /metadata/labels
        value:
          webhook-injector.cloud.sap/managed: "true"
