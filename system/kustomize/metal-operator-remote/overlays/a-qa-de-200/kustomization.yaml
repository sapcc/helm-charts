apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  # Host resources (Deployment with webhook-injector, Services, Ingress, NetworkPolicy, ConfigMaps, Secrets, RBAC)
  - ../../host/overlays/a-qa-de-200
  # Remote upstream ManagedResources (pre-rendered CRDs + RBAC + webhooks)
  - ../../remote/upstream/crds-and-rbac
  - ../../remote/upstream/webhooks
  # Remote custom resources (Namespace, custom RBAC with QA groups)
  - ../../remote/custom/overlays/a-qa-de-200
