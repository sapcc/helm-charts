apiVersion: kustomize.config.k8s.io/v1alpha1
kind: Component
resources:
  # SA + Role + RoleBinding for the manager Pod that hosts this sidecar.
  # Originated with the sidecar feature (commit 9ffb1dc0c3, Fabian Ruff,
  # 2026-04-20: "Add RBAC and service account for the webhook-injector
  # sidecar"). Encapsulating it in this Component makes enable/disable atomic.
  - webhook-injector-rbac.yaml
patches:
  - path: sidecar.yaml
images:
  - name: keppel.global.cloud.sap/ccloud-ghcr-io-mirror/SAP-cloud-infrastructure/webhook-injector
    newTag: 0.0.7
