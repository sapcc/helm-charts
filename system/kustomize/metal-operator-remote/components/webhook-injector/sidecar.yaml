apiVersion: apps/v1
kind: Deployment
metadata:
  name: controller-manager
  namespace: system
spec:
  template:
    spec:
      # Pod-level SA for both manager and sidecar containers. The SA itself,
      # along with its host-side Role + RoleBinding, is delivered by this
      # Component's resources/ list. Without this Component, the Deployment
      # falls back to upstream's default `controller-manager` SA.
      serviceAccountName: metal-operator-webhook-injector
      initContainers:
        - name: webhook-injector
          restartPolicy: Always
          image: keppel.global.cloud.sap/ccloud-ghcr-io-mirror/SAP-cloud-infrastructure/webhook-injector:latest
          # Patch mode (per webhook-injector PR #10 v2: label-based selection,
          # caBundle-only refresh, no URL/Service rewriting). The sidecar reads
          # the workerless ValidatingWebhookConfiguration matching the
          # --webhook-label selector and refreshes its caBundle field. Does NOT
          # create resources, does NOT rewrite clientConfig.URL, does NOT clear
          # clientConfig.Service. The workerless remote/ kustomize root delivers
          # the WebhookConfiguration directly (carrying the matching label).
          #
          # Cutover-gated on SAP-cloud-infrastructure/webhook-injector#10
          # merging + a new binary image being published. PR can land on master
          # regardless (Concourse pipeline triggers stay disabled until cutover).
          args:
            - --webhook-label=webhook-injector.cloud.sap/managed=true
            # cert-sans covers production cert SAN (URL-form compat) +
            # Scope 3 Service-form SNI for the workerless API server's TLS
            # connection (workerless API server constructs URL
            # https://webhook-service.system.svc:443/<path> from the
            # ValidatingWebhookConfiguration's clientConfig.service field).
            - --cert-sans=metal-operator-webhook-service,webhook-service.system.svc,webhook-service.system.svc.cluster.local
            - --target-kubeconfig=/var/run/remote-kubeconfig/kubeconfig
            # Sidecar-internal config matching helm chart's hardcoded values
            # (verified live on rt-eu-de-1's shoot deployment).
            - --leader-election-id=metal-operator-remote-webhook-injector-leader
            - --cert-secret-name=metal-operator-remote-cert-secret-name
          ports:
            - name: metrics
              containerPort: 8082
            - name: health
              containerPort: 8083
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - "ALL"
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8083
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8083
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          volumeMounts:
            - name: webhook-certs
              mountPath: /tmp/webhook-certs
            - name: remote-serviceaccount
              mountPath: /var/run/secrets/kubernetes.io/remote-serviceaccount
              readOnly: true
            - name: remote-kubeconfig
              mountPath: /var/run/remote-kubeconfig
              readOnly: true
