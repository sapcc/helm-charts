apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../base
patches:
  # Patch ingress with correct domain
  - target:
      kind: Ingress
      name: metal-operator-metal-registry-ingress
    patch: |
      - op: replace
        path: /spec/tls/0/hosts/0
        value: metal-operator-remote.runtime.eu-de-1.cloud.sap
      - op: replace
        path: /spec/rules/0/host
        value: metal-operator-remote.runtime.eu-de-1.cloud.sap
  # Patch remote-kubeconfig ConfigMap with actual apiserver URL
  - target:
      kind: ConfigMap
      name: remote-kubeconfig
    patch: |
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: remote-kubeconfig
      data:
        kubeconfig: |
          apiVersion: v1
          kind: Config
          clusters:
          - cluster:
              certificate-authority: /var/run/secrets/kubernetes.io/remote-serviceaccount/ca.crt
              server: https://api.m-eu-de-1.cp.external.rt-eu-de-1.soil-garden.eu-de-1.cloud.sap
            name: remote
          contexts:
          - context:
              cluster: remote
              user: sa
            name: remote
          current-context: remote
          users:
          - name: sa
            user:
              tokenFile: /var/run/secrets/kubernetes.io/remote-serviceaccount/token
  # Patch rotate-kubeconfig with actual server URL
  - target:
      kind: Secret
      name: metal-token-rotate-kubeconfig
    patch: |
      apiVersion: v1
      kind: Secret
      metadata:
        name: metal-token-rotate-kubeconfig
      stringData:
        kubeconfig: |
          apiVersion: v1
          clusters:
          - cluster:
              certificate-authority-data: ""
              server: https://kube-apiserver.shoot--cp--m-eu-de-1.svc.cluster.local:443
            name: remote-cluster
          contexts:
          - context:
              cluster: remote-cluster
              user: metal-token-rotate
              namespace: kube-system
            name: remote-cluster
          current-context: remote-cluster
          kind: Config
          preferences: {}
          users:
          - name: metal-token-rotate
            user:
              token: ""
  # Patch Deployment with environment-specific args and apiserver URL
  - target:
      kind: Deployment
      name: controller-manager
    patch: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: controller-manager
      spec:
        template:
          spec:
            containers:
              - name: manager
                args:
                  - --mac-prefixes-file=/etc/macdb/macdb.yaml
                  - --probe-image=keppel.global.cloud.sap/ccloud-ghcr-io-mirror/ironcore-dev/metalprobe:v0.1.0
                  - --probe-os-image=keppel.global.cloud.sap/ccloud-ghcr-io-mirror/gardenlinux/gardenlinux:1770.0
                  - --manager-namespace=metal-servers
                  - --insecure=false
                  - --registry-url=https://metal-operator-remote.runtime.eu-de-1.cloud.sap
                  - --enforce-first-boot
                  - --enforce-power-off
                env:
                  - name: ENABLE_WEBHOOKS
                    value: "false"
                  - name: KUBERNETES_CLUSTER_DOMAIN
                    value: "cluster.local"
                  - name: KUBERNETES_SERVICE_HOST
                    value: "api.m-eu-de-1.cp.external.rt-eu-de-1.soil-garden.eu-de-1.cloud.sap"
images:
  - name: ghcr.io/ironcore-dev/metal-operator-controller-manager
    newName: keppel.global.cloud.sap/ccloud-ghcr-io-mirror/ironcore-dev/metal-operator-controller-manager
    newTag: sha-4854c23
