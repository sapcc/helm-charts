apiVersion: v1
kind: Secret
metadata:
  name: macdb
type: Opaque
stringData:
  # SAP-CC fleet-wide vendor list — verified structurally identical
  # across all 6 metal-operator-remote consumers in cc/kube-secrets.
  # Per-cluster overlays substitute REGION_PLACEHOLDER with the
  # cluster's region token (e.g., eu-de-1, na-us-2, qa-de-1).
  # The {{ resolve "vault+kvv2:///..." }} strings pass through unchanged;
  # the cluster's secrets-injector.cloud.sap mutating webhook resolves
  # them at admission time.
  macdb.yaml: |
    macPrefixes:
      - macPrefix: c4cbe1b1
        manufacturer: Dell
        protocol: Redfish
        port: 443
        type: bmc
        defaultCredentials:
          - username: '{{ resolve "vault+kvv2:///secrets/REGION_PLACEHOLDER/ironic/ipmi-user/ironic/username" }}'
            password: '{{ resolve "vault+kvv2:///secrets/REGION_PLACEHOLDER/ironic/ipmi-user/ironic/password" }}'
      - macPrefix: d08e79
        manufacturer: Dell
        protocol: Redfish
        port: 443
        type: bmc
        defaultCredentials:
          - username: '{{ resolve "vault+kvv2:///secrets/REGION_PLACEHOLDER/ironic/ipmi-user/ironic/username" }}'
            password: '{{ resolve "vault+kvv2:///secrets/REGION_PLACEHOLDER/ironic/ipmi-user/ironic/password" }}'
      - macPrefix: 0894ef
        manufacturer: Lenovo
        protocol: Redfish
        port: 443
        type: bmc
        defaultCredentials:
          - username: '{{ resolve "vault+kvv2:///secrets/REGION_PLACEHOLDER/ironic/ipmi-user/ironic/username" }}'
            password: '{{ resolve "vault+kvv2:///secrets/REGION_PLACEHOLDER/ironic/ipmi-user/ironic/password" }}'
      - macPrefix: 5ced8c
        manufacturer: HPE
        protocol: Redfish
        port: 443
        type: bmc
        defaultCredentials:
          - username: '{{ resolve "vault+kvv2:///secrets/REGION_PLACEHOLDER/ironic/ipmi-user/ironic/username" }}'
            password: '{{ resolve "vault+kvv2:///secrets/REGION_PLACEHOLDER/ironic/ipmi-user/ironic/password" }}'
