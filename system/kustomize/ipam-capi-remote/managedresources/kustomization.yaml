apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: kube-system
namePrefix: ipam-capi-
resources:
- https://github.com/kubernetes-sigs/cluster-api-ipam-provider-in-cluster//config/crd?ref=v1.1.0
- https://github.com/kubernetes-sigs/cluster-api-ipam-provider-in-cluster//config/rbac?ref=v1.1.0
# config/webhook is intentionally omitted — the MutatingWebhookConfiguration
# and ValidatingWebhookConfiguration are rendered into the Helm chart directly
# (ipam-capi-remote/webhooks.yaml, generated from kustomize/ipam-capi-remote/webhooks).
- https://raw.githubusercontent.com/kubernetes-sigs/cluster-api/v1.13.4/config/crd/bases/cluster.x-k8s.io_clusters.yaml
- https://raw.githubusercontent.com/kubernetes-sigs/cluster-api/v1.13.4/config/crd/bases/ipam.cluster.x-k8s.io_ipaddresses.yaml
- https://raw.githubusercontent.com/kubernetes-sigs/cluster-api/v1.13.4/config/crd/bases/ipam.cluster.x-k8s.io_ipaddressclaims.yaml
