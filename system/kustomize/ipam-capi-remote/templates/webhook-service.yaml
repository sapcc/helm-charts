{{- if .Values.webhook.enable }}
apiVersion: v1
kind: Service
metadata:
  name: ipam-capi-remote-webhook-service
  labels:
    {{- include "ipam-capi-remote.labels" . | nindent 4 }}
spec:
  ports:
    - port: 443
      protocol: TCP
      targetPort: 9443
  selector:
    app.kubernetes.io/instance: ipam-capi-remote
    app.kubernetes.io/name: ipam-capi-remote
    control-plane: controller-manager
{{- end }}
