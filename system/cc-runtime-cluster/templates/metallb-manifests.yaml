{{- range $cluster := .Values.clusters }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: metallb-manifests
  namespace: {{ $cluster.namespace }}
data:
  data: |-
    apiVersion: metallb.io/v1beta1
    kind: L2Advertisement
    metadata:
      name: l2adv
      namespace: metallb-system
{{- if $cluster.metallb }}
{{- /* MetalLB pool IPs come from the CC Kubernetes Runtime Transit role (/26 prefixes).
       The first /27 of each prefix is reserved for LB purposes.
       baseAddress is the first usable IP of the LB /27 (network address + 10).
       Example: for prefix 10.20.30.64/26 the LB /27 is 10.20.30.64/27,
                so baseAddress is 10.20.30.74 (64 + 10).

       From baseAddress we derive two pools:
       - metallb-pool-manual: baseAddress to baseAddress+4  (5 IPs, manual assignment)
       - metallb-pool:        baseAddress+5 to baseAddress+20 (16 IPs, auto assignment)

       Set per cluster in values:
         clusters:
           - name: rt-eu-de-1
             metallb:
               baseAddress: "10.20.30.74"
*/ -}}
{{- $parts := splitList "." $cluster.metallb.baseAddress }}
{{- $prefix := printf "%s.%s.%s" (index $parts 0) (index $parts 1) (index $parts 2) }}
{{- $base := index $parts 3 | atoi }}
    ---
    apiVersion: metallb.io/v1beta1
    kind: IPAddressPool
    metadata:
      name: metallb-pool
      namespace: metallb-system
    spec:
      addresses:
      - {{ $prefix }}.{{ add $base 5 }}-{{ $prefix }}.{{ add $base 20 }}
    ---
    apiVersion: metallb.io/v1beta1
    kind: IPAddressPool
    metadata:
      name: metallb-pool-manual
      namespace: metallb-system
    spec:
      addresses:
      - {{ $prefix }}.{{ $base }}-{{ $prefix }}.{{ add $base 4 }}
      autoAssign: false
{{- end }}
{{- end }}
