{{- if .Values.machineHealthCheck.enabled }}
apiVersion: cluster.x-k8s.io/v1beta2
kind: MachineHealthCheck
metadata:
  name: mhc-worker-rt-{{ .Values.global.region }}
spec:
  clusterName: rt-{{ .Values.global.region }}
  selector:
    matchLabels:
      kubernetes.metal.cloud.sap/cluster: rt-{{ .Values.global.region }}
      kubernetes.metal.cloud.sap/role: server
  checks:
    nodeStartupTimeoutSeconds: {{ .Values.machineHealthCheck.nodeStartupTimeoutSeconds }}
    unhealthyNodeConditions:
      - type: Ready
        status: Unknown
        timeoutSeconds: {{ .Values.machineHealthCheck.worker.unhealthyNodeTimeoutSeconds }}
      - type: Ready
        status: "False"
        timeoutSeconds: {{ .Values.machineHealthCheck.worker.unhealthyNodeTimeoutSeconds }}
  remediation:
    triggerIf:
      unhealthyLessThanOrEqualTo: {{ .Values.machineHealthCheck.worker.maxUnhealthy }}

---
apiVersion: cluster.x-k8s.io/v1beta2
kind: MachineHealthCheck
metadata:
  name: mhc-kcp-rt-{{ .Values.global.region }}
spec:
  clusterName: rt-{{ .Values.global.region }}
  selector:
    matchLabels:
      cluster.x-k8s.io/control-plane: ""
  checks:
    nodeStartupTimeoutSeconds: {{ .Values.machineHealthCheck.nodeStartupTimeoutSeconds }}
    unhealthyNodeConditions:
      - type: Ready
        status: Unknown
        timeoutSeconds: {{ .Values.machineHealthCheck.controlplane.unhealthyNodeTimeoutSeconds }}
      - type: Ready
        status: "False"
        timeoutSeconds: {{ .Values.machineHealthCheck.controlplane.unhealthyNodeTimeoutSeconds }}
  remediation:
    triggerIf:
      unhealthyLessThanOrEqualTo: {{ .Values.machineHealthCheck.controlplane.maxUnhealthy }}
{{- end }}