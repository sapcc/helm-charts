{{- range $cluster := .Values.clusters }}
{{- if $.Values.machineHealthCheck.enabled }}
---
apiVersion: cluster.x-k8s.io/v1beta2
kind: MachineHealthCheck
metadata:
  name: mhc-worker-{{ $cluster.name }}
  namespace: {{ $cluster.namespace }}
spec:
  clusterName: {{ $cluster.name }}
  selector:
    matchLabels:
      kubernetes.metal.cloud.sap/cluster: {{ $cluster.name }}
      kubernetes.metal.cloud.sap/role: server
  checks:
    nodeStartupTimeoutSeconds: {{ $.Values.machineHealthCheck.nodeStartupTimeoutSeconds }}

---
apiVersion: cluster.x-k8s.io/v1beta2
kind: MachineHealthCheck
metadata:
  name: mhc-kcp-{{ $cluster.name }}
  namespace: {{ $cluster.namespace }}
spec:
  clusterName: {{ $cluster.name }}
  selector:
    matchLabels:
      cluster.x-k8s.io/control-plane: ""
  checks:
    nodeStartupTimeoutSeconds: {{ $.Values.machineHealthCheck.nodeStartupTimeoutSeconds }}
{{- end }}
{{- end }}
