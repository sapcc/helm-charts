{{- range $cluster := .Values.clusters }}
---
apiVersion: cluster.x-k8s.io/v1beta2
kind: MachineDeployment
metadata:
  name: worker-{{ $cluster.name }}
  namespace: {{ $cluster.namespace }}
spec:
  clusterName: {{ $cluster.name }}
  replicas: {{ default $.Values.worker.replicas $cluster.workerReplicas }}
  rollout:
    strategy:
      type: RollingUpdate
      rollingUpdate:
        # We don't have spare nodes in bare metal clusters to spin up a new machine during upgrade.
        # Therefore we change maxSurge from 1 (default) to 0 and set maxUnavailable to 1.
        # Cluster will be updated by temporary scaling down control plane to 1 machine less.
        maxSurge: 0
        maxUnavailable: 1
  selector:
    matchLabels:
      kubernetes.metal.cloud.sap/cluster: {{ $cluster.name }}
      kubernetes.metal.cloud.sap/role: server
  template:
    metadata:
      labels:
        kubernetes.metal.cloud.sap/cluster: {{ $cluster.name }}
        kubernetes.metal.cloud.sap/role: server
        {{- if $.Values.maintenanceController.enabled }}
        runtime-extension-maintenance-controller.cloud.sap/enabled: "true"
        {{- end }}
    spec:
      bootstrap:
        configRef:
          apiGroup: bootstrap.cluster.x-k8s.io
          kind: KubeadmConfigTemplate
          name: worker-{{ $cluster.name }}
      clusterName: {{ $cluster.name }}
      infrastructureRef:
        kind: IroncoreMetalMachineTemplate
        apiGroup: infrastructure.cluster.x-k8s.io
        name: worker-{{ $cluster.name }}
      deletion:
      # to avoid "Node deletion timeout expired, continuing without Node deletion"
      # https://github.com/kubernetes-sigs/cluster-api/pull/5608
        nodeDeletionTimeoutSeconds: 0
        nodeDrainTimeoutSeconds: 0
      version: {{ $.Values.controlplane.version }}
{{- end }}
