{{- range $cluster := .Values.clusters }}
---
apiVersion: addons.cluster.x-k8s.io/v1beta2
kind: ClusterResourceSet
metadata:
  labels:
    cluster.x-k8s.io/cluster-name: {{ $cluster.name }}
  name: crs-{{ $cluster.name }}
  namespace: {{ $cluster.namespace }}
spec:
  clusterSelector:
    matchLabels:
      cluster.x-k8s.io/cluster-name: {{ $cluster.name }}
  strategy: Reconcile
  resources:
  - kind: ConfigMap
    name: greenhouse-manifests
  - kind: ConfigMap
    name: metallb-manifests
{{- end }}
