global:
  region: test-1

controlplane:
  podSubnet: "10.244.0.0/16"
  serviceSubnet: "10.96.0.0/12"
  address: 192.168.1.100
  port: 6443
  version: v1.31.5
  uplinkInterface: bond0
  machineTemplate:
    matchLabels:
      node-role.kubernetes.io/cp: ""

worker:
  machineTemplate:
    matchLabels:
      node-role.kubernetes.io/worker: ""

machineTemplate:
  image: flatcar-stable-3975.2.2
  metadata:
    node-role.kubernetes.io/cp: ""

additionalConfig:
  authenticationConfig: |
    - path: /etc/kubernetes/authentication.yaml
      filesystem: root
      mode: 0644
      contents:
        inline: |
          apiVersion: apiserver.config.k8s.io/v1beta1
          kind: AuthenticationConfiguration
          jwt:
            - issuer:
                url: https://example.com
                audiences:
                - test-audience
              claimMappings:
                username:
                  claim: 'name'
                  prefix: ''
  secrets: |
    - path: /etc/kubernetes/enc/enc.yaml
      filesystem: root
      mode: 0644
      overwrite: true
      contents:
        inline: |
          Foo Bar

clusters:
  - name: rt-test-1
    namespace: capi-runtime
    metallb:
      baseAddress: "10.20.30.10"
  - name: rt-test-7
    namespace: capi-runtime-7
    metallb:
      baseAddress: "10.20.30.74"
  - name: rt-test-8
    namespace: capi-runtime-8
