{{- define "ldap-named-user.sssd-conf" -}}
[sssd]
config_file_version = 2
{{- with .Values.sssd.startServices }}
services = {{ join ", " . }}
{{- end }}
domains = ldap

[nss]

[pam]

[domain/ldap]
debug_level = 0x0170
id_provider = ldap
auth_provider = ldap
access_provider = ldap
timeout = 20

ldap_id_mapping = true
ldap_schema = ad
ldap_account_expire_policy = ad
ldap_force_upper_case_realm = true
ldap_referrals = false
ldap_disable_range_retrieval = false
ldap_tls_reqcert = allow
ldap_id_use_start_tls = false

ldap_uri = {{ required "ldapUrl must be set" .Values.ldapUrl }}
ldap_default_bind_dn = CN={{ include "ldap-named-user.ldapUserResolved" . }},{{ include "ldap-named-user.bindDnBase" . }}
ldap_default_authtok_type = {{ default "password" .Values.ldapAuthType }}
ldap_default_authtok = {{ include "ldap-named-user.ldapPassResolved" . }}

ldap_access_filter = {{ required "ldapAccessFilter must be set" .Values.ldapAccessFilter }}

ldap_user_search_base = {{ include "ldap-named-user.userSearchBase" . }}
ldap_user_object_class = user
ldap_user_name = cn
ldap_user_objectsid = objectSid
ldap_user_uuid = objectGUID
ldap_user_name = cn
ldap_user_principal = userPrincipalName
ldap_user_fullname = displayName

ldap_group_search_base = {{ include "ldap-named-user.groupSearchBase" . }}
ldap_group_object_class = group
ldap_group_objectsid = objectSid
ldap_group_uuid = objectGUID
ldap_group_name = cn
ldap_groups_use_matching_rule_in_chain = true
ldap_initgroups_use_matching_rule_in_chain = true

ldap_use_tokengroups = true

cache_credentials = True
default_shell = /bin/bash
overwrite_homedir = /home/%u
case_sensitive = {{ default true .Values.sssd.caseSensitive }}
{{- end }}

{{- define "ldap-named-user.sudoers-ldap" -}}
{{- range $key, $value := .Values.sudoersGroups }}
%{{ $value }} ALL=(ALL) NOPASSWD: ALL
{{- end }}
{{- end }}

apiVersion: v1
kind: Secret
metadata:
  name: {{ include "ldap-named-user.fullname" . }}
  labels:
    k8s-app: ldap-named-user
type: Opaque
data:
  sssd.conf: {{ include "ldap-named-user.sssd-conf" . | b64enc }}
  sudoers-ldap: {{ include "ldap-named-user.sudoers-ldap" . | b64enc }}
