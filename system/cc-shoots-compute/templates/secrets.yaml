{{- $regions := list -}}
{{- range $key, $cluster := .Values.kvmShoots -}}
  {{- $regions = append $regions $cluster.region -}}
{{- end -}}
{{- $uniqueRegions := $regions | uniq | sortAlpha -}}
{{- range $uniqueRegions }}
{{- if (ne $.Release.Namespace "garden") }}
---
apiVersion: v1
kind: Secret
metadata:
  name: metal-{{ . }}
  annotations:
    metal.ironcore.dev/autoprovision: m-{{ coalesce $.Values.contextSuffix . }}/metal-servers
type: Opaque
---
apiVersion: security.gardener.cloud/v1alpha1
kind: CredentialsBinding
metadata:
  name: metal-{{ . }}
provider:
  type: ironcore-metal
credentialsRef:
  apiVersion: v1
  kind: Secret
  name: metal-{{ . }}
  namespace: {{ $.Release.Namespace }}
---
apiVersion: security.gardener.cloud/v1alpha1
kind: WorkloadIdentity
metadata:
  name: metal-wi-{{ . }}
  annotations:
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "1"
spec:
  audiences:
    - metal-api
  targetSystem:
    type: ironcore-metal
---
apiVersion: security.gardener.cloud/v1alpha1
kind: CredentialsBinding
metadata:
  name: metal-wi-{{ . }}
  annotations:
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "5"
provider:
  type: ironcore-metal
credentialsRef:
  apiVersion: security.gardener.cloud/v1alpha1
  kind: WorkloadIdentity
  name: metal-wi-{{ . }}
  namespace: {{ $.Release.Namespace }}
{{- end }}
{{- end }}
