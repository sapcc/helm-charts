{{- if .Values.enabled }}
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: bridge-attach
  namespace: kube-system
  labels:
    app.kubernetes.io/name: bridge-attach
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: bridge-attach
  updateStrategy:
    rollingUpdate:
      maxUnavailable: '10%'
    type: RollingUpdate
  template:
    metadata:
      labels:
        app.kubernetes.io/name: bridge-attach
    spec:
      hostNetwork: true
      hostPID: true
      priorityClassName: system-node-critical
      terminationGracePeriodSeconds: 5
      containers:
        - name: bridge-attach
          image: "{{ required ".Values.images.bridgeAttach.image is missing" .Values.images.bridgeAttach.image }}:{{ required ".Values.images.bridgeAttach.tag is missing" .Values.images.bridgeAttach.tag }}"
          imagePullPolicy: IfNotPresent
          command:
            - /bin/bash
            - -c
            - |
              bash /scripts/add-iface-to-bridge.sh "$IFACE" "$BRIDGE"
              echo "Sleeping forever to keep pod Running."
              sleep infinity
          env:
            - name: IFACE
              value: {{ required ".Values.interface is missing" .Values.interface | quote }}
            - name: BRIDGE
              value: {{ required ".Values.bridge is missing" .Values.bridge | quote }}
          securityContext:
            privileged: true
            capabilities:
              add:
                - NET_ADMIN
                - SYS_ADMIN
          resources:
{{ toYaml .Values.resources | indent 12 }}
          volumeMounts:
            - name: script
              mountPath: /scripts
      volumes:
        - name: script
          configMap:
            name: bridge-attach-script
            defaultMode: 0755
      {{- with .Values.nodeSelector }}
      nodeSelector:
      {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
      {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
      {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
