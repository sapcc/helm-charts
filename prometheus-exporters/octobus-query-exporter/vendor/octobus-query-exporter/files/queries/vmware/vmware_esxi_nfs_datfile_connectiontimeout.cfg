[query_elasticsearch_octobus_nfsdatfile_connectiontimeout_issue]
QueryIndices = c0001_log*
QueryOnMissing = drop
QueryJson = {
  "size": 0,
  "aggs": {
    "hostsystem": {
      "terms": {
        "field": "syslog_hostname.keyword"
      }
    }
  },
  "query": {
    "bool": {
      "must": [
        {
          "match_phrase": {
            "message": "Connection timed out"
          }
        }
      ],
      "filter": [
        {
          "wildcard": {
            "message": "*catalog/shard/*.dat*"
          }
        },
        {
          "term": {
            "sap.cc.audit.source.keyword": "ESXi"
          }
        },
        {
          "range": {
            "@timestamp": {
              "gte": "now-15m"
            }
          }
        }
      ]
    }
  }
}
