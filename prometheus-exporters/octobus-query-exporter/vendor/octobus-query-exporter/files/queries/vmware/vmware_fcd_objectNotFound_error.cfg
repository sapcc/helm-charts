[query_elasticsearch_octobus_FCDObjectNotFound_issue]
QueryIndices = c0001_log*
QueryOnMissing = drop
QueryJson = {
      "size": 0,
      "aggs": {
        "hostsystem": {
          "terms": {
            "field": "syslog_hostname.keyword"
          }
        }
      },
      "query": {
        "bool": {
          "must": [
            {
              "match_phrase": {
                "message": "vmodl.fault.ManagedObjectNotFound"
              }
            },
            {
              "match_phrase": {
                "message": "vim.Datastore:ds:///vmfs/volumes"
              }
            }
          ],
          "filter": [
            {
              "range": {
                "@timestamp": {
                  "gte": "now-15m"
                }
              }
            }
          ]
        }
      }
  }
