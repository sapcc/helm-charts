{{- if .Values.netappsd.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "netapp-monitoring.fullname" . }}-sd
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "netapp-monitoring.labels" . | nindent 4 }}
type: Opaque
data:
  netappUsername: {{ .Values.netappsd.netappUsername  | b64enc | quote }}
  netappPassword: {{ .Values.netappsd.netappPassword | b64enc | quote }}
  netboxToken: {{ .Values.netappsd.netboxToken | b64enc | quote }}
  netboxHost: {{ .Values.netappsd.netboxHost | b64enc | quote }}
{{- end }}