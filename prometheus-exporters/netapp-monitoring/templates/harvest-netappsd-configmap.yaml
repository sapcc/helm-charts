{{- if .Values.netappsd.enabled }}
kind: ConfigMap
apiVersion: v1
metadata:
  name: {{ include "netapp-monitoring.fullname" . }}-sd-config
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "netapp-monitoring.labels" . | nindent 4 }}
data:
  start-poller.sh: |
    #!/bin/sh
    until [ -f /app/shared/harvest.yaml ]; do
        echo "Waiting for config file generated by netappsd-worker, sleeping 10 seconds..."
        sleep 10
    done
    echo "Config file found, starting harvest..."
    exec /opt/harvest/bin/harvest start -f --config /app/shared/harvest.yaml
  harvest.yaml.tpl: |
    Exporters:
      {{- toYaml .Values.exporters | nindent 6 }}
    Defaults:
      {{- toYaml .Values.defaults | nindent 6 }}
      auth_style: {{ .Values.auth.auth_style | default "basic_auth" }}
      credentials_file: {{ .Values.netappsd.credentials_file | default "/app/secrets/local-basic-auth.yml" }}
    Pollers:{{`
      {{ .Name }}:
        {{- if .Ip }}
        addr: {{ .Ip }}
        {{- else }}
        addr: {{ .Host }}
        {{- end }}
        datacenter: `}}{{ required ".Values.netappsd.region is required" .Values.netappsd.region }}{{`
        labels:
          - Availability_Zone: {{ .AvailabilityZone }}
          - filer: {{ .Name }}
          - host: {{ .Host }}
          - DC: {{ .Facility }}
          - Service: {{ .Service }}
          - lob: `}}{{ required ".Values.netappsd.lob is required" .Values.netappsd.lob }}
{{- end }}