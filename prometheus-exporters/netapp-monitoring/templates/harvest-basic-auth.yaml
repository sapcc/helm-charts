
apiVersion: v1
kind: Secret
metadata:
  finalizers:
    {{- range $.Values.finalizers }}
    - {{ . | quote }}
    {{- end }}
  name: {{ .Values.netappsd.credentials_secret }}
  namespace: {{ .Release.Namespace }}
type: Opaque
data:
  {{ .Values.netappsd.credentials_secret }}.yml: {{ include "netapp-monitoring.credentials-entry" . | b64enc }}
