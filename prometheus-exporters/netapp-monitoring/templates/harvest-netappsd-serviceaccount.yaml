{{- if .Values.netappsd.enabled }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.netappsd.serviceAccountName | default "netappsd" }}
  namespace: {{ .Release.Namespace }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ .Values.netappsd.serviceAccountName | default "netappsd" }}
  namespace: {{ .Release.Namespace }}
rules:
  - apiGroups: [""]
    resources: ["endpoints"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "update", "patch"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ .Values.netappsd.serviceAccountName | default "netappsd" }}
  namespace: {{ .Release.Namespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ .Values.netappsd.serviceAccountName | default "netappsd" }}
subjects:
  - kind: ServiceAccount
    name: {{ .Values.netappsd.serviceAccountName | default "netappsd" }}
    namespace: {{ .Release.Namespace }}
{{- end }}