[query_opensearch_logs_cronus_old_logs]
# The DEFAULT settings can be overridden.
QueryIntervalSecs = 3600
QueryTimeoutSecs = 60
QueryIndices = cronus*
QueryOnMissing = zero
QueryJson = {
            "size": 0,
            "query": {
              "bool": {
                "filter": [
                  {
                    "range": {
                      "@timestamp": {
                        "lt": "now-8d"
                      }
                    }
                  }
                ]
              }
            },
            "aggs": {
              "logs": {
                "terms": {
                  "field": "resource.app.label.ccloud.support-group.keyword"
                }
              }
            }
          }
