# Default values for persephone-liquid-apiserver.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

replicaCount: 1

image:
  repository: keppel.eu-de-1.cloud.sap/ccloud/persephone-liquid-apiserver
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

# Region where this instance is deployed (e.g., eu-de-1, ap-au-1)
region: ""

# Landscape: canary or prod
landscape: ""

# Virtual Garden API configuration
virtualGarden:
  # Virtual garden API server URL (specific to landscape)
  # Canary: https://api.garden.canary.k8s.ondemand.com
  # Prod: https://api.garden.live.k8s.ondemand.com
  apiServerURL: ""

  # OIDC configuration for authenticating to virtual garden
  oidc:
    # The issuer is automatically determined by the regional Kubernetes cluster
    # that signs the projected service account token. The issuer URL will be
    # the regional cluster's API server (e.g., https://api.{region}.cloud.sap).
    # This issuer must be configured in the Virtual Garden's AuthenticationConfiguration.
    # See STRUCTURED_AUTH.md for details - one issuer per region (15 total).

    # Client ID / Audience for the OIDC token
    audience: "persephone-liquid"

    # Service account name that will be used for authentication
    serviceAccountName: persephone-liquid-apiserver

    # Token file path (using projected service account token)
    tokenFile: /var/run/secrets/kubernetes.io/serviceaccount/token

# OpenStack Keystone configuration
openstack:
  # Keystone auth URL (region-specific) used for direct token validation
  authURL: ""

# Liquid policy configuration
liquidPolicy:
  # Policy rules in JSON format
  # This defines which OpenStack projects can access which resources
  rules: |
    {}

serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

podAnnotations: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
    - ALL
  readOnlyRootFilesystem: true

service:
  type: ClusterIP
  port: 80
  targetPort: 8080
  annotations: {}

ingress:
  enabled: false
  annotations: {}
  # hosts:
  #   - host: persephone-liquid.eu-de-1.cloud.sap
  #     paths:
  #       - path: /
  #         pathType: Prefix
  hosts: []
  # tls:
  #   - hosts:
  #       - persephone-liquid.eu-de-1.cloud.sap
  #     secretName: persephone-liquid-apiserver-tls
  tls: []

resources:
  limits:
    memory: 256Mi
  requests:
    cpu: 100m
    memory: 128Mi

autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 80
  targetMemoryUtilizationPercentage: 80

nodeSelector: {}

tolerations: []

affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
    - weight: 100
      podAffinityTerm:
        labelSelector:
          matchLabels:
            app: persephone
            role: liquid-apiserver
        topologyKey: kubernetes.io/hostname

# Liveness and readiness probes
livenessProbe:
  httpGet:
    path: /healthcheck
    port: http
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /healthcheck
    port: http
  initialDelaySeconds: 10
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 3

# Network policies
networkPolicy:
  enabled: false
  # Allow egress to virtual garden API
  allowEgressToVirtualGarden: true
  # Allow egress to Keystone
  allowEgressToKeystone: true
  # Allow DNS
  allowEgressToDNS: true

# Additional environment variables
env: []

# Additional volume mounts
volumeMounts: []

# Additional volumes
volumes: []

# Owner info sub chart
owner-info:
  support-group: containers
  helm-chart-url: https://github.com/sapcc/helm-charts/tree/master/global/persephone-liquid-apiserver
  service: persephone
  maintainers:
    - Caio Ronchi
    - Jan Knipper
