apiVersion: v1
kind: Secret
metadata:
  name: {{ include "persephone-liquid-apiserver.fullname" . }}
  labels:
    {{- include "persephone-liquid-apiserver.labels" . | nindent 4 }}
type: Opaque
stringData:
  applicationCredentialID: {{ required "openstack.applicationCredential.idVaultPath is required" .Values.openstack.applicationCredential.idVaultPath | quote }}
  applicationCredentialSecret: {{ required "openstack.applicationCredential.secretVaultPath is required" .Values.openstack.applicationCredential.secretVaultPath | quote }}
