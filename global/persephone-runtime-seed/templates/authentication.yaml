{{- if .Values.oidcConfig.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: authentication-{{ required "missing value for .Values.landscapeName" .Values.landscapeName }}
  namespace: garden
  annotations:
    argocd.argoproj.io/sync-wave: "0"
data:
  config.yaml: |
    apiVersion: apiserver.config.k8s.io/v1beta1
    kind: AuthenticationConfiguration
    jwt:
{{ toYaml .Values.oidcConfig.jwt | indent 6 }}
{{- end }}