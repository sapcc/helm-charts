    version: v1.57.0
    # values:
    #   image:
    #     #tag:
    #     #repository:
    helm:
      ociRepository:
        repository: keppel.global.cloud.sap/ccloud-europe-docker-pkg-dev-mirror/gardener-project/releases/charts/gardener/extensions/networking-calico
    imageVectorOverwrite:
      images:
      - name: calico-node
        repository: keppel.global.cloud.sap/ccloud-quay-mirror/calico/node
      - name: calico-cni
        repository: keppel.global.cloud.sap/ccloud-quay-mirror/calico/cni
      - name: bird-exporter
        repository: keppel.global.cloud.sap/ccloud-ghcr-io-mirror/czerwonk/bird_exporter
