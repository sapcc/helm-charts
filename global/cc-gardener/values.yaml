garden:
  name: garden
  # externalIP: ""
  managedresources: true # disable on inital deployment
  backup:
    provider: aws # aws or openstack
    # aws credentials
    # accessKeyID: ""
    # secretAccessKey: ""
    # region: ""
    # bucket: ""
    # openstack credentials
    # applicationCredentialID:
    # applicationCredentialName:
    # applicationCredentialSecret:
    # authURL:
    # region:
    # domainName:
    # tenantName:
    # bucket:
  # dns:
  #   region: ""
  runtimeCluster:
    zones: []
    # - "eu-de-1a"
    # Those CIDRs have been chosen to match with the runtime cluster configuration (see example/gardener-local/kind/cluster/values.yaml).
    # Generally, they have to match the CIDRs of the runtime cluster.
    networking:
    # nodes:
      pods: ["10.42.0.0/16"] # k3s default
      services: ["10.43.0.0/16"] # k3s default
    # loadBalancerServices:
  virtualCluster:
    version: "1.29.6"
    # authenticationConfig:
    networking:
      services: ["100.64.0.0/13"]
    adminUsers: []
    gardenerResourceManager:
      additionalTargetNamespaces: []
  dashboard:
    enabled: false
    enableTokenLogin: false
    customIngress: false
    oidc:
      enabled: false
      clientIDPublic: ""
      issuerURL: ""
secretsInjector:
  enabled: true
  replicaCount: 2
  topologyKey: ""
  image:
    repository: ""
    tag: ""
    pullPolicy: IfNotPresent
  config:
    accounts: []
    intervals:
      rotationPeriod: 5m
      rotationJitter: 1.1
      mirrorPeriod: 1m
      mirrorJitter: 1.1
    cleartext: asLiteral
extensions:
  storage:
    provisioner: "rancher.io/local-path"
    parameters: {}
  kubernetesVersions: []
  aws:
    version: v1.68.3
    values:
      replicaCount: 1
    runtimeClusterValues:
      replicaCount: 1
    helm:
      ociRepository:
        repository: keppel.global.cloud.sap/ccloud-europe-docker-pkg-dev-mirror/gardener-project/releases/charts/gardener/extensions/provider-aws
  oidcAppsController:
    version: v0.24.0
    values:
      replicaCount: 1
      image: keppel.eu-de-1.cloud.sap/ccloud-europe-docker-pkg-dev-mirror/gardener-project/releases/gardener/extensions/oidc-apps-controller
    runtimeClusterValues:
      replicaCount: 1
    helm:
      ociRepository:
        repository: keppel.global.cloud.sap/ccloud-europe-docker-pkg-dev-mirror/gardener-project/releases/charts/gardener/extensions/oidc-apps-controller
  calico:
