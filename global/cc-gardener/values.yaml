      - name: calico-cpa
        repository: keppel.global.cloud.sap/ccloud-registry-k8s-io-mirror/cpa/cluster-proportional-autoscaler
      - name: calico-cpva
        repository: keppel.global.cloud.sap/ccloud-registry-k8s-io-mirror/cpa/cpvpa
  gardenlinux:
    enabled: false
    version: v0.36.0
