{{ if .Values.gardenlet.enabled -}}
{{- range $index, $seedRegion := .Values.gardenlet.seedRegions }}
{{- $regionName := default $seedRegion.name $seedRegion.altRegion }}
{{- $clusterName := printf "%s-%s" (required "Values.gardenlet.namePrefix is required" $.Values.gardenlet.namePrefix) (default $seedRegion.name $seedRegion.seedName) }}
---
apiVersion: seedmanagement.gardener.cloud/v1alpha1
kind: Gardenlet
metadata:
  name: {{ $clusterName }}
  namespace: garden
spec:
{{- if $seedRegion.bootstrap}}
  kubeconfigSecretRef:
    name: secret-to-be-patched-manually
{{- end }}
  deployment:
    image:
{{- if and $.Values.gardenlet.image $.Values.gardenlet.image.repository }}
      repository: {{ $.Values.gardenlet.image.repository }}
{{- end }}
{{- if and $.Values.gardenlet.image $.Values.gardenlet.image.tag }}
      tag: {{ $.Values.gardenlet.image.tag }}
{{- else }}
      tag: {{ $.Chart.AppVersion }}
{{- end }}
    imageVectorOverwrite: |
{{ $.Values.operator.imageVectorOverwrite | indent 6 }}
    componentImageVectorOverwrite: |
{{ $.Values.operator.componentImageVectorOverwrites | indent 6 }}
    podLabels:
      networking.resources.gardener.cloud/to-virtual-garden-kube-apiserver-tcp-443: allowed
    helm:
      ociRepository:
{{ include "cc-gardener.extension.ociRepository" (dict "ociRepository" $.Values.gardenlet.helm.ociRepository "fallbackTag" $.Chart.AppVersion) | indent 8 }}
  config:
    gardenClientConnection:
      kubeconfigSecret:
        name: gardenlet-kubeconfig
        namespace: garden
      kubeconfigValidity:
        validity: 72h
    logging:
      enabled: true
    seedConfig:
      metadata:
        labels:
          environment: production
{{- if $.Values.extensions.metal.enabled }}
        annotations:
          metal.ironcore.dev/local-metal-api: "true"
{{- end }}
      spec:
{{- if $seedRegion.taints }}
        taints: {{ toYaml $seedRegion.taints | nindent 10 }}
{{- end }}
        backup:
          provider: {{ default "aws" $seedRegion.backup.provider | quote }}
          region: {{ default $regionName $seedRegion.backup.region | quote }}
          credentialsRef:
            apiVersion: v1
            kind: Secret
            {{- if eq "aws" $seedRegion.backup.provider }}
            name: {{ (printf "aws-backup-%s" $seedRegion.name) }}
            {{- else }}
            name: {{ (printf "openstack-%s" $regionName) }}
            {{- end }}
            namespace: garden
        dns:
          defaults:
          - credentialsRef:
              apiVersion: v1
              kind: Secret
              name: openstack-{{ $regionName }}
              namespace: garden
            domain: {{ default (printf "external.%s.%s.%s.cloud.sap" $clusterName "soil-garden" $seedRegion.name) $seedRegion.externalDomain }}
            type: openstack-designate
          internal:
            credentialsRef:
              apiVersion: v1
              kind: Secret
              name: openstack-{{ $regionName }}
              namespace: garden
            domain: {{ default (printf "internal.%s.%s.%s.cloud.sap" $clusterName "soil-garden" $seedRegion.name) $seedRegion.internalDomain }}
            type: openstack-designate
          provider:
            type: openstack-designate
            credentialsRef:
              apiVersion: v1
              kind: Secret
              name: openstack-{{ $regionName }}
              namespace: garden
        ingress: # see prerequisites
          domain: {{ default (printf "ingress.%s.%s.%s.cloud.sap" $clusterName "soil-garden" $seedRegion.name) $seedRegion.ingressDomain }}
          controller:
            kind: nginx
        networks:
          nodes: {{ $seedRegion.networks.nodes | quote }}
          pods: {{ $seedRegion.networks.pods | quote }}
          services: {{ $seedRegion.networks.services | quote }}
        provider:
          region: {{ default $seedRegion.name $seedRegion.providerRegion }}
          type: openstack
          zones: {{ toYaml $seedRegion.zones | nindent 12 }}
        settings:
          verticalPodAutoscaler:
            enabled: false
          excessCapacityReservation:
            enabled: false
          dependencyWatchdog:
            # The prober can start a vicious downscaling cycle from which a shoot cannot recover itself.
            # Let's assume there is healthy shoot and a machine is added.
            # This machine now fails to join the cluster temporarly for whatever reason.
            # This causes the prober to kick in and it will scale down the controller-manager as well as the MCM.
            # The node now gains network and it's kubelet tries the TLS bootstap.
            # The bootstrap does not go through, because the kubelets CertificateSigningRequest is never approved, because the controller-manager is scaled down.
            # Joining the node successfully is unfortunately required to scale up the controller-manager, which is a loop that cannot self-heal.
            prober:
              enabled: false
{{- if $seedRegion.taints }}
          scheduling:
            visible: false
{{- end }}
{{- if $seedRegion.loadBalancerServices }}
          loadBalancerServices: {{ toYaml $seedRegion.loadBalancerServices | nindent 12 }}
{{- end }}
{{- end }}
{{ end -}}
