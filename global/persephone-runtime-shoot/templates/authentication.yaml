{{- if .Values.oidcConfig.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: authentication
data:
  config.yaml: |
    apiVersion: apiserver.config.k8s.io/v1beta1
    kind: AuthenticationConfiguration
{{- with .Values.oidcConfig.anonymous }}
    anonymous:
{{ toYaml . | indent 6 }}
{{- end }}
    jwt:
{{ toYaml .Values.oidcConfig.jwt | indent 6 }}
{{- end }}
