# prettier-ignore

apiVersion: networking.k8s.io/v1
kind: Ingress

metadata:
  name: global-auth
  annotations:
    ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    ingress.kubernetes.io/proxy-buffer-size: "16k"
    nginx.ingress.kubernetes.io/proxy-buffer-size: "16k"
    ingress.kubernetes.io/large-client-header-buffers: "4 16k"
    nginx.ingress.kubernetes.io/large-client-header-buffers: "4 16k"
    kubernetes.io/tls-acme: "true"
    # create dns CNAME record for oauth-proxy
    disco: "true"
spec:
  tls:
    - secretName: tls-oauth-proxy
      hosts: [{{.Values.ingress.host_name}}.{{.Values.global.region}}.{{ .Values.global.tld }}]
  rules:
  - host: {{.Values.ingress.host_name}}.{{.Values.global.region}}.{{ .Values.global.tld }}
    http:
      paths:
        - path: /
          pathType: Prefix
          backend:
            service:
              name: oauth2-proxy
              port:
                number: 4180
