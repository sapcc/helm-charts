apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../base
patches:
  # Patch ingress with correct domain
  - target:
      kind: Ingress
      name: metal-operator-metal-registry-ingress
    patch: |
      - op: replace
        path: /spec/tls/0/hosts/0
        value: metal-operator-remote.runtime.eu-de-1.cloud.sap
      - op: replace
        path: /spec/rules/0/host
        value: metal-operator-remote.runtime.eu-de-1.cloud.sap
  # Patch remote-kubeconfig with actual apiserver URL
  - target:
      kind: ConfigMap
      name: remote-kubeconfig
    patch: |
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: remote-kubeconfig
      data:
        kubeconfig: |
          apiVersion: v1
          kind: Config
          clusters:
          - cluster:
              certificate-authority: /var/run/secrets/kubernetes.io/remote-serviceaccount/ca.crt
              server: https://kube-apiserver.metal-operator-system.svc.cluster.local
            name: remote
          contexts:
          - context:
              cluster: remote
              user: sa
            name: remote
          current-context: remote
          users:
          - name: sa
            user:
              tokenFile: /var/run/secrets/kubernetes.io/remote-serviceaccount/token
  # Patch macdb with actual MAC prefix database
  - target:
      kind: Secret
      name: macdb
    patch: |
      apiVersion: v1
      kind: Secret
      metadata:
        name: macdb
      stringData:
        macdb.yaml: |
          prefixes:
            - prefix: "00:50:56"
              vendor: "VMware"
            - prefix: "00:25:90"
              vendor: "SuperMicro"
  # Patch rotate-kubeconfig with actual CA and namespace
  - target:
      kind: Secret
      name: metal-token-rotate-kubeconfig
    patch: |
      apiVersion: v1
      kind: Secret
      metadata:
        name: metal-token-rotate-kubeconfig
      stringData:
        kubeconfig: |
          apiVersion: v1
          clusters:
          - cluster:
              certificate-authority-data: LS0tLS1CRUdJTi...BASE64_CA_CERT...
              server: https://kube-apiserver.metal-operator-system.svc.cluster.local:443
            name: remote-cluster
          contexts:
          - context:
              cluster: remote-cluster
              user: metal-token-rotate
              namespace: kube-system
            name: remote-cluster
          current-context: remote-cluster
          kind: Config
          preferences: {}
          users:
          - name: metal-token-rotate
            user:
              token: ""
  # Patch Deployment args with environment-specific values
  - target:
      kind: Deployment
      name: controller-manager
    patch: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: controller-manager
      spec:
        template:
          spec:
            containers:
              - name: manager
                args:
                  - --leader-elect
                  - --mac-prefixes-file=/etc/macdb/macdb.yaml
                  - --probe-image=keppel.global.cloud.sap/ccloud-ghcr-io-mirror/ironcore-dev/metalprobe:latest
                  - --probe-os-image=ghcr.io/ironcore-dev/os-images/gardenlinux:1443.3
                  - --insecure=false
                  - --registry-url=http://[2a10:afc0:e013:d002::]:30010
                  - --manager-namespace=metal-operator-system
images:
  - name: ghcr.io/ironcore-dev/metal-operator-controller-manager
    newTag: sha-4854c23
  - name: keppel.global.cloud.sap/ccloud-ghcr-io-mirror/SAP-cloud-infrastructure/webhook-injector
    newTag: v0.3.1
